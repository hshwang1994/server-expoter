---
# ==============================================================================
# sections.yml — 수집 섹션 정의 (server-exporter)
# ==============================================================================
# 이 파일은 server-exporter 가 수집할 수 있는 "섹션" 10종을 정의합니다.
# 출력 JSON 의 `sections` 와 `data` 필드는 본 정의를 기반으로 만들어집니다.
#
# 각 섹션 항목이 담는 정보:
#   - key          : 출력 JSON 의 키 이름 (변경 금지 — 호출자 계약)
#   - display_name : 운영자 / 사용자에게 보여주는 한국어 라벨
#   - description  : 어떤 데이터가 들어가는지 한 줄 설명
#   - channels     : 이 섹션이 지원되는 채널 (os / esxi / redfish 중)
#   - empty_value  : 수집은 됐으나 데이터가 비었을 때의 기본값
#                    (null 이면 "섹션 자체가 미수집",
#                     {} / [] 이면 "수집은 시도했으나 결과가 비어있음")
#
# 새 섹션 추가 시 작업 흐름은 docs/14_add-new-gather.md 의 "7단계 체크리스트" 참조.
# ==============================================================================

sections:
  system:
    key: system
    display_name: "시스템 정보"
    description: "운영체제, 호스트명, 가동시간 등 기본 시스템 정보"
    channels: [os, esxi, redfish]
    empty_value: null

  hardware:
    key: hardware
    display_name: "하드웨어 정보"
    description: "벤더, 모델, 시리얼번호, BIOS 등 물리 장비 정보"
    channels: [esxi, redfish]
    empty_value: null

  bmc:
    key: bmc
    display_name: "BMC 정보"
    description: "BMC(iDRAC/iLO/XCC) 펌웨어, 상태 정보"
    channels: [redfish]
    empty_value: null

  cpu:
    key: cpu
    display_name: "CPU 정보"
    description: "프로세서 소켓, 코어, 스레드, 모델 정보"
    channels: [os, esxi, redfish]
    empty_value: null

  memory:
    key: memory
    display_name: "메모리 정보"
    description: "총 용량, 슬롯별 상세, 사용량 정보"
    channels: [os, esxi, redfish]
    empty_value: null

  storage:
    key: storage
    display_name: "스토리지 정보"
    description: "파일시스템, 물리 디스크, 컨트롤러, 데이터스토어, 논리 볼륨, HBA, InfiniBand"
    channels: [os, esxi, redfish]
    empty_value:
      filesystems: []
      physical_disks: []
      datastores: []
      controllers: []
      logical_volumes: []
      # 스토리지 어댑터 깊이
      hbas: []
      infiniband: []
      # 그룹 합계 요약 (벤더 / 컨트롤러 / 풀 단위)
      summary: { groups: [], grand_total_gb: 0 }

  network:
    key: network
    display_name: "네트워크 정보"
    description: "인터페이스, IP 주소, DNS, 게이트웨이, NIC 카드 / port-level / vSwitch"
    channels: [os, esxi, redfish]
    empty_value:
      dns_servers: []
      default_gateways: []
      interfaces: []
      # NIC 카드 단위 / 포트 단위 / 가상 스위치 / 드라이버 매핑
      adapters: []
      ports: []
      virtual_switches: []
      portgroups: []
      driver_map: []
      # 그룹 합계 요약 (NIC 카드 / 포트 그룹 단위)
      summary: { groups: [] }

  firmware:
    key: firmware
    display_name: "펌웨어 목록"
    description: "설치된 펌웨어/드라이버 인벤토리"
    channels: [redfish]
    empty_value: []

  users:
    key: users
    display_name: "사용자 목록"
    description: "로컬 시스템 사용자 계정 정보"
    channels: [os]
    empty_value: []

  power:
    key: power
    display_name: "전원 정보"
    description: "전원 공급 장치(PSU) 상태 및 전력 정보"
    channels: [redfish]
    empty_value: null
