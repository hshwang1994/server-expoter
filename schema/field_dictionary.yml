---
# ==============================================================================
# field_dictionary.yml — 출력 JSON 필드 설명 사전
# ==============================================================================
#
# 이 파일은 server-exporter 가 만들어내는 표준 JSON 의 모든 필드에 대한
# "해석 가이드" 입니다. 호출자 / 운영자 / 개발자가 같은 필드를 보고 같은 의미로
# 이해하도록 한국어 + 영어 설명을 한 곳에 모았습니다.
#
# 왜 출력 JSON 자체에 설명을 넣지 않고 별도 파일에 두는가?
#   - 출력 JSON 의 크기가 변하지 않게 하기 위해 (호출자 시스템 부담 감소)
#   - 외부 시스템이 이 파일을 1회 로드해서 필드 lookup 으로 활용 가능
#   - 코드 변경 없이 설명만 갱신 가능
#
# 누가 이 파일을 사용하나?
#   - 외부 시스템(포털 등): 필드명 기반 lookup → 사용자에게 한국어 설명 노출
#   - 운영자: "이 필드 null 은 뭔지" 검색
#   - 개발자: 새 필드 추가 시 본 파일에 1 항목 추가
#
# Path(키 경로) 표기 규칙
#   "hardware.health"          → data.hardware.health (중첩 객체 경로)
#   "physical_disks[]"         → 배열 자체에 대한 설명
#   "physical_disks[].serial"  → 배열 각 항목의 serial 필드
#   "sections.*"               → sections 객체의 모든 값 (와일드카드)
#   "status"                   → 최상위 status 필드 (data 하위 아님)
#   "correlation.host_ip"      → correlation.host_ip (최상위)
#
# 우선순위(priority) 의미
#   must — 호출자가 반드시 의미를 알아야 하는 필드 (혼동 가능성 높음)
#   nice — 설명이 있으면 좋고 없어도 사용에 지장 없음
#   skip — 의미가 자명해서 본 사전에 등록하지 않음 (예: hostname)
#
# 등록 현황 (2026-04-29 기준): Must 39 / Nice 20 / Skip 6 = 총 65 entries
#
# 검증 (수동): tests/validate_field_dictionary.py 가 다음 5가지를 검사합니다.
#   1) 모든 entry 에 help_ko, help_en 이 함께 있는지
#   2) path 가 실제 output JSON / schema/examples 와 대응되는지
#   3) 중복 키가 없는지
#   4) priority 값이 must / nice / skip 중 하나인지
#   5) channel 배열이 [redfish, os, esxi] 안에 있는지
# ==============================================================================

fields:

  # ──────────────────────────────────────────────────────────────────────────
  # envelope 최상위 — 호출자 라우팅 / 식별 / 추적 필드
  # ──────────────────────────────────────────────────────────────────────────

  schema_version:
    type: "string"
    enum: ["1"]
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      출력 envelope schema 버전. "1" 고정 (2026-04-29 기준).
      호출자는 이 버전을 보고 envelope 필드 집합을 결정.
    help_en: >-
      Output envelope schema version. Fixed "1" as of 2026-04-29.
      Callers branch on this value to determine envelope field set.

  target_type:
    type: "string"
    enum: ["os", "esxi", "redfish"]
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      수집 채널. 호출자가 어느 채널 결과인지 라우팅.
    help_en: >-
      Collection channel. Callers route by this value.

  collection_method:
    type: "string"
    enum: ["agent", "vsphere_api", "redfish_api"]
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      수집 방식. agent=Ansible SSH/WinRM, vsphere_api=community.vmware,
      redfish_api=stdlib HTTP+Basic Auth.
    help_en: >-
      Collection method. agent=Ansible SSH/WinRM, vsphere_api=community.vmware,
      redfish_api=stdlib HTTP+Basic Auth.

  ip:
    type: "string"
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      대상 장비 IP. OS=서비스 IP, ESXi=management IP, Redfish=BMC IP.
      호출자가 inventory_json에 전달한 값과 동일.
    help_en: >-
      Target device IP. OS=service IP, ESXi=management IP, Redfish=BMC IP.

  hostname:
    type: "string"
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      해석된 hostname. 해석 실패 시 ip 값으로 fallback.
      Redfish는 BMC가 hostname을 제공하지 않으면 ip와 동일할 수 있음.
    help_en: >-
      Resolved hostname. Falls back to ip when resolution fails.
      Redfish hostname may equal ip when BMC reports no hostname.

  vendor:
    type: "string|null"
    enum: ["dell", "hpe", "lenovo", "supermicro", "cisco", null]
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      정규화된 벤더 (소문자). vendor_aliases.yml로 매핑.
      OS 채널은 hardware 정보 미수집 시 null.
      ESXi는 hosting hardware 벤더.
    help_en: >-
      Normalized vendor (lowercase) via vendor_aliases.yml.
      OS channel may be null when hardware section unavailable.
      ESXi reports hosting hardware vendor.

  meta:
    type: "object"
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      수집 메타데이터 (started_at/finished_at/duration_ms/adapter_id/adapter_version/ansible_version 등).
      운영 추적 + 성능 분석용.
    help_en: >-
      Collection metadata (started_at/finished_at/duration_ms/adapter_id/adapter_version/ansible_version, etc).
      Used for operations tracing and performance analysis.

  correlation:
    type: "object"
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      상관관계 식별자 (serial_number/system_uuid/bmc_ip/host_ip).
      여러 채널에서 같은 장비를 식별할 때 사용.
    help_en: >-
      Correlation identifiers (serial_number/system_uuid/bmc_ip/host_ip).
      Used to correlate same device across channels.

  # ──────────────────────────────────────────────────────────────────────────
  # sections (top-level) — 수집 결과 상태
  # ──────────────────────────────────────────────────────────────────────────

  status:
    type: "string"
    enum: ["success", "partial", "failed"]
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      전체 수집 결과 상태.
      success=지원하는 모든 섹션 수집 성공,
      partial=일부 섹션만 성공,
      failed=전체 실패.
      주의: success는 '수집 성공'이지 '장비 정상'이 아님.
      hardware.health가 Critical이어도 status는 success일 수 있음.
    help_en: >-
      Overall collection result.
      success=all supported sections collected,
      partial=some sections failed,
      failed=complete failure.
      Note: success means 'collection succeeded', not 'equipment is healthy'.
      hardware.health can be Critical even when status is success.

  "sections.*":
    type: "string"
    enum: ["success", "failed", "not_supported"]
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      개별 섹션 수집 상태.
      success=해당 섹션 수집 성공,
      failed=수집 시도했으나 실패,
      not_supported=이 채널에서 해당 섹션을 지원하지 않음.
      예: Redfish에서 system=not_supported (OS 정보 없음),
      OS에서 bmc=not_supported (BMC 접근 불가).
    help_en: >-
      Per-section collection status.
      success=section collected,
      failed=collection attempted but failed,
      not_supported=section not available in this channel.
      Example: Redfish system=not_supported (no OS info),
      OS bmc=not_supported (no BMC access).

  # ──────────────────────────────────────────────────────────────────────────
  # hardware
  # ──────────────────────────────────────────────────────────────────────────

  hardware.health:
    type: "string|null"
    enum: ["OK", "Warning", "Critical"]
    priority: must
    channel: [redfish]
    help_ko: >-
      서버 하드웨어 전체 상태 (BMC rollup health).
      OK=모든 하위 구성요소 정상,
      Warning=일부 구성요소 주의 필요,
      Critical=장애 발생.
      이 값은 '수집 성공 여부'가 아닌 '장비 자체의 건강 상태'.
      rollup에 포함되는 하위 구성요소 범위는 벤더마다 다를 수 있음.
      null=BMC가 이 필드를 제공하지 않는 경우.
    help_en: >-
      Server hardware overall health (BMC rollup).
      OK=all subsystems healthy,
      Warning=some subsystems need attention,
      Critical=fault detected.
      This reflects equipment health, not collection success.
      Rollup scope may vary by vendor.
      null=BMC does not provide this field.

  hardware.sku:
    type: "string|null"
    priority: must
    channel: [redfish]
    help_ko: >-
      서버 제품 식별 번호. 벤더마다 의미가 다름.
      Lenovo=CTO 주문 번호 (예: 7Z73CTO1WW),
      HPE=파트 번호 (예: P52534-B21),
      Dell=서비스 태그 (예: 2BJ8033),
      Cisco=미제공 (null).
    help_en: >-
      Server product identifier. Meaning varies by vendor.
      Lenovo=CTO order number,
      HPE=part number,
      Dell=service tag,
      Cisco=not provided (null).

  hardware.oem:
    type: "object"
    priority: must
    channel: [redfish]
    help_ko: >-
      벤더 전용 확장 데이터. 키 구조가 벤더마다 완전히 다름.
      HPE: aggregate_server_health, subsystem_health, psu_redundancy 등.
      Dell: chassis_service_tag, express_service_code, rollup_status 등.
      Lenovo: product_name 등.
      Cisco: 일반적으로 비어 있음.
    help_en: >-
      Vendor-specific extended data. Key structure varies completely by vendor.
      HPE: aggregate_server_health, subsystem_health, psu_redundancy, etc.
      Dell: chassis_service_tag, express_service_code, rollup_status, etc.
      Lenovo: product_name, etc.
      Cisco: typically empty.

  # ──────────────────────────────────────────────────────────────────────────
  # memory
  # ──────────────────────────────────────────────────────────────────────────

  memory.total_basis:
    type: "string"
    enum: ["physical_installed", "os_visible", "hypervisor_visible"]
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      total_mb 값의 산출 기준.
      physical_installed=DIMM에 물리적으로 장착된 용량 (Redfish 기준),
      os_visible=운영체제가 인식하는 용량 (Linux/Windows 기준),
      hypervisor_visible=하이퍼바이저가 인식하는 용량 (ESXi 기준).
      같은 서버라도 채널에 따라 total_mb 값이 다를 수 있음.
      예: 512GB 장착 서버에서 Redfish=524288MB, OS=500000MB (예약 영역 차감).
    help_en: >-
      Basis for total_mb calculation.
      physical_installed=physically installed DIMM capacity (Redfish),
      os_visible=OS-reported capacity (Linux/Windows),
      hypervisor_visible=hypervisor-reported capacity (ESXi).
      Same server may report different total_mb depending on channel.

  memory.installed_mb:
    type: "integer|null"
    priority: must
    channel: [redfish, os]
    # cycle 2026-05-11 field-channel-refinement: ESXi channel 제거.
    # 근거: esxi_baseline.json 의 installed_mb=null (ansible_memtotal_mb 만 수집,
    # DIMM 슬롯 정보 없음). field_usage_matrix 분류 1 (수집 불가).
    help_ko: >-
      물리적으로 장착된 메모리 용량 (MB).
      Redfish 채널에서 주로 제공. OS 채널에서는 dmidecode 권한 부족 시 null 가능.
      ESXi 채널은 미수집 (ansible_memtotal_mb 만 제공) — channel 에서 제외 (cycle 2026-05-11).
      total_mb와 동일한 값일 수 있으나, total_basis가 다르면 의미가 다름.
    help_en: >-
      Physically installed memory capacity (MB).
      Primarily provided by Redfish. May be null in OS channel (dmidecode permission).
      ESXi channel excluded (cycle 2026-05-11) — ansible_memtotal_mb only.

  memory.visible_mb:
    type: "integer|null"
    priority: must
    channel: [os, esxi]
    # cycle 2026-05-11 field-channel-refinement: Redfish channel 제거.
    # 근거: Redfish spec 미정의 (Memory.v1_*.json 에 VisibleMiB 필드 없음).
    # 4 redfish baseline (dell/hpe/lenovo/cisco) 모두 null. field_usage_matrix 분류 1.
    help_ko: >-
      운영체제 또는 하이퍼바이저가 인식하는 메모리 용량 (MB).
      OS/ESXi 채널 전용. Redfish 는 BMC API spec 미정의 — channel 에서 제외 (cycle 2026-05-11).
    help_en: >-
      OS or hypervisor visible memory capacity (MB).
      OS/ESXi channels only. Redfish excluded (cycle 2026-05-11) — not defined in BMC spec.

  # ──────────────────────────────────────────────────────────────────────────
  # storage
  # ──────────────────────────────────────────────────────────────────────────

  "storage.physical_disks[]":
    type: "array of object"
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      시스템 전체의 물리 디스크 목록 (중복 제거됨).
      controllers[].drives[]에도 같은 디스크가 컨트롤러별로 나타남.
      physical_disks는 컨트롤러 구분 없이 전체 디스크를 한 번만 보여줌.
      CapacityBytes=0인 드라이브 (Empty Bay, FlexFlash)는 제외됨.
    help_en: >-
      System-wide physical disk list (deduplicated).
      Same disks also appear under controllers[].drives[] grouped by controller.
      physical_disks shows all disks once without controller grouping.
      Drives with CapacityBytes=0 (Empty Bay, FlexFlash) are excluded.

  "storage.physical_disks[].id":
    type: "string|null"
    priority: must
    channel: [redfish, os]
    help_ko: >-
      물리 디스크 식별자. logical_volumes[].member_drive_ids에서 참조됨.
      Redfish: Drive의 Id (예: Disk.Bay.0:Enclosure.Internal.0-1:RAID.Slot.6-1).
      OS(Linux): device path (예: /dev/sda).
      OS(Windows): DeviceID (예: \\.\PhysicalDrive0).
      ESXi: 수집하지 않음 (null).
    help_en: >-
      Physical disk identifier. Referenced by logical_volumes[].member_drive_ids.
      Redfish: Drive Id (e.g., Disk.Bay.0:Enclosure.Internal.0-1:RAID.Slot.6-1).
      OS(Linux): device path (e.g., /dev/sda).
      OS(Windows): DeviceID (e.g., \\.\PhysicalDrive0).
      ESXi: not collected (null).

  "storage.physical_disks[].predicted_life_percent":
    type: "integer|null"
    priority: must
    channel: [redfish]
    help_ko: >-
      SSD 남은 미디어 수명 (%).
      100=새 디스크, 0=수명 소진.
      HDD에서는 null.
      HPE는 float으로 반환되어 int로 변환됨 (예: 100.0 → 100).
    help_en: >-
      SSD remaining media life (%).
      100=new drive, 0=end of life.
      null for HDD.
      HPE returns float, normalized to int (e.g., 100.0 → 100).

  "storage.controllers[].drives[]":
    type: "array of object"
    priority: must
    channel: [redfish]
    help_ko: >-
      해당 스토리지 컨트롤러에 연결된 드라이브 목록.
      physical_disks[]와 같은 디스크가 컨트롤러별로 분류되어 나타남.
      RAID 구성 확인 시 이 경로를 사용.
    help_en: >-
      Drives attached to this storage controller.
      Same disks as physical_disks[] but grouped by controller.
      Use this path for RAID configuration analysis.

  # ──────────────────────────────────────────────────────────────────────────
  # storage — logical volumes (RAID)
  # ──────────────────────────────────────────────────────────────────────────

  "storage.logical_volumes[]":
    type: "array of object"
    priority: must
    channel: [redfish]
    help_ko: >-
      RAID 논리 볼륨 목록. Redfish /Storage/{id}/Volumes에서 수집.
      controllers[].id, physical_disks[].id와 관계를 형성:
      logical_volumes[].controller_id → controllers[].id,
      logical_volumes[].member_drive_ids → physical_disks[].id.
      OS/ESXi 채널에서는 빈 배열 [].
      HBA 모드(RAID 미구성) 서버에서도 빈 배열 [].
    help_en: >-
      RAID logical volume list. Collected from Redfish /Storage/{id}/Volumes.
      Forms relationships with controllers[].id and physical_disks[].id:
      logical_volumes[].controller_id → controllers[].id,
      logical_volumes[].member_drive_ids → physical_disks[].id.
      Empty array [] for OS/ESXi channels and HBA-mode servers.

  "storage.logical_volumes[].raid_level":
    type: "string|null"
    enum: ["RAID0", "RAID1", "RAID5", "RAID6", "RAID10", "RAID50", "JBOD"]
    priority: must
    channel: [redfish]
    help_ko: >-
      RAID 레벨. 표준 RAIDType 필드 우선 사용.
      Dell 레거시 펌웨어에서 RAIDType 미제공 시 VolumeType으로 fallback
      (Mirrored→RAID1, StripedWithParity→RAID5 등).
      null=RAID 레벨을 판별할 수 없는 경우.
    help_en: >-
      RAID level. Uses standard RAIDType field first.
      Falls back to Dell legacy VolumeType mapping when RAIDType is absent
      (Mirrored→RAID1, StripedWithParity→RAID5, etc.).
      null=RAID level could not be determined.

  "storage.logical_volumes[].member_drive_ids":
    type: "array of string"
    priority: must
    channel: [redfish]
    help_ko: >-
      이 논리 볼륨을 구성하는 물리 드라이브 Id 목록.
      physical_disks[].id와 매칭하여 물리↔논리 관계를 확인할 수 있음.
      Redfish Volume의 Links.Drives[].@odata.id에서 추출.
    help_en: >-
      List of physical drive Ids composing this logical volume.
      Match against physical_disks[].id to trace physical↔logical relationships.
      Extracted from Redfish Volume Links.Drives[].@odata.id.

  "storage.logical_volumes[].controller_id":
    type: "string|null"
    priority: must
    channel: [redfish]
    help_ko: >-
      이 논리 볼륨이 속한 스토리지 컨트롤러의 Id.
      controllers[].id와 매칭하여 컨트롤러↔볼륨 관계를 확인할 수 있음.
    help_en: >-
      Storage controller Id that this logical volume belongs to.
      Match against controllers[].id to trace controller↔volume relationships.

  "storage.logical_volumes[].id":
    type: "string|null"
    priority: must
    channel: [redfish]
    help_ko: >-
      논리 볼륨 식별자. Redfish Volume의 Id.
      Dell: Disk.Virtual.0:RAID.Slot.6-1 형태.
      HPE: 숫자 (예: 1).
      Lenovo: 숫자 (예: 0).
    help_en: >-
      Logical volume identifier. Redfish Volume Id.
      Dell: Disk.Virtual.0:RAID.Slot.6-1 format.
      HPE: numeric (e.g., 1).
      Lenovo: numeric (e.g., 0).

  "storage.logical_volumes[].name":
    type: "string|null"
    priority: nice
    channel: [redfish]
    help_ko: "논리 볼륨 이름 (예: Virtual Disk 0)."
    help_en: "Logical volume name (e.g., Virtual Disk 0)."

  "storage.logical_volumes[].total_mb":
    type: "integer|null"
    priority: must
    channel: [redfish]
    help_ko: >-
      논리 볼륨 용량 (MB). CapacityBytes를 1048576으로 나눈 값.
      RAID 레벨에 따라 물리 디스크 합산 용량과 다를 수 있음.
      예: RAID1 2×480GB → 약 457GB 볼륨.
    help_en: >-
      Logical volume capacity (MB). CapacityBytes / 1048576.
      May differ from raw physical disk total depending on RAID level.
      Example: RAID1 2×480GB → ~457GB volume.

  "storage.logical_volumes[].health":
    type: "string|null"
    enum: ["OK", "Warning", "Critical"]
    priority: must
    channel: [redfish]
    help_ko: >-
      논리 볼륨 건강 상태.
      OK=정상, Warning=주의 필요, Critical=장애.
      null=BMC가 이 필드를 제공하지 않는 경우.
    help_en: >-
      Logical volume health.
      OK=healthy, Warning=attention needed, Critical=fault.
      null=BMC does not provide this field.

  "storage.logical_volumes[].state":
    type: "string|null"
    enum: ["Enabled", "Degraded", "Offline"]
    priority: must
    channel: [redfish]
    help_ko: >-
      논리 볼륨 동작 상태.
      Enabled=정상 동작, Degraded=성능 저하 (드라이브 장애 등),
      Offline=비활성.
    help_en: >-
      Logical volume operational state.
      Enabled=operating normally, Degraded=reduced performance (drive failure etc.),
      Offline=inactive.

  "storage.logical_volumes[].boot_volume":
    type: "boolean|null"
    priority: nice
    channel: [redfish]
    help_ko: >-
      부트 볼륨 여부. Dell OEM(DellVolume.BootVolumeSource)에서만 판별 가능.
      기타 벤더에서는 null.
    help_en: >-
      Whether this is a boot volume. Only determinable from Dell OEM
      (DellVolume.BootVolumeSource). null for other vendors.

  # ──────────────────────────────────────────────────────────────────────────
  # network
  # ──────────────────────────────────────────────────────────────────────────

  "network.interfaces[].link_status":
    type: "string|null"
    enum: ["linkup", "linkdown", "none", null]
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      NIC 링크 상태.
      linkup=케이블 연결됨 및 링크 활성,
      linkdown=케이블 미연결 또는 링크 비활성,
      none=BMC가 상태를 제공하지 않음 (HPE/Cisco System NIC에서 발생),
      null=필드 자체 미제공.
      Redfish의 System EthernetInterfaces는 서버 NIC 하드웨어 정보이며,
      IP 주소/게이트웨이는 일반적으로 비어 있음 (OS 수준 정보이므로).
    help_en: >-
      NIC link state.
      linkup=cable connected and link active,
      linkdown=no cable or link inactive,
      none=BMC does not report status (HPE/Cisco System NICs),
      null=field not provided.

  # ──────────────────────────────────────────────────────────────────────────
  # power
  # ──────────────────────────────────────────────────────────────────────────

  "power.power_supplies[].state":
    type: "string|null"
    priority: must
    channel: [redfish]
    help_ko: >-
      PSU 동작 상태.
      Enabled=전원 공급 중이며 정상 동작,
      UnavailableOffline=전원 미공급 또는 장애로 비활성.
      health(OK/Warning/Critical)와는 별개 필드.
    help_en: >-
      PSU operational state.
      Enabled=powered and operating,
      UnavailableOffline=no power input or fault.
      Separate from health (OK/Warning/Critical).

  # ──────────────────────────────────────────────────────────────────────────
  # cpu
  # ──────────────────────────────────────────────────────────────────────────

  cpu.cores_physical:
    type: "integer|null"
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      서버 전체의 물리 코어 합계.
      Redfish: 모든 프로세서의 TotalCores를 합산한 값.
      OS: ansible_processor_count × cores_per_socket.
      '소켓당 코어'가 아닌 '전체 코어 수'임에 주의.
    help_en: >-
      Total physical cores across all sockets.
      Redfish: sum of TotalCores from all processors.
      OS: ansible_processor_count × cores_per_socket.
      Note: this is total cores, not per-socket.

  # ──────────────────────────────────────────────────────────────────────────
  # firmware
  # ──────────────────────────────────────────────────────────────────────────

  "firmware[].component":
    type: "string|null"
    priority: must
    channel: [redfish]
    help_ko: >-
      펌웨어 소프트웨어 식별자 (Redfish SoftwareId).
      벤더마다 형식이 다름.
      Lenovo: "BMC-AFBT-10" 형태,
      Dell: 숫자 ID "101548",
      HPE: 숫자 또는 UUID,
      Cisco: 슬롯명.
      raw 값이 문자열 "null"인 경우 None으로 변환됨.
    help_en: >-
      Firmware software identifier (Redfish SoftwareId).
      Format varies by vendor.
      Raw string "null" is converted to None.

  # ──────────────────────────────────────────────────────────────────────────
  # users (DRIFT-004 cycle-006 신규)
  # ──────────────────────────────────────────────────────────────────────────

  "users[]":
    type: "array of object"
    priority: must
    channel: [os]
    help_ko: >-
      OS 채널 사용자 계정 목록.
      Linux: getent passwd 결과.
      Windows: Get-LocalUser cmdlet 결과.
      Redfish/ESXi: 수집 안 함 ([] 빈 배열).
    help_en: >-
      OS-channel user account list.
      Linux: getent passwd output. Windows: Get-LocalUser cmdlet output.
      Not collected for Redfish/ESXi (empty []).

  "users[].name":
    type: "string"
    priority: must
    channel: [os]
    help_ko: >-
      사용자 계정 이름.
      Linux: passwd 첫 필드.
      Windows: SamAccountName.
    help_en: >-
      User account name.
      Linux: passwd first field. Windows: SamAccountName.

  "users[].uid":
    type: "string|integer"
    priority: must
    channel: [os]
    help_ko: >-
      사용자 ID.
      Linux: 정수 UID (예: 0 = root).
      Windows: SID 문자열 (예: S-1-5-21-...).
    help_en: >-
      User ID.
      Linux: integer UID (e.g., 0 = root). Windows: SID string.

  "users[].groups":
    type: "array of string"
    priority: nice
    channel: [os]
    help_ko: >-
      소속 그룹 목록.
      Linux: getent group으로 추출. Windows: 로컬 그룹.
      Vendor-specific 또는 미수집 환경에서는 [].
    help_en: >-
      Group membership list.
      Linux: getent group. Windows: local groups.
      [] when vendor-specific or unavailable.

  "users[].home":
    type: "string|null"
    priority: nice
    channel: [os]
    help_ko: >-
      홈 디렉터리 경로.
      Linux: passwd 6번째 필드 (예: /root, /home/<user>).
      Windows: 프로파일 경로 (예: C:\Users\<user>).
    help_en: >-
      Home directory path.
      Linux: passwd 6th field. Windows: profile path.

  "users[].last_access_time":
    type: "string|null"
    priority: skip
    channel: [os]
    help_ko: >-
      마지막 로그인/접근 시각 (ISO8601). 수집 환경에 따라 null.
      현재 baseline에서는 보편적 미수집 (null).
    help_en: >-
      Last login/access timestamp (ISO8601). Often null.

  # ──────────────────────────────────────────────────────────────────────────
  # bmc / correlation
  # ──────────────────────────────────────────────────────────────────────────

  bmc.ip:
    type: "string|null"
    priority: must
    channel: [redfish]
    help_ko: >-
      BMC 관리 인터페이스의 IPv4 주소.
      Manager의 EthernetInterfaces에서 추출.
      서버 운영체제의 IP 주소가 아닌 BMC 전용 관리 IP.
    help_en: >-
      BMC management interface IPv4 address.
      Extracted from Manager's EthernetInterfaces.
      This is the BMC management IP, not the server OS IP.

  correlation.host_ip:
    type: "string"
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      수집 대상 장비의 IP 주소.
      Redfish 채널: BMC IP와 동일 (Redfish는 BMC를 통해 수집하므로 서버 OS IP를 알 수 없음).
      OS 채널: 서버 운영체제의 IP.
      ESXi 채널: ESXi 호스트의 IP.
      Redfish에서 host_ip와 bmc_ip가 같은 것은 정상.
    help_en: >-
      IP address of the gather target.
      Redfish: equals BMC IP (Redfish collects via BMC, cannot determine server OS IP).
      OS: server OS IP.
      ESXi: ESXi host IP.
      host_ip equaling bmc_ip in Redfish is expected behavior.

  # ──────────────────────────────────────────────────────────────────────────
  # diagnosis
  # ──────────────────────────────────────────────────────────────────────────

  diagnosis.auth_success:
    type: "boolean|null"
    priority: must
    channel: [redfish, os, esxi]
    help_ko: >-
      인증 성공 여부.
      true=인증 성공 후 수집 완료,
      false=인증 실패,
      null=인증 단계가 실행되지 않았거나 확인 불가.
      null은 '실패'가 아니라 '미확인' 의미.
    help_en: >-
      Authentication verification result.
      true=auth succeeded and collection completed,
      false=auth failed,
      null=auth stage was not executed or inconclusive.
      null means 'not verified', not 'failed'.

  # ══════════════════════════════════════════════════════════════════════════
  # Nice to Have — 설명이 있으면 좋지만 없어도 사용 가능
  # ══════════════════════════════════════════════════════════════════════════

  hardware.power_state:
    type: "string|null"
    enum: ["On", "Off", "PoweringOn", "PoweringOff"]
    priority: nice
    channel: [redfish]
    help_ko: >-
      서버 전원 상태. On=전원 켜짐, Off=전원 꺼짐.
      PoweringOn/PoweringOff는 전환 중 상태.
    help_en: >-
      Server power state. On/Off are steady states.
      PoweringOn/PoweringOff are transitional.

  "storage.physical_disks[].failure_predicted":
    type: "boolean|null"
    priority: nice
    channel: [redfish]
    help_ko: >-
      SMART 기반 디스크 고장 예측. true=조만간 고장 예상, false=정상.
      CapacityBytes=0인 드라이브(FlexFlash 등)는 필터로 제외됨.
    help_en: >-
      SMART-based drive failure prediction. true=failure expected, false=healthy.
      Drives with CapacityBytes=0 (FlexFlash etc.) are filtered out.

  "network.interfaces[].kind":
    type: "string"
    enum: ["server_nic", "os_nic", "vmkernel"]
    priority: nice
    channel: [redfish, os, esxi]
    help_ko: >-
      NIC 유형. server_nic=Redfish에서 수집한 서버 NIC 하드웨어,
      os_nic=OS에서 수집한 네트워크 인터페이스,
      vmkernel=ESXi vmkernel 포트.
    help_en: >-
      NIC type. server_nic=server NIC hardware from Redfish,
      os_nic=OS-level network interface,
      vmkernel=ESXi vmkernel port.

  meta.duration_ms:
    type: "integer|null"
    priority: nice
    channel: [redfish, os, esxi]
    help_ko: >-
      수집 소요 시간 (밀리초). 해당 호스트 1대의 수집 시간.
      배치 실행 시 전체 시간이 아닌 개별 호스트 시간.
    help_en: >-
      Collection duration (milliseconds). Per-host collection time,
      not total batch time.

  diagnosis.failure_stage:
    type: "string|null"
    enum: ["port", "protocol", "auth"]
    priority: nice
    channel: [redfish, os, esxi]
    # cycle 2026-05-11 field-channel-refinement: conditional 필드 — channel 유지.
    # success status baseline 에서 항상 null (실패하지 않음). 실패 status fixture
    # 추가 시 채워짐. field_usage_matrix 자동 분류 1 (모든 baseline null) 은
    # success-only baseline 한계 — conditional 분류 (channel 축소 안 함).
    help_ko: >-
      실패 시 어느 단계에서 실패했는지. **conditional 필드** — status=failed 시만 채워짐.
      port=포트 연결 실패, protocol=프로토콜 미지원, auth=인증 실패.
      null=실패하지 않았거나 단계 확인 불가 (success status baseline 에서 항상 null).
    help_en: >-
      Failure stage indicator. **Conditional field** — populated only when status=failed.
      port=port connection failed, protocol=not supported, auth=auth failed.
      null=no failure or stage unknown (always null in success-status baselines).

  # ══════════════════════════════════════════════════════════════════════════
  # Do Not Help (skip) — 의미가 자명하여 등록하되 설명은 최소한
  # ══════════════════════════════════════════════════════════════════════════

  "storage.physical_disks[].media_type":
    type: "string|null"
    enum: ["SSD", "HDD"]
    priority: skip
    channel: [redfish, os]
    help_ko: "디스크 유형. SSD 또는 HDD."
    help_en: "Disk media type. SSD or HDD."

  "storage.physical_disks[].protocol":
    type: "string|null"
    enum: ["SATA", "SAS", "NVMe"]
    priority: skip
    channel: [redfish]
    help_ko: "디스크 연결 프로토콜."
    help_en: "Disk connection protocol."

  cpu.architecture:
    type: "string|null"
    priority: skip
    channel: [os, esxi]
    help_ko: "CPU 아키텍처 (예: x86_64)."
    help_en: "CPU architecture (e.g., x86_64)."

  system.hosting_type:
    type: "string"
    enum: ["virtual", "baremetal", "unknown"]
    priority: must
    channel: [os]
    help_ko: >-
      호스팅 유형.
      virtual=가상머신(VMware/KVM/Hyper-V 등의 guest),
      baremetal=물리 서버에 직접 설치된 OS,
      unknown=판별 근거 부족 또는 신호 충돌.
      OS 채널 전용 필드. Redfish/ESXi에는 적용하지 않음.
    help_en: >-
      Hosting type.
      virtual=VM guest (VMware/KVM/Hyper-V etc.),
      baremetal=OS installed directly on physical server,
      unknown=insufficient evidence or conflicting signals.
      OS channel only. Not applicable to Redfish/ESXi.

  system.uptime_seconds:
    type: "integer|null"
    priority: skip
    channel: [os, esxi]
    help_ko: "서버 가동 시간 (초)."
    help_en: "Server uptime in seconds."

  "firmware[].updateable":
    type: "boolean"
    priority: skip
    channel: [redfish]
    help_ko: "펌웨어 업데이트 가능 여부."
    help_en: "Whether firmware is updateable."

  # ──────────────────────────────────────────────────────────────────────────
  # Group Summary — 단위용량 × 수량 × 그룹총량 (storage / network 그룹 단위 합계)
  # ──────────────────────────────────────────────────────────────────────────

  "cpu.summary":
    type: "object"
    priority: nice
    channel: [redfish, os, esxi]
    help_ko: >-
      CPU 그룹 summary. groups[]={model, sockets, cores_per_socket, total_cores}.
      같은 model 의 socket 들을 합쳐 보여준다 — 운영 가시성용.
    help_en: >-
      CPU group summary. groups[]={model, sockets, cores_per_socket, total_cores}.
      Aggregates sockets sharing the same model for operational visibility.

  "memory.summary":
    type: "object"
    priority: nice
    channel: [redfish, os, esxi]
    help_ko: >-
      메모리 그룹 summary. groups[]={unit_capacity_gb, type, quantity, group_total_gb}
      + grand_total_gb. 같은 단위 용량 DIMM 의 수량 + 총량 + 전체 총량.
    help_en: >-
      Memory group summary. groups[]={unit_capacity_gb, type, quantity, group_total_gb}
      + grand_total_gb. Quantity, group total, and grand total of DIMMs by capacity.

  "storage.summary":
    type: "object"
    priority: nice
    channel: [redfish, os, esxi]
    help_ko: >-
      디스크 그룹 summary. groups[]={unit_capacity_gb, media_type, protocol, quantity,
      group_total_gb} + grand_total_gb. 같은 단위 용량/미디어 디스크의 수량 + 총량.
    help_en: >-
      Disk group summary. groups[]={unit_capacity_gb, media_type, protocol, quantity,
      group_total_gb} + grand_total_gb. Quantity and totals by capacity/media.

  "network.summary":
    type: "object"
    priority: nice
    channel: [redfish, os, esxi]
    help_ko: >-
      NIC 그룹 summary. groups[]={speed_mbps, link_type, quantity, link_up_count}.
      같은 대역폭 NIC 의 수량 + link up 개수.
    help_en: >-
      NIC group summary. groups[]={speed_mbps, link_type, quantity, link_up_count}.
      Quantity of NICs and link-up count grouped by speed.

  # ──────────────────────────────────────────────────────────────────────────
  # NIC / HBA / InfiniBand 깊이 (어댑터 단위 / 포트 단위 정보)
  # ──────────────────────────────────────────────────────────────────────────

  "network.adapters[]":
    type: "object[]"
    priority: nice
    channel: [redfish, esxi]
    help_ko: >-
      NIC 카드 (NetworkAdapters) 정보. id/name/manufacturer/model/part_number/
      serial_number/firmware_version. ESXi 의 vmnic 도 포함.
    help_en: >-
      NIC card (NetworkAdapters) info. id/name/manufacturer/model/part_number/
      serial_number/firmware_version. Includes ESXi vmnic.

  "network.ports[]":
    type: "object[]"
    priority: nice
    channel: [redfish]
    help_ko: >-
      NIC port-level 정보. adapter_id/port_id/link_status/current_link_speed_mbps/
      port_type (Ethernet/FibreChannel/InfiniBand).
    help_en: >-
      NIC port-level info. adapter_id/port_id/link_status/current_link_speed_mbps/
      port_type (Ethernet/FibreChannel/InfiniBand).

  "network.virtual_switches[]":
    type: "object[]"
    priority: nice
    channel: [esxi]
    help_ko: "ESXi vSwitch 목록 (name/num_ports/mtu/pnics/portgroups)."
    help_en: "ESXi vSwitch list (name/num_ports/mtu/pnics/portgroups)."

  "network.driver_map[]":
    type: "object[]"
    priority: nice
    channel: [os]
    help_ko: >-
      Linux interface → driver / VLAN ID / bond master 매핑.
      /sys/class/net 기반 raw fallback.
    help_en: >-
      Linux interface → driver / VLAN id / bond master mapping.
      Sourced from /sys/class/net (raw fallback).

  "storage.hbas[]":
    type: "object[]"
    priority: nice
    channel: [redfish, os, esxi]
    help_ko: >-
      FC HBA 목록. wwpn/link_status/link_speed_gbps/port_type. Linux 는
      /sys/class/fc_host, Windows 는 Get-InitiatorPort, ESXi 는 vmware_host_vmhba_info,
      Redfish 는 NetworkPorts PortType=FibreChannel 분류.
    help_en: >-
      FC HBA list. wwpn/link_status/link_speed_gbps/port_type. Sources:
      Linux=/sys/class/fc_host, Windows=Get-InitiatorPort, ESXi=vmware_host_vmhba_info,
      Redfish=NetworkPorts PortType=FibreChannel classification.

  "storage.infiniband[]":
    type: "object[]"
    priority: nice
    channel: [redfish, os, esxi]
    help_ko: >-
      InfiniBand 어댑터 목록. node_guid/link_status/rate. 벤더/펌웨어 노출
      여부에 따라 빈 list 가능 (best-effort).
    help_en: >-
      InfiniBand adapter list. node_guid/link_status/rate. May be empty depending
      on vendor/firmware exposure (best-effort).

  # ──────────────────────────────────────────────────────────────────────────
  # 운영 런타임 정보 (NTP / firewall / listening ports / swap)
  # ──────────────────────────────────────────────────────────────────────────

  "system.runtime":
    type: "object"
    priority: nice
    channel: [os, esxi]
    # cycle 2026-05-11 field-channel-refinement F5: OS channel 추가 (Linux + Windows 빌더 구현).
    # 9 필드 통일 shape (Linux/Windows/ESXi 동일):
    #   timezone(str) / ntp_active(bool) / ntp_synchronized(bool) /
    #   firewall_tool(str) / firewall_state(str) / listening_ports(int[]) /
    #   swap_total_mb(int) / swap_used_mb(int) / swap_free_mb(int)
    # Windows pagefile = Linux swap 등가 (swap_*_mb 로 표현 — Win32_PageFileUsage).
    # 정본 빌더:
    #   - os-gather/tasks/linux/gather_system.yml (raw 명령 — Python+raw fallback 양쪽)
    #   - os-gather/tasks/windows/gather_system.yml (Win32_PageFileUsage / Get-NetFirewallProfile)
    #   - esxi-gather (기존 — ESXi firewall 한정)
    help_ko: >-
      운영 런타임 정보. timezone, ntp_active/synchronized, firewall_tool/state,
      listening_ports[], swap_total/used/free_mb (9 필드 통일).
      Linux: firewalld/ufw/nftables/iptables 감지. Windows: windows_firewall + pagefile.
      ESXi: firewall_tool="esxi_firewall" 만 (런타임 상세 미수집).
      best-effort: 수집 불가 시 null/[].
    help_en: >-
      OS runtime info — 9 unified fields. timezone, ntp_active/synchronized,
      firewall_tool/state, listening_ports, swap_total/used/free_mb.
      Linux: firewalld/ufw/nftables/iptables detection. Windows: pagefile as swap_*_mb.
      ESXi: firewall_tool only (runtime detail not collected).
      Best-effort: null/[] when unavailable.

  # ──────────────────────────────────────────────────────────────────────────
  # cycle 2026-05-12 (ADR-2026-05-12) — RMC 멀티-노드 토폴로지
  # HPE CSUS 3200 / Superdome Flex 처럼 단일 진입점이 N개 Manager / N개 nPartition /
  # N개 Chassis 노출. adapter `vendor_notes.manager_layout` 정의 vendor 만 활성.
  # 기타 13 vendor 는 `data.multi_node = null` (Additive — envelope shape 변경 0).
  # ──────────────────────────────────────────────────────────────────────────

  "multi_node":
    type: "object|null"
    priority: nice
    channel: [redfish]
    help_ko: >-
      RMC 산하 멀티-노드 토폴로지 컨테이너. HPE CSUS 3200 / Superdome Flex 처럼 단일
      진입점이 N개 Manager / N개 nPartition / N개 Chassis 노출 환경에서 활성.
      adapter vendor_notes.manager_layout 미정의 vendor 는 null. 기존 data.system /
      data.bmc / ... 등 9 section path 는 Partition0 representative 로 유지 (Additive
      only — rule 92 R2).
    help_en: >-
      RMC multi-node topology container. Active for single-aggregated-controller
      environments like HPE CSUS 3200 / Superdome Flex. null when adapter
      vendor_notes.manager_layout not defined. Existing data.system/data.bmc/...
      paths retained as Partition0 representative (Additive only — rule 92 R2).

  "multi_node.enabled":
    type: "boolean"
    priority: nice
    channel: [redfish]
    help_ko: "멀티-노드 토폴로지 수집 활성 여부 (true / false / null)."
    help_en: "Multi-node topology collection enabled flag (true / false / null)."

  "multi_node.layout":
    type: "string|null"
    enum: [null, "rmc_primary", "rmc_primary_ilo_secondary"]
    priority: nice
    channel: [redfish]
    help_ko: >-
      Manager 토폴로지 레이아웃. rmc_primary = RMC 단일 진입점 (CSUS 3200).
      rmc_primary_ilo_secondary = RMC + 각 compute module iLO 5 보조 (Superdome Flex).
    help_en: >-
      Manager topology layout. rmc_primary = RMC sole entry (CSUS 3200).
      rmc_primary_ilo_secondary = RMC + per-compute-module iLO 5 secondary (Superdome Flex).

  "multi_node.summary":
    type: "object"
    priority: nice
    channel: [redfish]
    help_ko: >-
      partition_count / manager_count / chassis_count / representative_partition.
      호출자가 멀티-노드 규모 파악 시 사용.
    help_en: >-
      partition_count / manager_count / chassis_count / representative_partition.
      Used by callers to gauge multi-node scale.

  "multi_node.partitions[]":
    type: "object[]"
    priority: nice
    channel: [redfish]
    help_ko: >-
      Partition 별 system / cpu / memory / storage / network 수집 결과 리스트. 각
      entry: id (Partition0/Partition1) / system_uri / system / cpu / memory / storage / network.
    help_en: >-
      Per-partition collection results. Each entry: id / system_uri / system /
      cpu / memory / storage / network.

  "multi_node.managers[]":
    type: "object[]"
    priority: nice
    channel: [redfish]
    help_ko: >-
      Manager 별 bmc 수집 결과 리스트. 각 entry: id (RMC/PDHC0/Bay1.iLO5) / uri /
      role (primary/secondary) / bmc dict. bmc.name 은 라벨 분기 결과 (RMC / PDHC / iLO).
    help_en: >-
      Per-manager bmc results. Each entry: id (RMC/PDHC0/Bay1.iLO5) / uri /
      role (primary/secondary) / bmc dict. bmc.name reflects label classification.

  "multi_node.chassis[]":
    type: "object[]"
    priority: nice
    channel: [redfish]
    help_ko: >-
      Chassis 별 hardware/power 수집 결과 리스트. 각 entry: id / uri / kind
      (base/expansion/compute_module) / chassis_type / manufacturer / model /
      serial_number / part_number / power.
    help_en: >-
      Per-chassis hardware/power results. Each entry: id / uri / kind / chassis_type /
      manufacturer / model / serial_number / part_number / power.

  "diagnosis.details.multi_node_layout":
    type: "string|null"
    priority: nice
    channel: [redfish]
    help_ko: >-
      adapter vendor_notes.manager_layout 값 노출. 호출자가 multi_node 활성 여부를
      diagnosis 만으로 확인 가능.
    help_en: >-
      Mirrors adapter vendor_notes.manager_layout. Allows callers to detect
      multi-node activation from diagnosis without inspecting data.multi_node.

  "diagnosis.details.rmc_activation_check":
    type: "boolean|null"
    priority: nice
    channel: [redfish]
    help_ko: >-
      RMC Redfish API 활성화 검사 결과. manager_layout=rmc_* 환경에서 collect 성공
      시 true / 실패 시 false / 비-RMC 환경 시 null. HPE community 7200359 같은
      사이트 RMC 비활성 / 라이선스 부재 사고 진단 hint.
    help_en: >-
      RMC Redfish API activation check. true on success / false on failure under
      manager_layout=rmc_* / null for non-RMC environments. Diagnostic hint for
      site RMC deactivation cases (cf. HPE community 7200359).
