---
# ==============================================================================
# redfish.yml — Redfish 채널 전용 필드 정의
# ==============================================================================
# 서버 BMC (iDRAC / iLO / XCC / CIMC 등) 의 Redfish API 로만 얻을 수 있는 필드입니다.
# 펌웨어 인벤토리, 전원 / 발열, OEM 확장 정보 등이 여기에 해당합니다.
#
# 3 채널 공통 필드는 common.yml, OS / ESXi 채널 전용 필드는 각각의 파일 참조.
# ==============================================================================

channel: redfish

sections:
  hardware:
    fields:
      vendor:
        type: string
        display_name: "벤더"
        source: "_rf_raw_collect.data.system.manufacturer"

      model:
        type: string
        display_name: "모델"
        source: "_rf_raw_collect.data.system.model"

      serial:
        type: string
        display_name: "시리얼번호"
        source: "_rf_raw_collect.data.system.serial_number"

      uuid:
        type: string
        display_name: "시스템 UUID"
        source: "_rf_raw_collect.data.system.uuid"

      sku:
        type: string
        display_name: "SKU"

      bios_version:
        type: string
        display_name: "BIOS 버전"
        source: "_rf_raw_collect.data.system.bios_version"

      bios_date:
        type: string
        display_name: "BIOS 날짜"

      power_state:
        type: string
        display_name: "전원 상태"

      health:
        type: string
        display_name: "시스템 상태"

      oem:
        type: dict
        display_name: "OEM 확장 데이터"

  bmc:
    fields:
      name:
        type: string
        display_name: "BMC 이름"

      firmware_version:
        type: string
        display_name: "BMC 펌웨어 버전"

      model:
        type: string
        display_name: "BMC 모델"

      manager_type:
        type: string
        display_name: "매니저 유형"

      health:
        type: string
        display_name: "BMC 상태"

      ip:
        type: string
        display_name: "BMC IP 주소"

      oem:
        type: dict
        display_name: "OEM 확장 데이터"

  firmware:
    description: "UpdateService/FirmwareInventory에서 수집한 펌웨어 목록"
    item_fields:
      id:
        type: string
        display_name: "펌웨어 ID"

      name:
        type: string
        display_name: "컴포넌트명"

      version:
        type: string
        display_name: "버전"

      updateable:
        type: boolean
        display_name: "업데이트 가능 여부"

      component:
        type: string
        display_name: "컴포넌트 유형"

  power:
    fields:
      power_supplies:
        type: list
        display_name: "전원 공급 장치 목록"
        item_fields:
          name:
            type: string
          model:
            type: string
          serial:
            type: string
          manufacturer:
            type: string
          power_capacity_w:
            type: integer
          firmware_version:
            type: string
          health:
            type: string
          state:
            type: string

      power_control:
        type: dict
        display_name: "전력 소비 정보"
        fields:
          power_consumed_watts:
            type: integer
          power_capacity_watts:
            type: integer
          interval_in_min:
            type: integer
          min_consumed_watts:
            type: integer
          avg_consumed_watts:
            type: integer
          max_consumed_watts:
            type: integer

  storage:
    fields:
      physical_disks:
        type: list
        display_name: "물리 디스크 목록"
        item_fields:
          device:
            type: string
          model:
            type: string
          serial:
            type: string
          total_mb:
            type: integer
          media_type:
            type: string
          protocol:
            type: string
          health:
            type: string
          failure_predicted:
            type: boolean
          predicted_life_percent:
            type: integer

      controllers:
        type: list
        display_name: "스토리지 컨트롤러 목록"
        item_fields:
          id:
            type: string
          name:
            type: string
          health:
            type: string
          drives:
            type: list

  network:
    fields:
      interfaces:
        type: list
        display_name: "네트워크 인터페이스 목록"
        item_fields:
          id:
            type: string
          name:
            type: string
          kind:
            type: string
          mac:
            type: string
          mtu:
            type: integer
          speed_mbps:
            type: integer
          link_status:
            type: string
          is_primary:
            type: boolean
          addresses:
            type: list
