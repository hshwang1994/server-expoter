# =============================================================================
# server-exporter / ansible.cfg — 프로젝트 마스터 설정
# =============================================================================
# 모든 채널(os-gather, esxi-gather, redfish-gather)이 이 파일을 참조한다.
# Jenkins WORKSPACE 루트에서 실행하는 것을 전제로 경로가 설정되어 있다.
#
# 우선순위: ANSIBLE_CONFIG 환경변수 > CWD/ansible.cfg > ~/.ansible.cfg > /etc/ansible/ansible.cfg
# Jenkins 빌드 시 Jenkinsfile에서 ANSIBLE_CONFIG=${WORKSPACE}/ansible.cfg 설정 권장.
# =============================================================================

[defaults]

# ── 커스텀 플러그인 경로 ──────────────────────────────────────────────────────
# 프로젝트 전역 플러그인 (우선) : 채널별 플러그인 (fallback)
lookup_plugins  = ./lookup_plugins
filter_plugins  = ./filter_plugins
callback_plugins = ./callback_plugins
library         = ./common/library:./redfish-gather/library
module_utils    = ./module_utils

# ── stdout callback ──────────────────────────────────────────────────────────
# json_only 콜백이 외부로 전달되는 JSON stdout을 제어
stdout_callback = json_only
# callback_whitelist 는 deprecated → callback_enabled 사용
callbacks_enabled = json_only

# ── 동시 실행 / 타임아웃 ────────────────────────────────────────────────────
# 2026-04-30: forks 20 → 200 (대규모 lab/운영 환경 동시 수집 대응).
# Jenkins agent 메모리 / SSH/HTTPS connection limit 모니터링 권장.
forks = 200
timeout = 60
gather_timeout = 60

# ── SSH / 연결 ───────────────────────────────────────────────────────────────
host_key_checking = False
# Windows 타겟: pywinrm 사용 시 자동 감지 (os-gather 에서 설정)
# transport = smart

# ── Python 인터프리터 ────────────────────────────────────────────────────────
interpreter_python = auto

# ── Jinja2 네이티브 타입 ──────────────────────────────────────────────────────
# int/float/bool 필터 결과를 Python 네이티브 타입으로 유지 (JSON 출력 시 정확한 타입 보장)
jinja2_native = True

# ── fact gathering ─────────────────────────────────────────────────────────
gathering = explicit

# ── fact caching ──────────────────────────────────────────────────────────
# gathering = explicit + gather_facts: no 이므로 fact caching 불필요.
# Redis fact caching은 /etc/ansible/ansible.cfg (Agent 공통 설정)에서 관리.

# ── 기타 ─────────────────────────────────────────────────────────────────────
retry_files_enabled = False
deprecation_warnings = False
# Vault 비밀번호 파일 (Jenkins에서는 credentials binding으로 대체)
# vault_password_file = .vault_pass

# ── 콘솔 출력 최적화 ────────────────────────────────────────────────────────
# OUTPUT JSON + PLAY RECAP + 에러/경고만 남기고 정상 동작 로그를 줄인다.
display_ok_hosts = False
display_skipped_hosts = False
# 디버깅 시 주석 해제
# log_path = ./ansible.log
# display_ok_hosts = True
# display_skipped_hosts = True

[inventory]
# 동적 인벤토리 스크립트 허용
enable_plugins = script, auto

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

[privilege_escalation]
become = False

[winrm]
transport = ntlm
