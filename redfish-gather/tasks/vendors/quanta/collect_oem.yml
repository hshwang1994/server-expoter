---
# redfish-gather/tasks/vendors/quanta/collect_oem.yml
#
# Quanta QCT BMC OEM 특화 수집 (Oem.Quanta_Computer_Inc / Oem.QCT fallback)
# 결과는 반드시 fragment 로만 생성하고 merge_fragment 를 호출한다.
#
# M-F1 cycle 2026-05-07-all-vendor-coverage: Quanta OEM tasks 신설
# Fragment 철학 (rule 22)
#
# source: Quanta QCT BMC User Guide (확인 2026-05-11 — lab 부재)
# source: https://www.qct.io/product/index/Server/rackmount-server/
# source: https://www.exalit.com/storage/2023/09/D54Q-2U_v20230330.pdf
# source: GitHub community Quanta Redfish 사용자 보고
# lab: 부재 (사용자 명시 2026-05-01) — vault 신설 완료 (M-A4)
#
# Quanta OEM namespace 변형:
#   - Oem.Quanta_Computer_Inc (vendor 공식 — 일반 vendor 표기)
#   - Oem.QCT                 (단축 표기 fallback)
#   - Oem.OpenBmc             (OpenBMC base — adapter vendor_notes 기반)
#   - ODM 모델 (Microsoft Olympus / Open Compute Project / Meta) 은 customer-specific 변형 (lab 도입 후 보정)
#
# Quanta 는 OpenBMC base — OEM 영역 일반적으로 약함. graceful degradation 정상.

- name: "redfish | quanta | collect_oem — System / Chassis OEM data 수집 (best-effort)"
  block:
    - name: "redfish | quanta | System Oem.Quanta_Computer_Inc / Oem.QCT / Oem.OpenBmc fallback"
      ansible.builtin.set_fact:
        _quanta_oem_system: >-
          {{
            (_rf_raw_collect.systems[0].Oem.Quanta_Computer_Inc
              | default(_rf_raw_collect.systems[0].Oem.QCT
              | default(_rf_raw_collect.systems[0].Oem.OpenBmc
              | default({}))))
          }}
      when:
        - _rf_raw_collect is defined
        - _rf_raw_collect.systems is defined
        - _rf_raw_collect.systems | length > 0

    - name: "redfish | quanta | Chassis Oem.Quanta_Computer_Inc / Oem.QCT / Oem.OpenBmc fallback"
      ansible.builtin.set_fact:
        _quanta_oem_chassis: >-
          {{
            (_rf_raw_collect.chassis[0].Oem.Quanta_Computer_Inc
              | default(_rf_raw_collect.chassis[0].Oem.QCT
              | default(_rf_raw_collect.chassis[0].Oem.OpenBmc
              | default({}))))
          }}
      when:
        - _rf_raw_collect is defined
        - _rf_raw_collect.chassis is defined
        - _rf_raw_collect.chassis | length > 0

    - name: "redfish | quanta | Manager Oem.Quanta_Computer_Inc / Oem.QCT / Oem.OpenBmc fallback"
      ansible.builtin.set_fact:
        _quanta_oem_manager: >-
          {{
            (_rf_raw_collect.managers[0].Oem.Quanta_Computer_Inc
              | default(_rf_raw_collect.managers[0].Oem.QCT
              | default(_rf_raw_collect.managers[0].Oem.OpenBmc
              | default({}))))
          }}
      when:
        - _rf_raw_collect is defined
        - _rf_raw_collect.managers is defined
        - _rf_raw_collect.managers | length > 0
  rescue:
    - name: "redfish | quanta | OEM 영역 부재 — OpenBMC base 정상 / graceful degradation"
      ansible.builtin.set_fact:
        _quanta_oem_system: {}
        _quanta_oem_chassis: {}
        _quanta_oem_manager: {}
        _quanta_oem_errors: []  # Quanta OEM 부재는 정상 (OpenBMC base)

- name: "redfish | quanta | OEM 변수 기본값 보정"
  ansible.builtin.set_fact:
    _quanta_oem_system: "{{ _quanta_oem_system | default({}) }}"
    _quanta_oem_chassis: "{{ _quanta_oem_chassis | default({}) }}"
    _quanta_oem_manager: "{{ _quanta_oem_manager | default({}) }}"
    _quanta_oem_errors: "{{ _quanta_oem_errors | default([]) }}"
