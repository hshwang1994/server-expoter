---
# redfish-gather/tasks/vendors/quanta/normalize_oem.yml
#
# Quanta QCT BMC OEM 정규화 — Oem.Quanta_Computer_Inc / Oem.QCT fallback
# fragment 방식 (rule 22) — 자기 fragment 만 생성하고 merge_fragment 호출
#
# M-F1 cycle 2026-05-07-all-vendor-coverage: Quanta OEM tasks 신설
#
# 원칙:
#   - 표준 스키마 섹션 (bmc) 안의 하위 필드로 확장 (새 섹션 추가 안 함)
#   - Quanta 는 OpenBMC base — OEM 영역 약함이 정상

- name: "redfish | quanta | normalize_oem — fragment 생성"
  ansible.builtin.set_fact:
    _data_fragment:
      bmc:
        oem_quanta:
          system_info: "{{ _quanta_oem_system | default({}) }}"
          chassis_info: "{{ _quanta_oem_chassis | default({}) }}"
          manager_info: "{{ _quanta_oem_manager | default({}) }}"
    _sections_supported_fragment: []
    _sections_collected_fragment: []
    _sections_failed_fragment: []
    _errors_fragment: "{{ _quanta_oem_errors | default([]) }}"
  no_log: false

- name: "redfish | quanta | OEM fragment 누적 병합"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/common/tasks/normalize/merge_fragment.yml"
