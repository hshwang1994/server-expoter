---
# redfish-gather/tasks/vendors/hpe/collect_oem.yml
#
# HPE OEM 특화 수집 (Oem.Hpe namespace)
# 결과는 반드시 fragment 로만 생성하고 merge_fragment 를 호출한다.
#
# Fragment 철학 (rule 22) — 자기 fragment 만
# Additive only (rule 92 R2) — 기존 iLO 시리즈 영역 변경 0 / Superdome 분기 추가만
#
# M-G1 cycle 2026-05-07-all-vendor-coverage: Superdome Flex (Gen 1/2 + 280) 분기 보강
# M-CSUS3200 cycle 2026-05-11: HPE CSUS 3200 (Compute Scale-up Server 3200) 분기 확장
#   — Superdome Flex 후속 (HPE 공식 "built on the proven HPE Superdome Flex architecture")
#   — 동일 Oem.Hpe namespace + PartitionInfo/FlexNodeInfo/GlobalConfiguration 상속
#   — model regex 확장 Additive only (rule 92 R2) — fragment shape 변경 0
#
# cycle 2026-05-12 (ADR-2026-05-12) — RMC 멀티-노드 토폴로지 정식 지원:
#   - 본 task 는 Partition0 representative OEM 영역만 처리 (현행 placeholder 유지).
#   - 멀티 partition 별 Oem.Hpe.PartitionInfo 정밀화는 lab 도입 cycle 영역 (NEXT_ACTIONS C7).
#   - 실제 multi-node 데이터는 redfish_gather.py `_collect_multi_node_topology` 가 수집해
#     `data.multi_node.partitions[]` 컨테이너에 노출 (envelope Additive — rule 92 R2).
#   - lab 도입 후 본 task 를 `_rf_raw_collect.multi_node.partitions[].system.Oem.Hpe.*`
#     loop 로 확장 — 단, gather_systems_multi 가 raw OEM 보존 API 추가 필요.
#
# source: HPE Superdome Flex Server Admin Guide (확인 2026-05-11 — lab 부재)
# source: https://support.hpe.com/hpesc/public/docDisplay (Superdome Flex/280 매뉴얼)
# source: https://github.com/HewlettPackard/sdflexutils (sdflexutils 1.5.1)
# source: https://hewlettpackard.github.io/ilo-rest-api-docs/ilo5/ (iLO 5 API reference)
# source: https://www.hpe.com/psnow/doc/a50009596enw (CSUS 3200 architecture and RAS — Superdome Flex 후속 명시)
# source: https://cdrdv2-public.intel.com/792357/FAQ%20-%20HPE%20Compute%20Scale-up%20Server%203200.pdf (CSUS 3200 FAQ — RMC + 표준 Redfish)
# lab: 부재 (사용자 명시 2026-05-01 / CSUS3200 사용자 명시 2026-05-11)
#
# OEM namespace: Oem.Hpe (iLO 시리즈 + Superdome + CSUS 3200 공통)
# Superdome / CSUS 3200 공통 특이 영역:
#   - Oem.Hpe.PartitionInfo       (Systems) — nPAR 파티션 정보
#   - Oem.Hpe.FlexNodeInfo        (Chassis) — Flex Node 구성 (CSUS 3200 도 상속 추정 — lab 실측 시 정정)
#   - Oem.Hpe.GlobalConfiguration (Systems/Managers) — Superdome / CSUS 전역 설정

# ── 1) iLO 시리즈 OEM 수집 placeholder (현행 유지 — 변경 0 / Additive) ───────────
- name: "redfish | hpe | iLO 시리즈 OEM 수집 (placeholder — 향후 확장)"
  ansible.builtin.set_fact:
    _hpe_oem_ilo_smartstorage: {}
    _hpe_oem_ilo_thermal: {}
  no_log: true

# ── 2) Superdome Flex / CSUS 3200 분기 (M-G1 + M-CSUS3200) — model_patterns 매칭 시만 ──
- name: "redfish | hpe | Superdome Flex / CSUS 3200 OEM 수집 (모델 매칭 시)"
  block:
    - name: "redfish | hpe | Superdome/CSUS — PartitionInfo 추출 (Systems.Oem.Hpe.PartitionInfo)"
      ansible.builtin.set_fact:
        _hpe_superdome_partition: >-
          {{
            (_rf_raw_collect.systems[0].Oem.Hpe.PartitionInfo | default({}))
          }}
      when:
        - _rf_raw_collect is defined
        - _rf_raw_collect.systems is defined
        - _rf_raw_collect.systems | length > 0

    - name: "redfish | hpe | Superdome/CSUS — FlexNodeInfo 추출 (Chassis.Oem.Hpe.FlexNodeInfo)"
      ansible.builtin.set_fact:
        _hpe_superdome_flex_node: >-
          {{
            (_rf_raw_collect.chassis[0].Oem.Hpe.FlexNodeInfo | default({}))
          }}
      when:
        - _rf_raw_collect is defined
        - _rf_raw_collect.chassis is defined
        - _rf_raw_collect.chassis | length > 0

    - name: "redfish | hpe | Superdome/CSUS — GlobalConfiguration 추출 (Systems.Oem.Hpe.GlobalConfiguration)"
      ansible.builtin.set_fact:
        _hpe_superdome_global: >-
          {{
            (_rf_raw_collect.systems[0].Oem.Hpe.GlobalConfiguration | default({}))
          }}
      when:
        - _rf_raw_collect is defined
        - _rf_raw_collect.systems is defined
        - _rf_raw_collect.systems | length > 0
  rescue:
    - name: "redfish | hpe | Superdome/CSUS OEM 영역 부재 (정상 — 일반 iLO 시리즈)"
      ansible.builtin.set_fact:
        _hpe_superdome_partition: {}
        _hpe_superdome_flex_node: {}
        _hpe_superdome_global: {}
  when:
    # Superdome / CSUS 3200 모델 시그니처 매칭 (lab 부재 — model_patterns 기반)
    # _rf_detected_model 이 없거나 매칭 안 되면 block 자체 skip (Additive)
    # M-CSUS3200 cycle 2026-05-11: "Compute Scale-up|CSUS" 추가 — fragment shape 동일 유지
    # 2026-05-11 fix: regex_search 가 미매치 시 None 반환 — Ansible strict mode 에서 NoneType conditional fail.
    # 일반 iLO 모델 (예: DL380 Gen11) 에서 본 conditional 평가 시 task 전체 fail 사고 (build #133/135/136/137).
    # `is not none` 명시 boolean 변환으로 차단.
    - "((_rf_detected_model | default('')) | regex_search('(?i)Superdome|Flex|Compute Scale-up|CSUS')) is not none"

- name: "redfish | hpe | Superdome/CSUS 변수 기본값 보정 (when 미진입 / rescue 미진입)"
  ansible.builtin.set_fact:
    _hpe_superdome_partition: "{{ _hpe_superdome_partition | default({}) }}"
    _hpe_superdome_flex_node: "{{ _hpe_superdome_flex_node | default({}) }}"
    _hpe_superdome_global: "{{ _hpe_superdome_global | default({}) }}"

# ── 3) 기존 placeholder fragment (현행 유지 — iLO 시리즈 cover) ──────────────────
- name: "redfish | hpe | collect_oem placeholder fragment (iLO 시리즈)"
  ansible.builtin.set_fact:
    _data_fragment:               {}
    _sections_supported_fragment: []
    _sections_collected_fragment: []
    _sections_failed_fragment:    []
    _errors_fragment:             []
  no_log: true

# OEM 수집이 생기면 아래처럼 확장:
# - name: "redfish | hpe | collect OEM endpoint"
#   uri: ...
#   register: _rf_hpe_oem_raw
#
# - name: "redfish | hpe | build OEM fragment"
#   set_fact:
#     _data_fragment:
#       hardware:
#         oem_hpe: { ... }    # 기존 hardware 에 하위 필드 추가
#     _sections_supported_fragment: []
#     _sections_collected_fragment: []
#     _sections_failed_fragment:    []
#     _errors_fragment:             []
#
# - include_tasks: common/tasks/normalize/merge_fragment.yml
