---
# redfish-gather/tasks/vendors/cisco/collect_oem.yml
#
# Cisco UCS / CIMC OEM 데이터 수집 — Oem.Cisco / Oem.Cisco_RackUnit namespace
#
# source: Cisco UCS C-series / X-series Redfish guide (확인 2026-05-07)
#   - https://www.cisco.com/c/en/us/td/docs/unified_computing/ucs/c/sw/api/3_0/b_Cisco_UCS_C-Series_Redfish_API_Guide_3_0.html
#   - https://www.cisco.com/c/en/us/td/docs/unified_computing/ucs/x/api/intersight/b_Cisco_Intersight_Managed_Mode_Redfish_API_Guide.html
#   - https://github.com/CiscoUcs (community)
# Fragment 철학 (rule 22) — 자기 fragment 만, 다른 gather 침범 금지
# lab: PASS — UCS X-series (cycle 2026-05-06 사이트 검증 commit `0a485823`)
#       부재 — UCS B-series (UCS Manager 매개) / CIMC C-series 1.x-4.x / S-series
#
# Oem.Cisco / Oem.Cisco_RackUnit 주요 sub-namespace (web sources):
#   - Oem.Cisco.ServerProfile      — UCS X-series Intersight profile
#   - Oem.Cisco_RackUnit.RackUnit  — CIMC C-series legacy
#   - Oem.Cisco.FaultEvents        — Cisco-specific fault aggregation
#
# CIMC 1.x 는 OEM 영역 약함 — rescue block 으로 graceful degradation
# Additive only (rule 92 R2) — UCS X-series 사이트 검증 envelope shape 변경 0

- name: "redfish | cisco | collect_oem — best-effort"
  block:
    - name: "redfish | cisco | collect_oem | extract System.Oem.Cisco / Cisco_RackUnit fallback"
      ansible.builtin.set_fact:
        _cisco_oem_system: >-
          {{
            (((_rf_raw_collect.data | default({})).system | default({})).Oem | default({})).Cisco
            | default((((_rf_raw_collect.data | default({})).system | default({})).Oem | default({})).Cisco_RackUnit | default({}))
          }}
      no_log: true

    - name: "redfish | cisco | collect_oem | extract Chassis.Oem.Cisco / Cisco_RackUnit fallback"
      ansible.builtin.set_fact:
        _cisco_oem_chassis: >-
          {{
            (((_rf_raw_collect.data | default({})).chassis | default({})).Oem | default({})).Cisco
            | default((((_rf_raw_collect.data | default({})).chassis | default({})).Oem | default({})).Cisco_RackUnit | default({}))
          }}
      no_log: true

    - name: "redfish | cisco | collect_oem | build fragment (자기 fragment만)"
      ansible.builtin.set_fact:
        _data_fragment:
          bmc:
            oem_cisco:
              server_profile: "{{ _cisco_oem_system.ServerProfile | default(omit) }}"
              fault_events:   "{{ _cisco_oem_system.FaultEvents | default(omit) }}"
              rack_unit:      "{{ _cisco_oem_chassis.RackUnit | default(omit) }}"
              chassis_info:   "{{ _cisco_oem_chassis | default(omit) if (_cisco_oem_chassis | length > 0) else omit }}"
              system_info:    "{{ _cisco_oem_system  | default(omit) if (_cisco_oem_system  | length > 0) else omit }}"
        _sections_supported_fragment: []
        _sections_collected_fragment: []
        _sections_failed_fragment:    []
        _errors_fragment:             []
      no_log: true
  rescue:
    - name: "redfish | cisco | collect_oem | rescue (CIMC 1.x OEM 약함 가능성)"
      ansible.builtin.set_fact:
        _data_fragment:               {}
        _sections_supported_fragment: []
        _sections_collected_fragment: []
        _sections_failed_fragment:    []
        _errors_fragment:
          - section: bmc
            message: "Cisco OEM 영역 일부 미수집 (CIMC 1.x / UCS Manager 매개 가능성 — graceful degradation)"
            severity: warning
      no_log: true

# fragment 누적 병합 (rule 22 R3 — merge_fragment.yml 호출 의무)
- name: "redfish | cisco | collect_oem | merge fragment"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/common/tasks/normalize/merge_fragment.yml"
