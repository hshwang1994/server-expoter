---
# redfish-gather/tasks/vendors/fujitsu/collect_oem.yml
#
# Fujitsu iRMC OEM 특화 수집 (Oem.ts_fujitsu / Oem.Fujitsu fallback namespace)
# 결과는 반드시 fragment 로만 생성하고 merge_fragment 를 호출한다.
#
# M-E2 cycle 2026-05-07-all-vendor-coverage: Fujitsu OEM tasks 신설
# Fragment 철학 (rule 22) — 자기 fragment 만, 누적 변수 직접 수정 금지
#
# source: Fujitsu iRMC RESTful API guide (확인 2026-05-11 — lab 부재)
# source: https://github.com/fujitsu/iRMC-REST-API
# source: https://manualzz.com/doc/37690590/irmc-restful-api-v5.0
# lab: 부재 (사용자 명시 2026-05-01) — vault 신설 완료 (M-A3)
#
# OEM namespace 변형 (펌웨어 / generation 차이):
#   - Oem.ts_fujitsu (Fujitsu Technology Solutions 공식 — iRMC S5+ 우선)
#   - Oem.Fujitsu    (단순 표기 — 일부 펌웨어 변형 fallback)
#   - iRMC S2 generation 은 Oem 영역 부재 가능 (Redfish 미지원)

- name: "redfish | fujitsu | collect_oem — System / Chassis OEM data 수집 (best-effort)"
  block:
    - name: "redfish | fujitsu | System Oem.ts_fujitsu / Oem.Fujitsu fallback"
      ansible.builtin.set_fact:
        _fujitsu_oem_system: >-
          {{
            (_rf_raw_collect.systems[0].Oem.ts_fujitsu
              | default(_rf_raw_collect.systems[0].Oem.Fujitsu
              | default({})))
          }}
      when:
        - _rf_raw_collect is defined
        - _rf_raw_collect.systems is defined
        - _rf_raw_collect.systems | length > 0

    - name: "redfish | fujitsu | Chassis Oem.ts_fujitsu / Oem.Fujitsu fallback"
      ansible.builtin.set_fact:
        _fujitsu_oem_chassis: >-
          {{
            (_rf_raw_collect.chassis[0].Oem.ts_fujitsu
              | default(_rf_raw_collect.chassis[0].Oem.Fujitsu
              | default({})))
          }}
      when:
        - _rf_raw_collect is defined
        - _rf_raw_collect.chassis is defined
        - _rf_raw_collect.chassis | length > 0

    - name: "redfish | fujitsu | Manager Oem.ts_fujitsu / Oem.Fujitsu fallback"
      ansible.builtin.set_fact:
        _fujitsu_oem_manager: >-
          {{
            (_rf_raw_collect.managers[0].Oem.ts_fujitsu
              | default(_rf_raw_collect.managers[0].Oem.Fujitsu
              | default({})))
          }}
      when:
        - _rf_raw_collect is defined
        - _rf_raw_collect.managers is defined
        - _rf_raw_collect.managers | length > 0
  rescue:
    - name: "redfish | fujitsu | OEM 영역 부재 — iRMC S2 가능성 / graceful degradation"
      ansible.builtin.set_fact:
        _fujitsu_oem_system: {}
        _fujitsu_oem_chassis: {}
        _fujitsu_oem_manager: {}
        _fujitsu_oem_errors:
          - section: bmc
            severity: warning
            message: "Fujitsu OEM 영역 부재 또는 추출 실패 (iRMC S2 Redfish 미지원 가능성)"

- name: "redfish | fujitsu | OEM 변수 기본값 보정 (rescue 미진입 케이스)"
  ansible.builtin.set_fact:
    _fujitsu_oem_system: "{{ _fujitsu_oem_system | default({}) }}"
    _fujitsu_oem_chassis: "{{ _fujitsu_oem_chassis | default({}) }}"
    _fujitsu_oem_manager: "{{ _fujitsu_oem_manager | default({}) }}"
    _fujitsu_oem_errors: "{{ _fujitsu_oem_errors | default([]) }}"
