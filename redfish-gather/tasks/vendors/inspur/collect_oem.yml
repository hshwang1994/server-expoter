---
# redfish-gather/tasks/vendors/inspur/collect_oem.yml
#
# Inspur ISBMC OEM мҲҳм§‘ вҖ” Oem.Inspur лҳҗлҠ” Oem.Inspur_System namespace
#
# source: Inspur кіөмӢқ л§Өлүҙм–ј + GitHub community (нҷ•мқё 2026-05-07)
#   - https://manualzz.com/doc/o/v7c5h/inspur-server-user-manual-nf5280m5-9.14-redfish
#   - https://www.inspur.com/eportal/fileDir/defaultCurSite/resource/cms/2020/04/2020040211224398612.pdf
# Fragment мІ н•ҷ (rule 22) вҖ” мһҗкё° fragment л§Ң
# lab: л¶Җмһ¬ (мӮ¬мҡ©мһҗ лӘ…мӢң 2026-05-01) вҖ” mock fixture кё°л°ҳ (M-D2)
#
# Oem.Inspur sub-namespace (web sources вҖ” Inspur OEM мҳҒм—ӯмқҖ лӢӨлҘё vendor ліҙлӢӨ м•Ҫн•Ё):
#   - Oem.Inspur.SystemInfo  вҖ” мӢңмҠӨн…ң м¶”к°Җ м •ліҙ (CPLD / BIOS лі„лҸ„)
#   - Oem.Inspur.NetworkInfo вҖ” NIC м¶”к°Җ м •ліҙ
#   - Oem.Inspur_System      вҖ” мқјл¶Җ нҺҢмӣЁм–ҙ underscore ліҖнҳ• мӮ¬мҡ© (fallback)
#
# Inspur OEM л¶Җмһ¬лҠ” м •мғҒ вҖ” fail мІҳлҰ¬ м•Ҳ н•Ё (graceful)

- name: "redfish | inspur | collect_oem вҖ” best-effort"
  block:
    - name: "redfish | inspur | collect_oem | extract System.Oem.Inspur (with underscore fallback)"
      ansible.builtin.set_fact:
        _inspur_oem_system: >-
          {{ (((_rf_raw_collect.data | default({})).system | default({})).Oem | default({})).Inspur
             | default((((_rf_raw_collect.data | default({})).system | default({})).Oem | default({})).Inspur_System
                       | default({})) }}
      no_log: true

    - name: "redfish | inspur | collect_oem | extract Chassis.Oem.Inspur (with underscore fallback)"
      ansible.builtin.set_fact:
        _inspur_oem_chassis: >-
          {{ (((_rf_raw_collect.data | default({})).chassis | default({})).Oem | default({})).Inspur
             | default((((_rf_raw_collect.data | default({})).chassis | default({})).Oem | default({})).Inspur_System
                       | default({})) }}
      no_log: true

    - name: "redfish | inspur | collect_oem | build fragment (мһҗкё° fragmentл§Ң)"
      ansible.builtin.set_fact:
        _data_fragment:
          bmc:
            oem_inspur:
              system_info:  "{{ _inspur_oem_system.SystemInfo  | default(omit) }}"
              network_info: "{{ _inspur_oem_system.NetworkInfo | default(omit) }}"
              chassis_info: "{{ _inspur_oem_chassis | default(omit) }}"
              # raw мҳҒм—ӯ ліҙмЎҙ (мӮ¬мқҙнҠё fixture лҸ„мһ… мӢң л¶„кё° м •м • мһ…л Ҙ)
              raw_system:   "{{ _inspur_oem_system | default(omit) }}"
        _sections_supported_fragment: []
        _sections_collected_fragment: []
        _sections_failed_fragment:    []
        _errors_fragment:             []
      no_log: true
  rescue:
    - name: "redfish | inspur | collect_oem | rescue (Inspur OEM л¶Җмһ¬лҠ” м •мғҒ вҖ” graceful)"
      ansible.builtin.set_fact:
        _data_fragment:               {}
        _sections_supported_fragment: []
        _sections_collected_fragment: []
        _sections_failed_fragment:    []
        _errors_fragment:             []   # Inspur OEM л¶Җмһ¬лҠ” fail м•„лӢҳ
      no_log: true

# fragment лҲ„м Ғ лі‘н•© (rule 22 R3)
- name: "redfish | inspur | collect_oem | merge fragment"
  ansible.builtin.include_tasks: "{{ playbook_dir }}/common/tasks/normalize/merge_fragment.yml"
