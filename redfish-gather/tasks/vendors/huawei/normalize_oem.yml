---
# redfish-gather/tasks/vendors/huawei/normalize_oem.yml
#
# Huawei OEM 정규화 — fragment 형식 (rule 22 R1+R7+R8)
#
# 원칙:
#   - 표준 스키마 섹션 안의 하위 필드로 확장 (새 섹션 추가 최소화)
#   - fragment 방식 유지 (자기 fragment 만 — 다른 gather 침범 금지)
#   - collect_oem.yml 에서 이미 _data_fragment.bmc.oem_huawei 누적 — 본 파일은 후처리 일관성 유지
#
# Fragment 변수 (rule 22 R7) — 자기 fragment 만:
#   _data_fragment, _sections_supported_fragment, _sections_collected_fragment,
#   _sections_failed_fragment, _errors_fragment

- name: "redfish | huawei | normalize_oem — debug summary"
  ansible.builtin.debug:
    msg: >-
      Huawei OEM normalize: {{ _rf_vendor | default('unknown') }} —
      oem_huawei keys: {{ ((_collected_data | default({})).bmc | default({})).oem_huawei | default({}) | dict2items | map(attribute='key') | list }}
  no_log: false
  when: (_collected_data | default({})).bmc is defined
