---
# redfish-gather/tasks/account_service.yml
#
# P2 (cycle 2026-04-28): recovery 자격으로 접속한 경우 공통계정(infraops) 자동 생성/복구.
#
# 진입 조건:
#   - _rf_used_account.role == 'recovery'
#   - _rf_collect_ok == true (recovery 로 1차 수집은 성공한 상태)
#   - vault accounts 안에 role=primary 후보 1개 이상
#
# 동작:
#   1. vault accounts 에서 role=primary 후보 1개 추출 → target_username/target_password
#   2. dryrun (default ON, 사용자 결정 #4) 시 시뮬레이션만
#   3. dryrun OFF 시 redfish_gather mode='account_provision' 호출
#   4. 결과를 envelope.meta.account_service 에 노출 (password 미포함)
#
# dryrun 변수:
#   _rf_account_service_dryrun (default false — cycle 2026-04-30 사용자 명시 승인으로 OFF 전환)
#   원래 default true (cycle-014 결정 — lab 잠금 위험 회피). 사용자 명시 승인으로 false 전환됨.
#   외부 override: -e _rf_account_service_dryrun=true (시뮬레이션 모드 강제)

- name: "redfish | account_service | resolve target primary account"
  ansible.builtin.set_fact:
    _rf_target_account: >-
      {{ (_rf_accounts | default([]) | selectattr('role', 'eq', 'primary') | list | first) | default({}) }}
    # F49 (cycle 2026-05-01): label 매칭으로 lookup 정확도 강화.
    # 기존: username 만으로 lookup → Dell root 4개 / HPE admin 2개 / Lenovo USERID 2개
    #       시 첫 entry 잡혀 password mismatch (사이트 실측 사고).
    # 신: label 우선 매칭 (try_one_account.yml 가 label 까지 promote) → 정확한 entry.
    #     fallback: label 매칭 0건 시 username 매칭 (legacy_single 등 backward-compat).
    _rf_recovery_account_resolved: >-
      {{ (
           _rf_accounts | default([])
             | selectattr('label','eq', (_rf_used_account | default({})).label | default(''))
             | list | first
         ) | default(
           _rf_accounts | default([])
             | selectattr('username','eq', (_rf_used_account | default({})).username | default(''))
             | list | first,
           true
         ) | default({}) }}
    # cycle 2026-04-30: 사용자 명시 승인 — default false 로 전환 (실 동작)
    _rf_account_service_dryrun: "{{ _rf_account_service_dryrun | default(false) }}"
  no_log: true

- name: "redfish | account_service | abort if no primary target"
  ansible.builtin.debug:
    msg: >-
      account_service skip — vault accounts 에 role=primary 후보 없음.
      vault/redfish/{{ _rf_vault_profile }}.yml 갱신 후 재시도.
  when: (_rf_target_account | default({})).username | default('') == ''

- when:
    - (_rf_target_account | default({})).username | default('') != ''
  block:

    - name: "redfish | account_service | log intent"
      ansible.builtin.debug:
        msg: >-
          account_service intent — vendor={{ _rf_vendor | default('unknown') }},
          recovery_label={{ (_rf_used_account | default({})).label | default('?') }},
          target_username={{ _rf_target_account.username }},
          dryrun={{ _rf_account_service_dryrun }}

    # ── recovery 자격으로 AccountService 호출 ────────────────────────────
    # F49 (cycle 2026-05-01): _rf_used_account_password (try_one_account.yml 가 직접 promote)
    # 우선 사용. 없으면 _rf_recovery_account_resolved.password 로 fallback (label 매칭).
    # Jinja2 if/else 표현 (괄호로 우선순위 명시 — `>` 와 `| ternary` 충돌 회피).
    - name: "redfish | account_service | resolve recovery creds"
      ansible.builtin.set_fact:
        _rf_acct_recovery_user: >-
          {{ ((_rf_used_account | default({})).username | default(''))
             if ((_rf_used_account_password | default('')) | length > 0)
             else (_rf_recovery_account_resolved.username | default('')) }}
        _rf_acct_recovery_pass: >-
          {{ (_rf_used_account_password | default(''))
             if ((_rf_used_account_password | default('')) | length > 0)
             else (_rf_recovery_account_resolved.password | default('')) }}
      no_log: true

    - name: "redfish | account_service | invoke"
      redfish_gather:
        bmc_ip:          "{{ _rf_ip }}"
        username:        "{{ _rf_acct_recovery_user }}"
        password:        "{{ _rf_acct_recovery_pass }}"
        timeout:         "{{ _rf_timeout }}"
        verify_ssl:      false
        mode:            "account_provision"
        target_username: "{{ _rf_target_account.username }}"
        target_password: "{{ _rf_target_account.password }}"
        target_role:     "Administrator"
        dryrun:          "{{ _rf_account_service_dryrun | bool }}"
      register: _rf_acct_result
      failed_when: false
      no_log: true

    # production-audit (2026-04-29): bool typing 명시 cast (string "true"/"false" emit 차단)
    - name: "redfish | account_service | record meta"
      ansible.builtin.set_fact:
        _rf_account_service_meta:
          recovered: "{{ ((_rf_acct_result.account_service | default({})).recovered | default(false)) | bool }}"
          method:    "{{ (_rf_acct_result.account_service | default({})).method    | default('noop') }}"
          dryrun:    "{{ ((_rf_acct_result.account_service | default({})).dryrun    | default(true)) | bool }}"
          slot_uri:  "{{ (_rf_acct_result.account_service | default({})).slot_uri  | default(none) }}"
      no_log: true

    - name: "redfish | account_service | log result"
      ansible.builtin.debug:
        msg: >-
          account_service result — recovered={{ _rf_account_service_meta.recovered }},
          method={{ _rf_account_service_meta.method }},
          dryrun={{ _rf_account_service_meta.dryrun }}

    # ── primary 자격으로 재수집 (recovered=true, dryrun=false 일 때만) ──
    - when:
        - _rf_account_service_meta.recovered | bool
        - not (_rf_account_service_meta.dryrun | bool)
      block:

        - name: "redfish | account_service | rotate to primary creds"
          ansible.builtin.set_fact:
            ansible_user:     "{{ _rf_target_account.username }}"
            ansible_password: "{{ _rf_target_account.password }}"
            _rf_collect_ok:   false
          no_log: true

        - name: "redfish | account_service | re-collect with primary"
          ansible.builtin.include_tasks: collect_standard.yml
