---
# redfish-gather/tasks/detect_vendor.yml
# 빈 계정으로 Manufacturer 감지 → _rf_detected_vendor
# vendor_aliases.yml 기반 정규화 (하드코딩 벤더 목록 제거)

# 잔류 fix (Round 12 후속): include_vars 'name:' 옵션 reserved keyword 경고 우회.
# vendor_aliases.yml 은 plaintext (vault 아님) 라 lookup('file') | from_yaml 가능.
- name: "redfish | detect_vendor | load vendor aliases"
  ansible.builtin.set_fact:
    _va: "{{ lookup('file', lookup('env','REPO_ROOT') ~ '/common/vars/vendor_aliases.yml') | from_yaml }}"

- name: "redfish | detect_vendor | probe"
  redfish_gather:
    bmc_ip:     "{{ _rf_ip }}"
    username:   ""
    password:   ""
    timeout:    "{{ _rf_timeout | default(30) }}"
    verify_ssl: false
  register:    _rf_probe_result
  failed_when: false
  ignore_errors: true
  no_log: true

- name: "redfish | detect_vendor | normalize vendor"
  ansible.builtin.set_fact:
    _rf_detected_vendor: >-
      {%- set raw = _rf_probe_result.vendor | default('') | trim | lower -%}
      {%- set found = namespace(canon='unknown') -%}
      {#- 1) 정확 매칭 우선 -#}
      {%- for canonical, alias_list in (_va.vendor_aliases | default({})).items() -%}
        {%- for alias in alias_list -%}
          {%- if alias | lower == raw and found.canon == 'unknown' -%}
            {%- set found.canon = canonical -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
      {#- 2) 부분 매칭 fallback (Manufacturer 표기 변형 흡수: "Dell Inc" 마침표 누락 등) -#}
      {%- if found.canon == 'unknown' and raw -%}
        {%- for canonical, alias_list in (_va.vendor_aliases | default({})).items() -%}
          {%- for alias in alias_list -%}
            {%- set al = alias | lower -%}
            {%- if al and (al in raw or raw in al) and found.canon == 'unknown' -%}
              {%- set found.canon = canonical -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endfor -%}
      {%- endif -%}
      {{ found.canon | default('unknown') }}
    # 2026-05-11 fix: probe 무인증 시 data.bmc / data.system 이 None 가능 (HPE iLO 6 Gen11 사례).
    # `| default({}, true)` 의 두 번째 인자 true 는 None / empty / False 도 default 적용 — None.get() AttributeError 차단.
    #
    # T-01 (cycle 2026-05-11): data.bmc/data.system 가 빈 경우 probe_facts (ServiceRoot
    # 무인증 추출) fallback. HPE 한정 동작 — redfish_gather.py `_extract_probe_facts()` 가
    # vendor=='hpe' 분기에서만 model_hint/firmware_hint/manager_type 채움. Dell/Lenovo/
    # Cisco/Supermicro/Huawei/Inspur/Fujitsu/Quanta 는 probe_facts 가 {} → 기존 동작 동일.
    # 본 fallback 으로 HPE DL380 Gen11 (iLO 6) 가 hpe_ilo7 Gen12-only adapter 로 오선택되는
    # 사고 차단 (build #139 → #140+ 회귀 검증).
    _rf_probe_facts:
      vendor: "{{ _rf_probe_result.vendor | default('') }}"
      firmware: >-
        {{
          (
            ((_rf_probe_result.data | default({}, true)).get('bmc') | default({}, true)).get('firmware_version', '')
            | default('', true)
          )
          or (_rf_probe_result.probe_facts | default({}, true)).get('firmware_hint', '')
          or (_rf_probe_result.probe_facts | default({}, true)).get('manager_type', '')
        }}
      model: >-
        {{
          (
            ((_rf_probe_result.data | default({}, true)).get('system') | default({}, true)).get('model', '')
            | default('', true)
          )
          or (_rf_probe_result.probe_facts | default({}, true)).get('model_hint', '')
        }}
  no_log: true
