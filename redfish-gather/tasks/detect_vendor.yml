---
# redfish-gather/tasks/detect_vendor.yml
# 빈 계정으로 Manufacturer 감지 → _rf_detected_vendor
# vendor_aliases.yml 기반 정규화 (하드코딩 벤더 목록 제거)

# 잔류 fix (Round 12 후속): include_vars 'name:' 옵션 reserved keyword 경고 우회.
# vendor_aliases.yml 은 plaintext (vault 아님) 라 lookup('file') | from_yaml 가능.
- name: "redfish | detect_vendor | load vendor aliases"
  ansible.builtin.set_fact:
    _va: "{{ lookup('file', lookup('env','REPO_ROOT') ~ '/common/vars/vendor_aliases.yml') | from_yaml }}"

- name: "redfish | detect_vendor | probe"
  redfish_gather:
    bmc_ip:     "{{ _rf_ip }}"
    username:   ""
    password:   ""
    timeout:    "{{ _rf_timeout | default(30) }}"
    verify_ssl: false
  register:    _rf_probe_result
  failed_when: false
  ignore_errors: true
  no_log: true

- name: "redfish | detect_vendor | normalize vendor"
  ansible.builtin.set_fact:
    _rf_detected_vendor: >-
      {%- set raw = _rf_probe_result.vendor | default('') | trim | lower -%}
      {%- set found = namespace(canon='unknown') -%}
      {#- 1) 정확 매칭 우선 -#}
      {%- for canonical, alias_list in (_va.vendor_aliases | default({})).items() -%}
        {%- for alias in alias_list -%}
          {%- if alias | lower == raw and found.canon == 'unknown' -%}
            {%- set found.canon = canonical -%}
          {%- endif -%}
        {%- endfor -%}
      {%- endfor -%}
      {#- 2) 부분 매칭 fallback (Manufacturer 표기 변형 흡수: "Dell Inc" 마침표 누락 등) -#}
      {%- if found.canon == 'unknown' and raw -%}
        {%- for canonical, alias_list in (_va.vendor_aliases | default({})).items() -%}
          {%- for alias in alias_list -%}
            {%- set al = alias | lower -%}
            {%- if al and (al in raw or raw in al) and found.canon == 'unknown' -%}
              {%- set found.canon = canonical -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endfor -%}
      {%- endif -%}
      {{ found.canon | default('unknown') }}
    _rf_probe_facts:
      vendor: "{{ _rf_probe_result.vendor | default('') }}"
      firmware: "{{ (_rf_probe_result.data | default({})).get('bmc', {}).get('firmware_version', '') if _rf_probe_result.data is defined else '' }}"
      model: "{{ (_rf_probe_result.data | default({})).get('system', {}).get('model', '') if _rf_probe_result.data is defined else '' }}"
  no_log: true
