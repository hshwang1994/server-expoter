---
# redfish-gather/tasks/load_vault.yml
#
# adapter 기반 vault 로딩 + accounts list 정규화 (P1 도입 cycle 2026-04-28)
# vault/redfish/{profile}.yml 의 accounts 리스트 → _rf_accounts (vault file의 list 순서 그대로 사용)
# 주: 별도 role-based 정렬 없음 — vault YAML 파일의 accounts list 순서가 곧 multi-account fallback 시도 순서.
#     관례: list[0] = role=primary (provision target = infraops), list[1...] = role=recovery (provision 진입 자격)
# accounts 키가 없는 legacy vault 도 backward-compat 유지 (ansible_user/ansible_password → primary 1개)
#
# 출력:
#   _rf_accounts        : list of {username, password, label, role}
#   _rf_vault_loaded    : bool
#   _rf_vault_profile   : str

- name: "redfish | load_vault | resolve vault profile"
  ansible.builtin.set_fact:
    _rf_vault_profile: "{{ _selected_adapter.credentials.profile | default('') }}"
    _rf_vault_fallbacks: "{{ _selected_adapter.credentials.fallback_profiles | default([]) }}"
  no_log: true

- name: "redfish | load_vault | warn no profile"
  ansible.builtin.debug:
    msg: >-
      adapter({{ _selected_adapter.adapter_id | default('unknown') }})에 credential
      profile이 없습니다. 빈 자격증명으로 수집을 시도합니다.
  when: _rf_vault_profile == ''

# ── 1. primary vault profile 로드 ──────────────────────────────────────────
- name: "redfish | load_vault | include vault (primary)"
  ansible.builtin.include_vars:
    file: "{{ lookup('env','REPO_ROOT') }}/vault/redfish/{{ _rf_vault_profile }}.yml"
    name: _rf_vault_data
  no_log: true
  failed_when: false
  register: _rf_vault_load
  when: _rf_vault_profile != ''

- name: "redfish | load_vault | warn vault load failed"
  ansible.builtin.debug:
    msg: >-
      vault 파일 로드 실패: vault/redfish/{{ _rf_vault_profile }}.yml —
      파일 존재 여부와 ansible-vault 복호화 키를 확인하세요.
  when:
    - _rf_vault_profile != ''
    - _rf_vault_load is defined
    - _rf_vault_load is failed

# ── 2. fallback vault profile 시도 (vendor 가 다른 vault 키를 가질 때) ────
- name: "redfish | load_vault | try fallback profiles"
  ansible.builtin.include_vars:
    file: "{{ lookup('env','REPO_ROOT') }}/vault/redfish/{{ item }}.yml"
    name: _rf_vault_data
  no_log: true
  failed_when: false
  loop: "{{ _rf_vault_fallbacks }}"
  loop_control:
    label: "{{ item }}"
  when:
    - _rf_vault_data is not defined or _rf_vault_data | default({}) == {}
    - _rf_vault_fallbacks | length > 0

# ── 3. accounts 리스트 정규화 ─────────────────────────────────────────────
# accounts 신키 우선 + legacy ansible_user/password 호환 (P1 dual-write 마이그레이션)
- name: "redfish | load_vault | normalize accounts"
  ansible.builtin.set_fact:
    _rf_accounts: >-
      {{ (_rf_vault_data | default({})).accounts | default([])
         if ((_rf_vault_data | default({})).accounts | default([])) | length > 0
         else (
           [{
             'username': (_rf_vault_data | default({})).ansible_user | default(''),
             'password': (_rf_vault_data | default({})).ansible_password | default(''),
             'label':    'legacy_single',
             'role':     'primary'
           }]
           if ((_rf_vault_data | default({})).ansible_user | default('')) != ''
           else []
         )
         }}
    _rf_vault_loaded: "{{ _rf_vault_data is defined and _rf_vault_data | default({}) != {} }}"
  no_log: true

- name: "redfish | load_vault | summary"
  ansible.builtin.debug:
    msg: >-
      vault profile={{ _rf_vault_profile }},
      accounts={{ _rf_accounts | length }},
      labels={{ _rf_accounts | map(attribute='label') | list }}
