# 코드 리뷰 4축 매트릭스 (server-exporter)
# review-existing-code skill이 사용. 각 변경 파일을 4축으로 평가.

axes:
  structure:
    description: "구조 — Fragment 철학 준수, gather/output 경계, adapter 점수 일관성"
    checks:
      - "각 gather가 자기 fragment만 만드는가 (rule 22)"
      - "merge_fragment.yml 호출 순서 보장"
      - "raw 수집과 fragment 생성 분리"
      - "adapter 점수 (priority/specificity/match) 일관성"
      - "파일 500줄 / 함수 15줄 한계"

  quality:
    description: "품질 — 의심 패턴 11종 (rule 95 R1), 에러 처리, 테스트 커버"
    checks:
      - "Ansible default(omit) 누락"
      - "set_fact 재정의로 인한 fragment 침범"
      - "Jinja2 정규식 dead code"
      - "adapter score 동률 처리"
      - "is none / is undefined / length == 0 혼동"
      - "빈 callback message"
      - "int() cast 미방어 (NumberFormatException 등가)"
      - "단일 vendor 분기 (다른 vendor silent)"
      - "adapter_loader self-reference"
      - "ansible vars dict의 deep copy 누락"
      - "외부 시스템 계약 drift (rule 96)"

  security:
    description: "보안 — vault 누설, BMC 인증, redfish basic auth, 로그 redaction"
    checks:
      - "vault 변수가 평문에 누설 안 됨"
      - "BMC password가 stdout/log에 출력 안 됨"
      - "Vault 2단계 로딩 절차 (무인증 detect → vendor vault → 인증 수집)"
      - "Redfish HTTPS verify=True (자체 서명 인증서 예외 명시)"
      - "stacktrace가 callback message에 노출 안 됨"

  vendor_boundary:
    description: "벤더 경계 — common/ + 3-channel에 vendor 이름 하드코딩 금지"
    checks:
      - "common/, os-gather/, esxi-gather/, redfish-gather/ 코드에 Dell/HPE/Lenovo/Supermicro/Cisco 하드코딩 없음"
      - "vendor 분기는 adapters/ YAML 또는 redfish-gather/tasks/vendors/ 안에만"
      - "vendor_aliases.yml만 정규화 메타로 참조"
      - "신규 vendor 추가 3단계 (vendor_aliases + adapter YAML + OEM tasks)"

severity:
  critical:
    description: "치명 — 즉시 수정 필요. 보안/벤더 경계 위반 또는 Fragment 철학 위반"
  high:
    description: "높음 — PR 머지 전 수정 필요. 회귀 위험 또는 구조 위반"
  medium:
    description: "중간 — 다음 정리 PR. 의심 패턴 (rule 95 R1)"
  low:
    description: "낮음 — advisory. 가독성 / 명명 / 주석"

# 4축 통과 후 reviewer가 PASS 선언
output_format: |
  ## 4축 리뷰 결과
  - structure: {PASS|WARN|FAIL} — {findings}
  - quality:   {PASS|WARN|FAIL} — {findings}
  - security:  {PASS|WARN|FAIL} — {findings}
  - vendor_boundary: {PASS|WARN|FAIL} — {findings}
