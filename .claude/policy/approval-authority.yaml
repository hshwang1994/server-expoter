# 승인 권한자 정책
# 공통 라이브러리 / vendor adapter / 보호 경로 / rule 변경 시 승인 주체.

common_library_approver:
  description: "common/library/*, redfish-gather/library/* 수정 승인 주체"
  default: "hshwang"
  fallback: "작업자 본인"
  related_rule: ".claude/rules/22-fragment-philosophy.md"

vendor_adapter_approver:
  description: "adapters/{redfish,os,esxi}/* 수정 + 신규 벤더 adapter 추가 승인"
  default: "hshwang"
  fallback: "작업자 본인"
  related_rule: ".claude/rules/12-adapter-vendor-boundary.md"

protected_paths_approver:
  description: ".claude/policy/protected-paths.yaml 자체 변경 승인"
  default: "hshwang"
  fallback: "저장소 관리자"

harness_rule_approver:
  description: ".claude/rules/*.md 및 .claude/policy/*.yaml 추가/수정 (Tier 2)"
  default: "hshwang"
  fallback: "하네스 거버너"
  related_doc: "docs/ai/workflows/HARNESS_GOVERNANCE.md"

schema_approver:
  description: "schema/sections.yml + schema/field_dictionary.yml + schema/baseline_v1/* 변경"
  default: "hshwang"
  fallback: "스키마 거버너"
  related_rule: ".claude/rules/13-output-schema-fields.md"

jenkinsfile_approver:
  description: "Jenkinsfile / Jenkinsfile_grafana / Jenkinsfile_portal cron / 4-Stage 변경"
  default: "hshwang"
  fallback: "Jenkins 운영자"
  related_rule: ".claude/rules/80-ci-jenkins-policy.md"

vault_approver:
  description: "vault/{linux,windows,esxi}.yml + vault/redfish/{vendor}.yml 회전"
  default: "hshwang"
  fallback: "보안 담당자"
  related_rule: ".claude/rules/60-security-and-secrets.md"

# 승인 기록 포맷
approval_record_format: |
  ## 승인 기록

  - 일시: YYYY-MM-DD HH:mm
  - 승인자: {approver}
  - 대상: {file_path or component_name}
  - 사유: {why — 1~2 줄}
  - 영향: {scope — 벤더 / 채널 / 파일 수}
  - 후속: {related_follow_up_tickets or "없음"}
