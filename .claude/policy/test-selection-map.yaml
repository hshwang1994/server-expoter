# 변경 영역별 테스트 선택 매트릭스
# prepare-regression-check skill이 사용. 변경된 파일에서 어떤 테스트가 필요한지 자동 판정.

mappings:
  os_gather:
    files:
      - "os-gather/**"
      - "adapters/os/**"
    tests:
      - "tests/redfish-probe/probe_redfish.py (간접: os 통합)"
      - "ansible-playbook --syntax-check os-gather/site.yml"
      - "Linux/Windows 실장비 1대 이상 검증 (raw fallback 포함)"

  esxi_gather:
    files:
      - "esxi-gather/**"
      - "adapters/esxi/**"
    tests:
      - "ansible-playbook --syntax-check esxi-gather/site.yml"
      - "ESXi 6.x/7.x/8.x 실장비 1대 검증"
      - "community.vmware 의존성 확인"

  redfish_gather:
    files:
      - "redfish-gather/**"
      - "adapters/redfish/**"
    tests:
      - "tests/redfish-probe/probe_redfish.py"
      - "tests/redfish-probe/deep_probe_redfish.py (펌웨어 프로파일)"
      - "schema/baseline_v1/{vendor}_baseline.json 회귀 (영향 vendor)"
      - "ansible-playbook --syntax-check redfish-gather/site.yml"

  fragment_normalize:
    files:
      - "common/tasks/normalize/**"
      - "common/library/**"
    tests:
      - "validate-fragment-philosophy skill"
      - "3-channel 회귀 (os + esxi + redfish 모두)"
      - "schema/baseline_v1/ 전수 회귀"

  output_schema:
    files:
      - "schema/sections.yml"
      - "schema/field_dictionary.yml"
      - "callback_plugins/json_only.py"
    tests:
      - "update-output-schema-evidence skill"
      - "schema validate (Jenkinsfile Stage 3)"
      - "baseline_v1 전수 회귀 (Jenkinsfile Stage 4)"

  precheck:
    files:
      - "common/library/precheck_bundle.py"
    tests:
      - "tests/redfish-probe/probe_redfish.py (4단계 진단 포함)"
      - "Linux/Windows/ESXi/Redfish 실장비 4단계 분기 회귀"

  vendor_adapter:
    files:
      - "adapters/redfish/{vendor}_*.yml"
      - "redfish-gather/tasks/vendors/{vendor}/"
    tests:
      - "score-adapter-match skill (점수 디버깅)"
      - "해당 vendor 실장비 1대 이상 baseline 회귀"
      - "verify-adapter-boundary skill"

  jenkinsfile:
    files:
      - "Jenkinsfile"
      - "Jenkinsfile_grafana"
      - "Jenkinsfile_portal"
    tests:
      - "Jenkins 4-Stage dry-run (Validate / Gather / Validate Schema / E2E Regression)"
      - "callback URL 무결성 (rule 31)"
      - "scheduler-change-playbook (cron 변경 시)"

  vault:
    files:
      - "vault/**"
    tests:
      - "rotate-vault skill 절차"
      - "ansible-vault 암호화 검증"
      - "벤더별 vault 로딩 시퀀스 (Vault 2단계)"

  hooks:
    files:
      - "scripts/ai/hooks/**"
      - "scripts/ai/*.py"
    tests:
      - "ast.parse 검증 (모든 파일)"
      - "각 hook smoke test"
      - "verify_harness_consistency.py"

  rules_skills_agents:
    files:
      - ".claude/rules/**"
      - ".claude/skills/**"
      - ".claude/agents/**"
    tests:
      - "verify_harness_consistency.py"
      - "잔재 어휘 grep (clovirone leftover)"
      - "rule 23 ASCII 태그 일관성"
