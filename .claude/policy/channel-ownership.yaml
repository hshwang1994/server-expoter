# server-exporter 채널 / 모듈 ownership
# 변경 영향 분석 시 어느 채널/모듈을 건드리는지 자동 판정.

channels:
  os-gather:
    description: "Linux/Windows OS gather (3-Play: 포트감지→Linux→Windows)"
    paths:
      - "os-gather/"
      - "adapters/os/"
    role: "gather"
    primary_owner: "hshwang"
    related_skills:
      - "validate-fragment-philosophy"
      - "debug-precheck-failure"

  esxi-gather:
    description: "ESXi gather (community.vmware 의존)"
    paths:
      - "esxi-gather/"
      - "adapters/esxi/"
    role: "gather"
    primary_owner: "hshwang"
    related_skills:
      - "validate-fragment-philosophy"

  redfish-gather:
    description: "Redfish gather (BMC/IPMI, redfish_gather.py 엔진)"
    paths:
      - "redfish-gather/"
      - "adapters/redfish/"
    role: "gather"
    primary_owner: "hshwang"
    related_skills:
      - "score-adapter-match"
      - "probe-redfish-vendor"
      - "update-vendor-baseline"

modules:
  common_library:
    description: "공통 라이브러리 (precheck_bundle.py, normalize, builders)"
    paths:
      - "common/library/"
      - "common/tasks/"
      - "common/vars/"
    role: "gather"
    related_rule: "22-fragment-philosophy"

  output_schema:
    description: "출력 schema 정의 + baseline + callback"
    paths:
      - "schema/"
      - "callback_plugins/"
    role: "output-schema"
    primary_owner: "hshwang"
    related_rule: "13-output-schema-fields"

  python_plugins:
    description: "filter / lookup plugins (Python)"
    paths:
      - "filter_plugins/"
      - "lookup_plugins/"
      - "module_utils/"
    role: "gather"

  jenkins_pipeline:
    description: "Jenkins 파이프라인 3종 (main / grafana / portal)"
    paths:
      - "Jenkinsfile"
      - "Jenkinsfile_grafana"
      - "Jenkinsfile_portal"
      - "ansible.cfg"
    role: "infra"
    related_rule: "80-ci-jenkins-policy"

  vault_secrets:
    description: "Ansible Vault 시크릿"
    paths:
      - "vault/"
    role: "infra"
    primary_owner: "hshwang"
    related_rule: "60-security-and-secrets"

  testing:
    description: "pytest + redfish-probe + baseline + fixtures"
    paths:
      - "tests/"
    role: "qa"
    related_rule: "40-qa-pytest-baseline"

  harness:
    description: "AI 하네스"
    paths:
      - ".claude/"
      - "scripts/ai/"
      - "docs/ai/"
    role: "tpm"
    related_rule: "70-docs-and-evidence-policy"
