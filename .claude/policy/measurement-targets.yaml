# rule 28 측정 대상 카탈로그 (server-exporter)
# AI가 작업 중 참조할 "실측 가능 항목" — TTL + 무효화 trigger 미리 확립.
# 새 대상은 rule 28 + 본 YAML 동시 갱신 PR로만 추가.

targets:
  output_schema:
    id: 1
    description: "출력 schema (sections.yml + field_dictionary.yml)"
    measure_command: "update-output-schema-evidence skill 호출"
    storage:
      - "schema/sections.yml"
      - "schema/field_dictionary.yml"
    ttl_days: 14
    invalidation_triggers:
      - "schema/sections.yml 수정"
      - "schema/field_dictionary.yml 수정"
      - "common/tasks/normalize/build_*.yml 수정"

  project_map:
    id: 2
    description: "PROJECT_MAP — 디렉터리 구조"
    measure_command: "python scripts/ai/check_project_map_drift.py"
    storage:
      - "docs/ai/catalogs/PROJECT_MAP.md"
      - ".claude/policy/project-map-fingerprint.yaml"
    ttl_days: 7
    invalidation_triggers:
      - "디렉터리 추가/삭제"
      - "(os|esxi|redfish)-gather/, common/, adapters/, schema/ 구조 변경"

  vendor_adapter_matrix:
    id: 3
    description: "벤더 어댑터 매트릭스 — adapter list × vendor × firmware"
    measure_command: "ls adapters/{redfish,os,esxi}/*.yml + grep priority/specificity"
    storage:
      - "docs/ai/catalogs/VENDOR_ADAPTERS.md"
    ttl_days: 14
    invalidation_triggers:
      - "adapters/**/*.yml 수정"
      - "common/vars/vendor_aliases.yml 수정"

  callback_endpoints:
    id: 4
    description: "Jenkins callback URL endpoint 매트릭스"
    measure_command: "grep -rn 'callback_url' Jenkinsfile* + 호출자 매핑"
    storage:
      - "docs/ai/catalogs/JENKINS_PIPELINES.md"
    ttl_days: 7
    invalidation_triggers:
      - "Jenkinsfile* 수정"

  jenkinsfile_cron:
    id: 5
    description: "Jenkinsfile cron 표 (2종 main/portal — cycle-015에서 grafana 제거)"
    measure_command: "grep cron Jenkinsfile* + scheduler-change-playbook"
    storage:
      - "docs/ai/catalogs/JENKINS_PIPELINES.md"
    ttl_days: 14
    invalidation_triggers:
      - "Jenkinsfile* 안 cron 표현식 변경"
      - "triggers 블록 변경"

  harness_surface:
    id: 6
    description: "하네스 표면 카운트 (rules/skills/agents/policy/role/templates/commands/hooks)"
    measure_command: "python scripts/ai/hooks/pre_commit_harness_drift.py --update"
    storage:
      - ".claude/policy/surface-counts.yaml"
    ttl_days: 1
    invalidation_triggers:
      - ".claude/{rules,skills,agents,policy,role,templates,commands}/ 추가·삭제"
      - "scripts/ai/hooks/*.py 추가·삭제"

  vendor_baseline:
    id: 7
    description: "벤더별 baseline JSON (실장비 회귀 기준선)"
    measure_command: "ls schema/baseline_v1/*.json"
    storage:
      - "schema/baseline_v1/"
      - "tests/evidence/"
    ttl_days: 30
    invalidation_triggers:
      - "schema/baseline_v1/{vendor}_baseline.json 수정"
      - "실장비 검증 후 갱신 (rule 40)"

  fragment_topology:
    id: 8
    description: "Fragment 변수 토폴로지 (각 gather가 어느 fragment를 만드는가)"
    measure_command: "grep -rn '_data_fragment\\|_sections_.*_supported_fragment\\|_errors_fragment' os-gather/ esxi-gather/ redfish-gather/"
    storage:
      - "docs/ai/catalogs/FRAGMENT_TOPOLOGY.md"
    ttl_days: 14
    invalidation_triggers:
      - "gather/normalize 코드 추가/수정"

  branch_gap:
    id: 9
    description: "현재 브랜치 ↔ origin/main 갭"
    measure_command: "python scripts/ai/check_gap_against_main.py"
    storage: "stdout (세션 시작 + post-merge)"
    ttl: "세션 동안"
    invalidation_triggers:
      - "git merge / pull / rebase"
      - "branch 전환"

  vendor_boundary:
    id: 10
    description: "벤더 경계 위반 (common/ + 3-channel에 vendor 이름 하드코딩)"
    measure_command: "python scripts/ai/verify_vendor_boundary.py"
    storage: "CI step 출력"
    ttl: "커밋마다"
    invalidation_triggers: ["커밋"]

  external_contracts:
    id: 11
    description: "외부 시스템 계약 (Redfish ServiceRoot path, IPMI sensor list 등)"
    measure_command: "tests/redfish-probe/probe_redfish.py + deep_probe_redfish.py"
    storage:
      - "docs/ai/catalogs/EXTERNAL_CONTRACTS.md"
      - "tests/fixtures/"
    ttl_days: 90
    invalidation_triggers:
      - "벤더 펌웨어 업그레이드"
      - "BMC API path 변경"

  compatibility_matrix:
    id: 12
    description: "COMPATIBILITY-MATRIX (vendor × generation × section) — adapter capabilities 매트릭스"
    measure_command: "scripts/ai/measure_compatibility_matrix.py (P3 도입 예정) — 또는 docs/22 참조"
    storage:
      - "docs/22_compatibility-matrix.md"
      - "docs/ai/tickets/<cycle>/COMPATIBILITY-MATRIX.md"
    ttl_days: 14
    invalidation_triggers:
      - "adapters/**/*.yml capabilities 변경"
      - "새 vendor 추가 (rule 50 R2)"
      - "벤더 펌웨어 업그레이드"
      - "schema/sections.yml 변경 (sections 10 영향)"
