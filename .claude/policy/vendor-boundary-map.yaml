# OS / ESXi 채널 adapter (vendor 별 OS 분류)
os_adapters:
  - "adapters/os/linux_generic.yml"
  - "adapters/os/linux_rhel.yml"
  - "adapters/os/linux_suse.yml"
  - "adapters/os/linux_ubuntu.yml"
  - "adapters/os/windows_generic.yml"
  - "adapters/os/windows_2019.yml"
  - "adapters/os/windows_2022.yml"

esxi_adapters:
  - "adapters/esxi/esxi_generic.yml"
  - "adapters/esxi/esxi_6x.yml"
  - "adapters/esxi/esxi_7x.yml"
  - "adapters/esxi/esxi_8x.yml"

# 벤더 경계 원칙
boundary_principles:
  - "common/ + os-gather/ + esxi-gather/ + redfish-gather/ 코드는 vendor 이름 하드코딩 금지 (rule 12 R1)"
  - "vendor-specific 로직은 adapters/{channel}/{vendor}_*.yml 또는 redfish-gather/tasks/vendors/{vendor}/ 안에만"
  - "예외 (cycle-006 추가): redfish_gather.py의 OEM 추출 분기 / `_FALLBACK_VENDOR_MAP` / `_detect_from_product` / BMC names — Redfish API spec의 vendor namespace는 외부 계약"
  - "adapter 점수: priority * 1000 + specificity * 10 + match_score (높을수록 우선)"
  - "vendor_aliases.yml은 어떤 코드에서도 정규화 메타로 참조 가능"

# 새 벤더 추가 절차 (3단계, docs/14_add-new-gather.md 참조)
add_vendor_steps:
  1: "common/vars/vendor_aliases.yml에 벤더 이름 매핑 추가"
  2: "adapters/redfish/{vendor}_*.yml adapter YAML 생성 (match / capabilities / collect / normalize 4 키 + metadata origin 주석)"
  3: "(선택) redfish-gather/tasks/vendors/{vendor}/ OEM 태스크 추가"
  4: "vault/redfish/{vendor}.yml ansible-vault encrypt"
  5: "schema/baseline_v1/{vendor}_baseline.json (실장비 검증 후)"
  note: "site.yml 수정 불필요 — adapter_loader가 동적 감지"
