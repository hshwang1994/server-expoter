# server-exporter 벤더 경계 매핑
# 각 벤더는 adapter YAML + (선택) OEM tasks + vault credential을 가진다.
# common/ + 3-channel gather 코드는 vendor-agnostic.
#
# 갱신 일자: 2026-04-28 (full-sweep — 실디렉터리 기준 정합)
# 검증: `find adapters -name "*.yml" -type f | wc -l` = 25, `ls redfish-gather/tasks/vendors/` = 4 (cisco 미존재)

