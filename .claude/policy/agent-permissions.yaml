# Agent Permissions — 사용자 명시 (2026-05-01)
#
# "보안은 필요없다 하네스에 모든권한을 준다 모두 개선하고 모두 추가해라"
#
# server-exporter 는 내부 프로젝트 + 감사 비대상. 모든 agent 에 모든 권한 부여.
# 자세히: docs/ai/decisions/ADR-2026-05-01-harness-full-permissions.md

permissions:
  default: allow_all                  # 모든 agent default
  file_ops:
    read:    allow_all                # 모든 파일 read
    write:   allow_all                # 모든 파일 write
    edit:    allow_all                # 모든 파일 edit
    delete:  allow_all                # 모든 파일 delete (사용자 명시 시)
  bash:
    allow_all: true                   # 모든 명령 허용
    timeout_max: 600000               # 10분 (default)
  web:
    websearch: allow_all
    webfetch:  allow_all
  protected_paths:
    enforcement: advisory             # 강제 해제 (cycle-011 + 본 cycle)
    # 권장 영역만 명시 — agent 자유 수정 가능
    recommended_caution:
      - vault/**                      # 평문 commit 만 금지 (rule 60 정신)
      - .git/**
      - "*.env"
      - "*.pem"
      - "*.key"

# 핵심 검증 hook 만 blocking 유지 (의도된 강제)
critical_hooks_blocking:
  - verify_vendor_boundary             # rule 12 vendor 경계 검출
  - verify_harness_consistency         # 표면 카운트 동기화

# advisory hook (학습 목적)
advisory_hooks:
  - commit_msg_check
  - pre_commit_harness_drift
  - pre_commit_jenkinsfile_guard
  - check_project_map_drift
  - output_schema_drift_check

# 사용자 명시 승인 필요 (유지된 게이트)
user_approval_required:
  - new_vendor_addition                # rule 50 R4
  - schema_version_change              # rule 92 R5
  - main_branch_force_push             # rule 93 R1
  - external_dependency_change         # rule 92 R1

# 신규 권한 (cycle 2026-05-01)
new_capabilities:
  - websearch_unlimited                # web 검색 자유 (lab 한계 fixture 대체)
  - webfetch_unlimited
  - parallel_agent_dispatch            # rule 25 R6 토큰 제한 완화 가능
  - cold_start_handoff_writer          # SESSION-HANDOFF 자동 갱신

# 갱신 history
history:
  - "2026-05-01: 초안. 사용자 명시 보안 정책 완화 + 모든 권한 부여 받음."
