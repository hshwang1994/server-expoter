---
# Linux raw data capture playbook for bug verification.
# Uses ansible.builtin.raw to avoid Python 3.7+ requirement (RHEL 8.10 has 3.6).
# Output saved to controller's /tmp/se-raw-os/<inventory_hostname>/<slug>.txt

- name: Capture raw Linux diagnostic data per ticket
  hosts: linux_targets
  gather_facts: false
  any_errors_fatal: false
  vars:
    out_root: /tmp/se-raw-os
    target_dir: "{{ out_root }}/{{ inventory_hostname }}"
    raw_cmds:
      # B04 DNS
      - { slug: dns_resolv_conf,        cmd: "cat /etc/resolv.conf" }
      - { slug: dns_resolvectl_status,  cmd: "resolvectl status 2>&1 || systemd-resolve --status 2>&1 || echo NO_RESOLVED" }
      - { slug: dns_runtime_resolv,     cmd: "cat /run/systemd/resolve/resolv.conf 2>&1 || echo ABSENT" }
      - { slug: dns_resolved_static,    cmd: "cat /etc/systemd/resolved.conf 2>&1 || echo ABSENT" }
      - { slug: dns_nm,                 cmd: "nmcli dev show 2>&1 | grep -E 'IP4.DNS|IP6.DNS' | head -10 || echo NO_NMCLI" }
      # B17 users
      - { slug: users_getent_passwd,    cmd: "getent passwd | head -50" }
      - { slug: users_etc_passwd,       cmd: "cat /etc/passwd | head -50" }
      - { slug: users_login_defs,       cmd: "grep -E '^UID_MIN|^UID_MAX' /etc/login.defs 2>&1 || echo ABSENT" }
      # B18/B73 hostname
      - { slug: hostname_short,         cmd: "hostname" }
      - { slug: hostname_fqdn,          cmd: "hostname -f 2>&1; echo ---; hostname -A 2>&1; echo ---; hostname -d 2>&1" }
      - { slug: hostname_etc,           cmd: "cat /etc/hostname 2>&1; echo ---; cat /etc/hosts | head -10" }
      - { slug: hostnamectl,            cmd: "hostnamectl 2>&1" }
      # B19/B80 hardware (baremetal vs VM) — sudo via -S with stdin password
      - { slug: dmi_chassis,            cmd: "echo Goodmit0802! | sudo -S dmidecode -t chassis 2>&1 | head -30" }
      - { slug: dmi_system,             cmd: "echo Goodmit0802! | sudo -S dmidecode -t system 2>&1 | head -30" }
      - { slug: dmi_baseboard,          cmd: "echo Goodmit0802! | sudo -S dmidecode -t baseboard 2>&1 | head -25" }
      - { slug: dmi_bios,               cmd: "echo Goodmit0802! | sudo -S dmidecode -t bios 2>&1 | head -30" }
      # B22 cpu
      - { slug: cpu_lscpu,              cmd: "lscpu" }
      - { slug: cpu_max_mhz_sys,        cmd: "cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq 2>&1 || echo ABSENT" }
      - { slug: cpu_proc_cpuinfo,       cmd: "head -30 /proc/cpuinfo" }
      # B23/B91 memory mfg JEDEC
      - { slug: dmi_memory,             cmd: "echo Goodmit0802! | sudo -S dmidecode -t memory 2>&1 | head -120" }
      # B25 disk capacity
      - { slug: lsblk_disks,            cmd: "lsblk -b -o NAME,KNAME,SIZE,TYPE,MODEL,VENDOR,ROTA,TRAN,SERIAL 2>&1" }
      - { slug: sys_block_size,         cmd: "for d in /sys/block/*; do bn=$(basename $d); s=$(cat $d/size 2>/dev/null); r=$(cat $d/queue/rotational 2>/dev/null); echo \"$bn size_blocks=$s rotational=$r\"; done" }
      # B26/B66 fstype
      - { slug: df_T,                   cmd: "df -T -B1" }
      - { slug: findmnt,                cmd: "findmnt -t ext4,xfs,btrfs,vfat,ext3 -o TARGET,SOURCE,FSTYPE,OPTIONS,SIZE,USED,AVAIL,USE% 2>&1" }
      - { slug: proc_mounts,            cmd: "cat /proc/mounts | head -40" }
      # B65 free
      - { slug: df_human,               cmd: "df -h" }
      # B68 IPv6
      - { slug: ip6_addr,               cmd: "ip -6 addr 2>&1" }
      - { slug: ip4_addr,               cmd: "ip -4 addr 2>&1" }
      - { slug: ip_route,               cmd: "ip route 2>&1; echo ---; ip -6 route 2>&1" }
      # B76 PCI NIC
      - { slug: lspci_nic,              cmd: "lspci -k -d ::0200 2>&1 || lspci -k 2>&1 | grep -i ethernet" }
      - { slug: lspci_full,             cmd: "lspci 2>&1 | head -50" }
      # B78 VM serial
      - { slug: dmi_serial,             cmd: "echo Goodmit0802! | sudo -S dmidecode -s system-serial-number 2>&1" }
      - { slug: dmi_uuid,               cmd: "echo Goodmit0802! | sudo -S dmidecode -s system-uuid 2>&1" }
      - { slug: dmi_manuf,              cmd: "echo Goodmit0802! | sudo -S dmidecode -s system-manufacturer 2>&1" }
      - { slug: dmi_product,            cmd: "echo Goodmit0802! | sudo -S dmidecode -s system-product-name 2>&1" }
      # B99 listening ports
      - { slug: ss_tcp_listen,          cmd: "ss -tnlpH 2>&1" }
      - { slug: ss_udp_listen,          cmd: "ss -unlpH 2>&1" }
      # Misc
      - { slug: python_versions,        cmd: "python3 --version 2>&1; echo ---; /usr/bin/python --version 2>&1; echo ---; which python python3 python2" }
      - { slug: os_release,             cmd: "cat /etc/os-release" }
      - { slug: timedatectl,            cmd: "timedatectl 2>&1" }
      - { slug: firewall_state,         cmd: "(systemctl is-active firewalld 2>&1; systemctl is-active ufw 2>&1; ufw status 2>&1; firewall-cmd --state 2>&1; iptables -S 2>&1 | head -10)" }

  tasks:
    - name: Create per-host output dir on controller
      ansible.builtin.file:
        path: "{{ target_dir }}"
        state: directory
        mode: "0755"
      delegate_to: localhost
      run_once: false

    - name: Run diagnostic command via raw (no python needed)
      ansible.builtin.raw: "{{ item.cmd }}"
      register: cmd_result
      ignore_errors: true
      loop: "{{ raw_cmds }}"
      loop_control:
        label: "{{ item.slug }}"

    - name: Save output to per-host dir
      ansible.builtin.copy:
        content: |
          # cmd: {{ item.item.cmd }}
          # rc: {{ item.rc | default('?') }}
          {{ item.stdout | default('') }}
          {% if item.stderr is defined and item.stderr %}--- stderr ---
          {{ item.stderr }}
          {% endif %}
        dest: "{{ target_dir }}/{{ item.item.slug }}.txt"
        mode: "0644"
      delegate_to: localhost
      loop: "{{ cmd_result.results }}"
      loop_control:
        label: "{{ item.item.slug }}"
