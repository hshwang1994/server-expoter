---
# tests/scripts/diag_esxi_raw.yml
#
# 일회성 진단 playbook — ESXi raw facts / network_extended lookup key 형태 확인용.
# BUG #1 (hostname=IP), BUG #2 (vendor 정규화), BUG #4 (extended lookup key)
# fix를 위한 raw 데이터 캡처.
#
# 실행:
#   cd /path/to/server-exporter
#   INVENTORY_JSON='[{"service_ip":"10.100.64.1"}]' \
#   REPO_ROOT="$PWD" \
#   ANSIBLE_CONFIG="$PWD/ansible.cfg" \
#   ANSIBLE_STDOUT_CALLBACK=json_only \
#   ansible-playbook \
#     -i esxi-gather/inventory.sh \
#     tests/scripts/diag_esxi_raw.yml \
#     --vault-password-file=<your-vault-password-file>
#
# 출력: stdout에 단일 JSON. 그대로 복사해서 붙여주세요.

- name: "esxi-raw-diag"
  hosts: all
  gather_facts: no
  connection: local

  vars_files:
    - "{{ lookup('env','REPO_ROOT') }}/vault/esxi.yml"

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    _e_ip:   "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"
    _e_user: "{{ ansible_user }}"
    _e_pass: "{{ ansible_password }}"

  tasks:

    # try_credentials.yml 재사용 — site.yml과 동일 인증 흐름
    - name: "diag | try credentials"
      ansible.builtin.include_tasks: "{{ lookup('env','REPO_ROOT') }}/esxi-gather/tasks/try_credentials.yml"
      vars:
        _e_accounts: "{{ accounts | default([]) }}"

    - name: "diag | abort if auth failed"
      ansible.builtin.fail:
        msg: "ESXi 인증 실패 — vault/esxi.yml 확인 필요"
      when:
        - (accounts | default([])) | length > 0
        - not (_e_auth_ok | default(false) | bool)

    # 1) vmware_host_facts raw
    - name: "diag | raw vmware_host_facts"
      community.vmware.vmware_host_facts:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: no
      register: _facts
      delegate_to: localhost
      failed_when: false
      no_log: true

    # 2) vmware_host_config_info raw (DNS / network_system_info)
    - name: "diag | raw host_config_info"
      community.vmware.vmware_host_config_info:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: no
      register: _cfg
      delegate_to: localhost
      failed_when: false
      no_log: true

    # 3) extended modules — lookup key 진단의 핵심
    - name: "diag | raw vmnic info"
      community.vmware.vmware_host_vmnic_info:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: false
        esxi_hostname:  "{{ _e_ip }}"
      register: _vmnic
      failed_when: false
      no_log: true

    - name: "diag | raw vswitch info"
      community.vmware.vmware_vswitch_info:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: false
        esxi_hostname:  "{{ _e_ip }}"
      register: _vswitch
      failed_when: false
      no_log: true

    - name: "diag | raw portgroup info"
      community.vmware.vmware_portgroup_info:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: false
        esxi_hostname:  "{{ _e_ip }}"
      register: _pg
      failed_when: false
      no_log: true

    - name: "diag | raw vmhba info"
      community.vmware.vmware_host_vmhba_info:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: false
        esxi_hostname:  "{{ _e_ip }}"
      register: _vmhba
      failed_when: false
      no_log: true

    # ── 진단 결과 조립 ────────────────────────────────────────────────
    - name: OUTPUT
      ansible.builtin.set_fact:
        _output:
          target_ip: "{{ _e_ip }}"
          auth_ok:   "{{ _e_auth_ok | default(false) }}"

          # === BUG #1: hostname 후보 ===
          fact_ansible_hostname: "{{ _facts.ansible_facts.ansible_hostname | default('__MISSING__') }}"
          fact_ansible_fqdn:     "{{ _facts.ansible_facts.ansible_fqdn     | default('__MISSING__') }}"
          fact_ansible_nodename: "{{ _facts.ansible_facts.ansible_nodename | default('__MISSING__') }}"
          fact_ansible_domain:   "{{ _facts.ansible_facts.ansible_domain   | default('__MISSING__') }}"

          # === BUG #3: default gateway ===
          fact_default_ipv4: "{{ _facts.ansible_facts.ansible_default_ipv4 | default('__MISSING__') }}"

          # === 보강 후보 (architecture / mhz) ===
          fact_machine:       "{{ _facts.ansible_facts.ansible_machine       | default('__MISSING__') }}"
          fact_architecture:  "{{ _facts.ansible_facts.ansible_architecture  | default('__MISSING__') }}"
          fact_processor_mhz: "{{ _facts.ansible_facts.ansible_processor_mhz | default('__MISSING__') }}"

          # === facts 전체 키 list (어떤 필드 존재하는지 한눈에) ===
          fact_all_keys: "{{ _facts.ansible_facts.keys() | list | sort }}"

          # === BUG #4 핵심: extended modules의 top-level key 형태 ===
          vmnic_top_keys:     "{{ (_vmnic.hosts_vmnics_info     | default({})).keys() | list }}"
          vswitch_top_keys:   "{{ (_vswitch.hosts_vswitch_info  | default({})).keys() | list }}"
          portgroup_top_keys: "{{ (_pg.hosts_portgroup_info     | default({})).keys() | list }}"
          vmhba_top_keys:     "{{ (_vmhba.hosts_vmhbas_info     | default({})).keys() | list }}"

          # === lookup 가설 비교: ip vs hostname vs first key ===
          vmnic_count_at_ip:       "{{ ((_vmnic.hosts_vmnics_info | default({})).get(_e_ip, {}).get('all', []) | length) }}"
          vmnic_count_at_hostname: "{{ ((_vmnic.hosts_vmnics_info | default({})).get(_facts.ansible_facts.ansible_hostname | default(''), {}).get('all', []) | length) }}"
          vmnic_first_host_count: >-
            {%- set d = _vmnic.hosts_vmnics_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {{ (d.get(first, {}).get('all', []) | length) if first else 0 }}

          vswitch_count_at_ip:       "{{ ((_vswitch.hosts_vswitch_info | default({})).get(_e_ip, []) | length) }}"
          vswitch_count_at_hostname: "{{ ((_vswitch.hosts_vswitch_info | default({})).get(_facts.ansible_facts.ansible_hostname | default(''), []) | length) }}"
          vswitch_first_host_count: >-
            {%- set d = _vswitch.hosts_vswitch_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {{ (d.get(first, []) | length) if first else 0 }}

          # === BUG (DNS 추출) — host_config_info 구조 ===
          cfg_top_keys: "{{ (_cfg.hosts_config_info | default({})).keys() | list }}"
          cfg_first_inner_keys: >-
            {%- set d = _cfg.hosts_config_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {{ (d.get(first, {}) | dict2items | map(attribute='key') | list | sort) if first else [] }}
          cfg_first_dns_block: >-
            {%- set d = _cfg.hosts_config_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {{ d.get(first, {}).get('network_system_info', {}).get('dns_config', '__MISSING__') if first else '__MISSING__' }}

          # === network_extended sample — to_json 으로 강제 dict dump (키 이름 확정) ===
          vmnic_first_full: >-
            {%- set d = _vmnic.hosts_vmnics_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {%- set lst = (d.get(first, {}).get('all', []) if first else []) -%}
            {{ ((lst | first) | to_json) if (lst | length > 0) else '__EMPTY__' }}
          vswitch_first_full: >-
            {%- set d = _vswitch.hosts_vswitch_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {%- set lst = (d.get(first, []) if first else []) -%}
            {{ ((lst | first) | to_json) if (lst | length > 0) else '__EMPTY__' }}
          vmnic_all_full: >-
            {%- set d = _vmnic.hosts_vmnics_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {{ (d.get(first, {}) | to_json) if first else '__EMPTY__' }}
          vmhba_inner_keys: >-
            {%- set d = _vmhba.hosts_vmhbas_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {{ (d.get(first, {}) | dict2items | map(attribute='key') | list) if (first and (d.get(first) is mapping)) else (d.get(first, '__NOT_DICT__') | to_json) }}
          vmhba_full: >-
            {%- set d = _vmhba.hosts_vmhbas_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {{ (d.get(first, {}) | to_json) if first else '__EMPTY__' }}
          vswitch_inner_full: >-
            {%- set d = _vswitch.hosts_vswitch_info | default({}) -%}
            {%- set first = (d.keys() | list | first) if d else none -%}
            {{ (d.get(first, {}) | to_json) if first else '__EMPTY__' }}
