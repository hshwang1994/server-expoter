---
# common/tasks/normalize/build_status.yml
#
# sections 결과 기준으로 overall status 를 계산한다.
# build_sections.yml 호출 후 사용한다.
#
# 입력 변수:
#   _norm_sections : dict — build_sections.yml 출력
#
# 출력 변수:
#   _out_status : str — "success" | "partial" | "failed"  (envelope.status enum 3종 정본)
#
# 판정 규칙 (정본):
#   supported 섹션 중 모두 success                  → success
#   supported 섹션 중 success 와 failed 혼재          → partial
#   supported 섹션 중 success 가 하나도 없음           → failed
#
# ----------------------------------------------------------------------
# 의도된 설계 (M-A1/M-A2 분석 결과 — Case A 채택, 2026-05-06)
# ----------------------------------------------------------------------
# overall status 는 **섹션 status 만** 본다. envelope.errors[] 는 **보지 않는다**.
# errors[] 는 사유 추적용 분리 영역 — overall status 판정에 영향 없음.
#
# 결과: 다음 4 시나리오 매트릭스
#
#   | # | 섹션 status            | errors[] | overall.status |
#   |---|------------------------|----------|----------------|
#   | A | 모두 success           | empty    | success        |
#   | B | 모두 success           | warnings | success  *     |
#   | C | success + failed 혼재  | any      | partial        |
#   | D | 모두 failed            | any      | failed         |
#
# * 시나리오 B 는 의도된 동작이다. 사유:
#   - 섹션 자체는 정상 수집 — 호출자가 데이터를 신뢰 가능
#   - errors[] 는 "사유 추적" 용 (warning / partial enumeration / fallback 사용 통보)
#   - 호출자 시스템이 warning 을 분리 인식하려면 envelope.errors[] 별도 검사
#   - rule 13 R5 envelope 13 필드 / rule 96 R1-B (호환성 외 schema 확장 금지)
#
# 시나리오 B 발생 위치 (3 reference — 의도된 fallback / partial enumeration):
#   - os-gather/tasks/linux/gather_memory.yml:171-175    (dmidecode 권한/미존재 → total_basis=os_visible fallback)
#   - os-gather/tasks/linux/gather_network.yml:208-209   (lspci stderr 비어있지 않음 → NIC partial enumeration 가능)
#   - esxi-gather/tasks/normalize_storage.yml:79-83      (NFS/vSAN/vVOL 등 datastore capacity 미수집)
#
# severity (error/warning/info) 도입 안 함 — rule 22 R7/R8 (5 fragment 변수 / 타입 정본) 영역.
# 향후 동적 정책 로딩이 필요하면 common/vars/status_rules.yml 활성화 (현재 reserved).
#
# 변경 시 사용자 명시 승인 필수: rule 13 R5 (envelope) / rule 92 R5 (schema) / rule 96 R1-B (호환성 외).
# 결정 reference: docs/19_decision-log.md (M-A2 / 2026-05-06)
# ----------------------------------------------------------------------

- name: "normalize | build_status"
  ansible.builtin.set_fact:
    _out_status: >-
      {%- set sec_vals = _norm_sections.values() | list -%}
      {%- set supported_vals = sec_vals | reject('equalto','not_supported') | list -%}
      {%- set success_count  = supported_vals | select('equalto','success') | list | length -%}
      {%- set failed_count   = supported_vals | select('equalto','failed')  | list | length -%}
      {%- if supported_vals | length == 0 -%}
      failed
      {%- elif failed_count == 0 -%}
      success
      {%- elif success_count == 0 -%}
      failed
      {%- else -%}
      partial
      {%- endif -%}
