---
# common/tasks/normalize/build_errors.yml
#
# _all_errors 누적 변수를 표준 형식으로 정리한다.
# ※ 에러 정규화 로직은 merge_fragment.yml에도 동일하게 존재함 (상호참조).
#
# 입력 변수:
#   _all_errors : list — merge_fragment 누적 errors
#
# 출력 변수:
#   _norm_errors : list — [{section, message, detail}]

- name: "normalize | build_errors"
  ansible.builtin.set_fact:
    _norm_errors: >-
      {%- set out = [] -%}
      {#- 방어: _all_errors 가 string/dict 인 경우 character iteration 차단.
          merge_fragment.yml 의 동일 가드와 정합. 빈 단일 char ('[', ']', '\n', '}')
          가 errors[].message 로 분해 채워지는 회귀 차단. -#}
      {%- set ae_raw = _all_errors | default([]) -%}
      {%- if ae_raw is string -%}
        {%- set ae = [{'section':'unknown','message':ae_raw,'detail':none}] if (ae_raw | trim | length > 0) else [] -%}
      {%- elif ae_raw is mapping -%}
        {%- set ae = [ae_raw] -%}
      {%- elif ae_raw is iterable -%}
        {%- set ae = ae_raw -%}
      {%- else -%}
        {%- set ae = [] -%}
      {%- endif -%}
      {%- for e in ae -%}
        {%- if e is string -%}
          {%- if e | trim | length > 0 -%}
            {%- set _ = out.append({
              'section': 'unknown',
              'message': e,
              'detail':  none
            }) -%}
          {%- endif -%}
        {%- elif e is mapping -%}
          {%- set _ = out.append({
            'section': e.section | default('unknown'),
            'message': e.message | default(e | string),
            'detail':  e.detail  | default(none)
          }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
