---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: Microsoft Windows (generic fallback)
# Firmware: tested_against [] — 임의 Windows Server 버전
# Origin: server-exporter 정책 — version_patterns 매치 실패 시 fallback
# Last sync: 2026-04-27 (hshwang1994)
# Notes: priority=0 — windows_2019/2022 매치 실패 시 graceful degradation.
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: os_windows_generic
channel: os
priority: 0
generic: true

match:
  os_type: windows

capabilities:
  sections_supported:
    - system
    - cpu
    - memory
    - storage
    - network
    - users

collect:
  tasks_dir: "os-gather/tasks/windows"
  gather_tasks:
    - "os-gather/tasks/windows/gather_system.yml"
    - "os-gather/tasks/windows/gather_cpu.yml"
    - "os-gather/tasks/windows/gather_memory.yml"
    - "os-gather/tasks/windows/gather_storage.yml"
    - "os-gather/tasks/windows/gather_network.yml"
    - "os-gather/tasks/windows/gather_users.yml"

credentials:
  profile: "os_windows"
  fallback_profiles: []

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system]
  optional_sections: [users]
