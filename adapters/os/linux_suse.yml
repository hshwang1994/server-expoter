---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: SUSE 계열 Linux (SUSE / SLES / openSUSE)
# Firmware: tested_against [] — 추정 (실 검증 미수행)
# Origin: 추정 — 검증 필요 (RHEL 검증 기준 + SUSE distribution_patterns 분기)
# Last sync: 2026-04-27 (hshwang1994)
# Notes: priority=50 — linux_rhel / linux_ubuntu와 같은 priority. distribution_patterns로 분기.
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: os_linux_suse
channel: os
priority: 50
version: "1.0.0"

match:
  os_type: linux
  distribution_patterns: ["SUSE", "SLES", "openSUSE"]

capabilities:
  sections_supported:
    - system
    - cpu
    - memory
    - storage
    - network
    - users

collect:
  tasks_dir: "os-gather/tasks/linux"
  gather_tasks:
    - "os-gather/tasks/linux/gather_system.yml"
    - "os-gather/tasks/linux/gather_cpu.yml"
    - "os-gather/tasks/linux/gather_memory.yml"
    - "os-gather/tasks/linux/gather_storage.yml"
    - "os-gather/tasks/linux/gather_network.yml"
    - "os-gather/tasks/linux/gather_users.yml"
  preflight_tasks: "os-gather/tasks/linux/preflight.yml"

credentials:
  profile: "os_linux"
  fallback_profiles: []

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system]
  optional_sections: [users]
