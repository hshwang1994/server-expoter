---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: Red Hat 계열 Linux (RHEL / CentOS / Rocky / AlmaLinux / Oracle)
# Firmware: tested_against ["RHEL 8.10", "RHEL 9.2", "RHEL 9.6", "Rocky 9.6"]
# Origin: 실 검증 — Round 1~5 (docs/13_redfish-live-validation.md + tests/evidence/)
# Last sync: 2026-04-27 (hshwang1994)
# Notes: priority=50 — linux_suse / linux_ubuntu와 같은 priority. distribution_patterns로 분기.
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: os_linux_rhel
channel: os
priority: 50

match:
  os_type: linux
  distribution_patterns: ["Red Hat", "RHEL", "CentOS", "Rocky", "AlmaLinux", "Oracle"]

capabilities:
  sections_supported:
    - system
    - cpu
    - memory
    - storage
    - network
    - users

collect:
  tasks_dir: "os-gather/tasks/linux"
  gather_tasks:
    - "os-gather/tasks/linux/gather_system.yml"
    - "os-gather/tasks/linux/gather_cpu.yml"
    - "os-gather/tasks/linux/gather_memory.yml"
    - "os-gather/tasks/linux/gather_storage.yml"
    - "os-gather/tasks/linux/gather_network.yml"
    - "os-gather/tasks/linux/gather_users.yml"
  preflight_tasks: "os-gather/tasks/linux/preflight.yml"

credentials:
  profile: "os_linux"
  fallback_profiles: []

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system]
  optional_sections: [users]
