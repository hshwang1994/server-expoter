---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: Microsoft Windows Server 2019
# Firmware: tested_against ["Build 17763 (Server 2019)"]
# Origin: 추정 — 검증 필요 (ansible.windows 3.3.0 + pywinrm 0.5.0 호환성)
# Last sync: 2026-04-27 (hshwang1994)
# Notes: priority=50 — windows_2022와 같은 priority. version_patterns로 분기.
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: os_windows_2019
channel: os
priority: 50

match:
  os_type: windows
  version_patterns: ["2019", "10\\.0\\.17763"]

capabilities:
  sections_supported:
    - system
    - cpu
    - memory
    - storage
    - network
    - users

collect:
  tasks_dir: "os-gather/tasks/windows"
  gather_tasks:
    - "os-gather/tasks/windows/gather_system.yml"
    - "os-gather/tasks/windows/gather_cpu.yml"
    - "os-gather/tasks/windows/gather_memory.yml"
    - "os-gather/tasks/windows/gather_storage.yml"
    - "os-gather/tasks/windows/gather_network.yml"
    - "os-gather/tasks/windows/gather_users.yml"

credentials:
  profile: "os_windows"
  fallback_profiles: []

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system]
  optional_sections: [users]
