---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: Debian 계열 Linux (Ubuntu / Debian)
# Firmware: tested_against ["Ubuntu 24.04"]
# Origin: 실 검증 — Round 4 (복잡 토폴로지 실증, docs/13_redfish-live-validation.md Round 4)
# Last sync: 2026-04-27 (hshwang1994)
# Notes: priority=50 — linux_rhel / linux_suse와 같은 priority. distribution_patterns로 분기.
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: os_linux_ubuntu
channel: os
priority: 50

match:
  os_type: linux
  distribution_patterns: ["Ubuntu", "Debian"]

capabilities:
  sections_supported:
    - system
    - cpu
    - memory
    - storage
    - network
    - users

collect:
  tasks_dir: "os-gather/tasks/linux"
  gather_tasks:
    - "os-gather/tasks/linux/gather_system.yml"
    - "os-gather/tasks/linux/gather_cpu.yml"
    - "os-gather/tasks/linux/gather_memory.yml"
    - "os-gather/tasks/linux/gather_storage.yml"
    - "os-gather/tasks/linux/gather_network.yml"
    - "os-gather/tasks/linux/gather_users.yml"
  preflight_tasks: "os-gather/tasks/linux/preflight.yml"

credentials:
  profile: "os_linux"
  fallback_profiles: []

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system]
  optional_sections: [users]
