---
# ── Origin metadata (rule 96 R1 + R1-A) ───────────────────────────────────────
# Vendor: HPE / Hewlett Packard Enterprise
# Firmware: iLO 모든 세대 (legacy iLO 1/2/3 ~ iLO 7)
# Generation: ilo_legacy (generic hpe fallback)
# Generation Year: "2002-2014 (iLO 1/2/3 — Redfish 미지원 시기)"
# Origin: HPE iLO Redfish API documentation / HPE archive docs
# Last sync: 2026-05-11 (M-H2 — generic fallback origin 보강)
# Notes: generic hpe fallback (priority=10). 세대별 미매치 시 사용.
# Sources (rule 96 R1-A — lab 부재 legacy generation 보강):
#   - https://servermanagementportal.ext.hpe.com/   (HPE iLO 종합 docs portal)
#   - https://hewlettpackard.github.io/ilo-rest-api-docs/    (iLO 4/5/6 REST API guide)
#   - HPE archive docs (iLO 1/2/3 — Redfish 미지원, IPMI only)
# Lab status: 부재 — iLO 7 만 사이트 검증 (iLO 1/2/3/4/5/6 web sources 기반)
# Protocol support matrix (web sources):
#   - iLO 1/2/3 (legacy): IPMI only — Redfish 미지원
#   - iLO 4 (2014-2017): SmartStorage path (legacy) — 표준 Storage 미지원
#   - iLO 5 (2017-2022): SmartStorage + 표준 Storage dual
#   - iLO 6 (2022-2024): 표준 Storage 우선 + SmartStorage fallback
#   - iLO 7 (2025+): 표준 Storage only (사이트 검증)
# OEM namespace evolution:
#   - iLO 4 시기: Oem.Hp (Hewlett-Packard 시기)
#   - iLO 5+: Oem.Hpe (HPE rebrand 후)
# Tested against: 실장비 검증 결과는 schema/baseline_v1/<vendor>_baseline.json + tests/evidence/ 참조
# Next action: lab 도입 후 별도 cycle — graceful degradation 시나리오 (iLO 1/2/3)
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_hpe_ilo
channel: redfish
priority: 10

match:
  vendor: ["HPE", "Hewlett Packard Enterprise", "HP Enterprise"]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/hpe/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/hpe/normalize_oem.yml"

credentials:
  profile: "hpe"
  fallback_profiles: []
  # P2 AccountService 진입점 — vault/redfish/hpe.yml accounts 의 label 과 매핑
  recovery_accounts:
    - { vault_label: hpe_fallback, role: recovery }
    - { vault_label: hpe_current,  role: recovery }
    - { vault_label: hpe_factory,  role: recovery }

auth:
  preferred: [session, basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware, power]

diagnosis:
  protocol_name: redfish
  not_supported_message: "HPE 장비이나 Redfish를 지원하지 않습니다 (iLO 3 이하 구 세대 추정)."
