---
# ── Origin metadata (rule 96 R1 + R1-A) ───────────────────────────────────────
# Vendor: Supermicro / Super Micro Computer
# Firmware: X12 / H12 generation BMC (AST2600)
# Origin: Supermicro X12/H12 BMC documentation
# Last sync: 2026-05-01 (web sources only — lab 부재)
# Notes: Whitley/Tatlow platform. AST2600 BMC. Root of Trust 지원.
#   H12 일부 variant 는 AST2500 (X11 와 동일 BMC) → hybrid. AST2600 H12는 본 adapter cover.
# Sources (rule 96 R1-A — lab 부재):
#   - https://www.supermicro.com/manuals/other/RedfishUserGuide.pdf
#   - https://www.supermicro.com/manuals/other/redfish-ref-guide-html/Content/general-content/firmware-inventory-update-service.htm
#   - https://www.supermicro.com/support/resources/bios_ipmi.php?type=BMC
# Tested against: lab 부재 (web sources only). 사용자 사이트 도입 시 fixture 캡처.
# Compatibility 가정 (web sources):
#   - manufacturer: "Supermicro" / "Super Micro Computer, Inc." (X11 와 동일)
#   - Manager URI: /redfish/v1/Managers/1
#   - System URI: /redfish/v1/Systems/1
#   - OEM namespace: Oem.Supermicro
#   - Storage Volumes 표준 지원 (SimpleStorage fallback 불필요 가능)
#   - PowerSubsystem 표준 지원
#   - 신 firmware update parameters (read-only 영향 없음 — server-exporter GET only)
# Lab status: 부재 — web sources only (rule 96 R1-A — 사이트 BMC 0대, cycle 2026-05-07 Q2)
# Next action: X12/H12 (Whitley/Tatlow + AST2600) lab 도입 후 별도 cycle (Storage Volumes + PowerSubsystem 응답 형식 확정)
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_supermicro_x12
channel: redfish
priority: 90

match:
  vendor: ["Supermicro", "Super Micro Computer, Inc.", "Super Micro Computer", "SUPERMICRO"]
  model_patterns: ["X12", "x12", "H12", "h12"]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/supermicro/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/supermicro/normalize_oem.yml"

credentials:
  profile: "supermicro"
  fallback_profiles: []
  # P2 AccountService 진입점 — vault/redfish/supermicro.yml accounts 의 label 과 매핑
  recovery_accounts:
    - { vault_label: supermicro_factory, role: recovery }

auth:
  preferred: [basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware, power]

vendor_notes:
  generation: x12
  generation_year: "2020-2022"
  bmc_chip: ast2600
  root_of_trust: true
  power_subsystem_introduction: true     # X12 부터 PowerSubsystem 도입 (DSP0268 v1.13+)
  storage_strategy_evolution: standard   # 표준 Storage path 지원 (X11 부터)
  redfish_introduction: "DSP0268 v1.13+"
# Lab status: 부재 — 사용자 명시 2026-05-07 Q2 (Supermicro 사이트 BMC 0대)
# Next action: lab 도입 후 별도 cycle — capability 보정 (rule 50 R2 단계 10)

diagnosis:
  protocol_name: redfish
  not_supported_message: "Supermicro X12/H12 계열 — Redfish 완전 지원 가정 (lab 부재 — web sources 기반)."
