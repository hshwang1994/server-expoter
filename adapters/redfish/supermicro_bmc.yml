---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: Supermicro / Super Micro Computer
# Firmware: BMC firmware 1.x / 2.x
# Origin: Supermicro BMC Redfish API documentation
# Last sync: 2026-04-28 (full-sweep)
# Notes: generic Supermicro BMC fallback. 세대 무관.
# Tested against: 실장비 검증 결과는 schema/baseline_v1/<vendor>_baseline.json + tests/evidence/ 참조
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_supermicro_bmc
channel: redfish
priority: 10

match:
  vendor: ["Supermicro", "Super Micro Computer, Inc.", "Super Micro Computer", "SUPERMICRO"]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/supermicro/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/supermicro/normalize_oem.yml"

credentials:
  profile: "supermicro"
  fallback_profiles: []

auth:
  preferred: [basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware, power]

diagnosis:
  protocol_name: redfish
  not_supported_message: "Supermicro 장비이나 Redfish를 지원하지 않습니다 (X9/X10 등 구 세대 추정)."
