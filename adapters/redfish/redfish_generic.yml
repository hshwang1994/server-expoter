---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: DMTF Redfish standard (generic fallback)
# Firmware: tested_against [] — DMTF Redfish 1.x 표준
# Origin: DMTF Redfish Specification (https://www.dmtf.org/standards/redfish)
# Last sync: 2026-04-27 (hshwang1994)
# Notes: priority=0 — vendor-specific adapter (dell_idrac9, hpe_ilo5, ...) 매치 실패 시 fallback.
#        OEM 추출 없이 standard schema만 (Oem.* 미사용).
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_generic
channel: redfish
priority: 0
generic: true

match: {}

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

collect:
  strategy: standard_only
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"

credentials:
  profile: ""
  fallback_profiles: []

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware, power]

diagnosis:
  protocol_name: redfish
  not_supported_message: "이 장비는 Redfish를 지원하지 않거나 구현이 제한적입니다."
