---
# ── Origin metadata (rule 96 R1 + R1-A) ───────────────────────────────────────
# Vendor: Lenovo
# Firmware: XCC3 — OpenBMC 기반 신 generation
# Origin: Lenovo XCC3 REST API documentation (ThinkSystem V4)
# Last sync: 2026-05-01 (web sources only — lab 부재)
# Notes: ThinkSystem V4 (SR630 V4 / SR650 V4 / SR680a V4 등). 2025-2026 출하.
# Sources (rule 96 R1-A — lab 부재):
#   - https://lenovopress.lenovo.com/lp2273-lenovo-xclarity-controller-3-xcc3
#   - https://lenovopress.lenovo.com/lp2273.pdf
#   - https://pubs.lenovo.com/xcc3-restapi/
#   - https://pubs.lenovo.com/xcc3-restapi/xcc3_restapi_book.pdf
#   - https://lenovopress.lenovo.com/lp1991-thinksystem-v3-v4-server-firmware-and-drivers-best-practices-advanced-guide
#   - https://lenovopress.lenovo.com/lp1971-thinksystem-sr630-v4-server
#   - https://lenovopress.lenovo.com/lp2264-thinksystem-sr680a-v4-server
# Tested against: lab 부재 (web sources only). 사용자 사이트 도입 시 fixture 캡처.
# Compatibility 가정 (web sources, F55/F56 cycle 2026-05-01):
#   - manufacturer: "Lenovo" (XCC1/XCC2 와 동일)
#   - Manager URI: /redfish/v1/Managers/1 (XCC2 와 유사)
#   - System URI: /redfish/v1/Systems/1
#   - OEM namespace: Oem.Lenovo
#   - Redfish 1.17.0 / schema bundle 2024.3 (XCC2 의 1.20.0 + 2023.3 와 schema 역전)
#   - OpenBMC 기반 → Oem.Lenovo 영역이 표준 Redfish 우선 → OEM 의존 감소
#   - FPGA firmware separate item — UpdateService/FirmwareInventory/FPGA (gather 자동 cover)
#   - ExtendedError.1.2.2.json OEM registry 신규 (server-exporter 미사용)
#   - UEFI/BMC 설정 이름 형식 변경 (read-only 영향 작음)
# HTTP 헤더 정책 (cycle 2026-04-30 사이트 사고 학습 — F57/J2):
#   - Accept-only 헤더 패턴 유지 (사용자 사이트 BMC 1.17.0 reject 회피)
#   - OData-Version / User-Agent 추가 금지
#   → redfish_gather.py _get() 의 공통 정책 그대로 사용
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_lenovo_xcc3
channel: redfish
priority: 120

match:
  vendor: ["Lenovo", "LENOVO"]
  # XCC3 펌웨어 — XCC1/XCC2 의 "AFBT" / "TAOT" 등과 다른 prefix 가능.
  # 안전하게 "XCC3" 시그니처 + ThinkSystem V4 model_patterns 로 분리.
  firmware_patterns: ["XCC3", "XCC.*3"]
  model_patterns:
    - "ThinkSystem SR630 V4"
    - "ThinkSystem SR650 V4"
    - "ThinkSystem SR680a V4"
    - "ThinkSystem ST650 V4"
    - "ThinkSystem SR635 V4"
    - "ThinkSystem SR655 V4"
    - "ThinkSystem.*V4"

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/lenovo/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/lenovo/normalize_oem.yml"

credentials:
  profile: "lenovo"
  fallback_profiles: []
  recovery_accounts:
    - { vault_label: lenovo_userid_default, role: recovery }

auth:
  preferred: [basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware, power]

# XCC3 특이사항 (web sources 기반, lab 부재):
# - OpenBMC 기반 — 표준 Redfish 우선, OEM 의존 감소
# - Redfish 1.17.0 / bundle 2024.3
# - FPGA firmware separate (FirmwareInventory 자동 cover)
# - Accept-only 헤더 (cycle 2026-04-30 사이트 hotfix 패턴 준수)
vendor_notes:
  generation: xcc3
  base_platform: openbmc
  redfish_version: "1.17.0"
  schema_bundle: "2024.3"
  http_headers_policy: accept_only

diagnosis:
  protocol_name: redfish
  not_supported_message: "Lenovo XCC3 장비 (ThinkSystem V4) — Redfish 완전 지원 가정 (lab 부재 — web sources 기반)."
