---
# ── Origin metadata (rule 96 R1 + R1-A) ───────────────────────────────────────
# Vendor: HPE / Hewlett Packard Enterprise
# Model: HPE Compute Scale-up Server 3200 (CSUS 3200) — 4-socket × 1~4 chassis (최대 16-socket)
#        Mission-critical x86 (Intel Xeon SP), DDR5, 2023+ 출시
# Firmware: RMC 3.x ~ 4.x (lab 부재 — 사이트 실측 시 정정 의무)
# Origin: HPE 공식 docs / Server Management Portal / DMTF Redfish (cycle 2026-05-11 추가)
# Last sync: 2026-05-11 (cycle "hpe-csus-add" — AI web-evidence collection)
# Lab: 부재 — web sources only (rule 96 R1-A). 사이트 실측 시 정정 가능 (rule 25 R7-A-1).
# Tested against: 미확인 — lab 도입 시 capture-site-fixture skill 적용
# Notes:
#   - HPE 공식 자료 명시: "built on the proven HPE Superdome Flex architecture"
#     → Superdome Flex 후속 / 동일 RMC 관리 모델 / Oem.Hpe namespace 공유 (강한 추정)
#   - 관리 구조 = RMC (Rack Management Controller) primary + PDHC (per-chassis) + RMP (redundancy)
#   - RMC Redfish API 표준 지원 — HPE OneView profile + 표준 Redfish 동시
#   - Multi-partition (nPAR) — Superdome Flex 상속. 첫 partition (Partition0) 만 수집.
#     전체 partition 수집은 별도 cycle (Systems Members[0] 단일 진입 패턴 변경 필요).
#   - 4-socket × 1~4 chassis 모듈식. 캐비닛 4개까지 단일 시스템 결합.
#   - DDR5 128 GB DIMM 기준 128 GB ~ 32 TB shared memory.
#   - Oem.Hpe namespace 동일 → HPE 공통 OEM tasks 재사용 (collect_oem.yml / normalize_oem.yml).
#     model regex 확장: (?i)Superdome|Flex|Compute Scale-up|CSUS — Additive only (rule 92 R2).
#   - vault profile: hpe (별도 vault 불필요 — 사용자 명시 승인 시 향후 분리).
# source: https://cdrdv2-public.intel.com/792357/FAQ%20-%20HPE%20Compute%20Scale-up%20Server%203200.pdf
#         (HPE Compute Scale-up Server 3200 FAQ — RMC + 표준 Redfish API 명시)
# source: https://www.hpe.com/psnow/doc/a50009596enw
#         (HPE Compute Scale-up Server 3200 architecture and RAS — "built on the proven HPE Superdome Flex architecture")
# source: https://buy.hpe.com/us/en/compute/mission-critical-x86-servers/compute-scale-up-servers/compute-scale-up-servers/hpe-compute-scale-up-server-3200/p/1014774076
#         (HPE store 제품 페이지 — 4-socket 모듈 / DDR5 / Xeon SP 사양)
# source: https://servermanagementportal.ext.hpe.com/
#         (HPE Server Management Portal — RMC Redfish API 표준 reference)
# source: https://support.hpe.com/hpesc/public/docDisplay?docId=sd00001798en_us
#         (HPE Compute Scale-up Server 3200 & Superdome Flex 공통 support 영역)
# source: https://redfish.dmtf.org/schemas/DSP0266_1.15.0.html
#         (Redfish DMTF Specification v1.15 — 표준 schema)
# source: https://hewlettpackard.github.io/ilo-rest-api-docs/ilo5/
#         (iLO 5 API Reference — Oem.Hpe namespace reference, Superdome 공유)
# DRIFT 추적: Manufacturer string / ServiceRoot.Product / RMC firmware version 사이트 실측 시 정정 가능
# Next action: lab 도입 후 별도 cycle (`hpe-csus-3200-lab-validation` round) — NEXT_ACTIONS.md 등재
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_hpe_csus_3200
channel: redfish
priority: 96
# priority 차등 (rule 12 R2 일관성):
#   iLO 7 (120) > iLO 6 (100) > CSUS 3200 (96) > Superdome Flex (95) > iLO 5 (90) > iLO 4 (50) > generic (10)
#   model_patterns 우선 매치 — 일반 ProLiant 는 iLO 5/6/7 자동 선택, CSUS 3200 모델은 본 adapter 우선.
#   Superdome Flex (95) ↔ CSUS 3200 (96): 모델 regex 분리 — Flex 는 "Superdome Flex", CSUS 는 "Compute Scale-up Server 3200".

match:
  vendor: ["HPE", "Hewlett Packard Enterprise"]
  # Product / Manager.Model 시그니처 — HPE 공식 명시 "HPE Compute Scale-up Server 3200" / "CSUS 3200"
  model_patterns:
    - "^Compute Scale-up Server 3200.*"
    - "^HPE Compute Scale-up Server.*3200.*"
    - ".*Compute Scale-up Server 3200.*"
    - ".*CSUS.*3200.*"   # 약어 표기 (사이트 / 일부 BMC 응답 대비)
  # 펌웨어: RMC 3.x ~ 4.x (Superdome Flex RMC 2.x/3.x 후속 — lab 부재 추정)
  firmware_patterns:
    - "^[34]\\.[0-9]+\\..*"  # RMC firmware 3.x / 4.x (광범위 — 사이트 실측 시 정정)

capabilities:
  sections_supported:
    - system     # /Systems/Partition<N> — 첫 partition (Partition0) 만 수집
    - hardware   # /Chassis/<id> — RMC aggregation (Base + Expansion chassis 최대 4)
    - bmc        # /Managers/<RMC_id> — RMC primary (per-chassis PDHC 는 보조)
    - cpu        # Systems.Processors (Intel Xeon SP)
    - memory     # Systems.Memory (DDR5, 128 GB DIMM 표준)
    - storage    # Systems.Storage + Volumes (표준 Redfish)
    - network    # Systems.EthernetInterfaces
    - firmware   # UpdateService — complex/nPar firmware bundles 포함 (raw passthrough — Superdome Flex 상속)
    - power      # Chassis.PowerSubsystem (DMTF 신 schema) → Power (legacy fallback)
  # users (AccountService) — sections.yml channels=[os] 정의 따라 Redfish 채널 미해당. capabilities 명시 안 함.

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  # HPE 공통 OEM tasks 재사용 — Oem.Hpe namespace 동일 + PartitionInfo / FlexNodeInfo / GlobalConfiguration 상속.
  # model regex 확장으로 CSUS 3200 분기 활성화 (Additive — collect_oem.yml L75).
  oem_tasks: "redfish-gather/tasks/vendors/hpe/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/hpe/normalize_oem.yml"
  # 첫 Partition (Partition0) 만 수집되는 한계는 diagnosis.details 에 multi_partition_warning emit 권장.

credentials:
  profile: "hpe"  # vault/redfish/hpe.yml 재사용 (rule 50 R2 단계 4 — vault 분리는 NEXT_ACTIONS 등재)
  fallback_profiles: []
  # P2 AccountService 진입점 — vault/redfish/hpe.yml accounts 의 label 과 매핑
  recovery_accounts:
    - { vault_label: hpe_fallback, role: recovery }
    - { vault_label: hpe_current,  role: recovery }
    - { vault_label: hpe_factory,  role: recovery }

auth:
  preferred: [session, basic]  # RMC 표준 Redfish auth — Superdome Flex 와 동일

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware, bmc]
  optional_sections: [firmware, power, storage, network]

# CSUS 3200 특이사항 (lab 부재 — web sources 추정. 사이트 실측 시 정정)
vendor_notes:
  multi_partition: true              # nPAR — 전 partition 수집 (cycle 2026-05-12 ADR-2026-05-12)
  multi_node_support: true           # cycle 2026-05-12 — _collect_multi_node_topology 활성
  systems_id_pattern: "Partition*"   # /redfish/v1/Systems/Partition0 (추정 — Superdome Flex 동일 패턴)
  manager_layout: "rmc_primary"      # RMC = primary AccountService host. PDHC = per-chassis 보조.
  rmc_firmware_min: "3.0"            # 추정 — Superdome Flex RMC 2.x/3.x 후속이라 3.x 시작 가정
  npar_firmware_bundles: true        # complex/nPar firmware bundles (Superdome Flex 상속)
  socket_module: "4-socket"          # 4-socket × 1~4 chassis 모듈식 (최대 16-socket)
  memory_dimm: "DDR5"                # 128 GB DIMM 표준, 128 GB ~ 32 TB shared
  oneview_supported: true            # HPE OneView profile (서버 프로파일 + firmware/BIOS 관리)

diagnosis:
  protocol_name: redfish
  not_supported_message: >-
    HPE Compute Scale-up Server 3200 (CSUS 3200) — RMC + PDHC 관리, multi-partition (nPAR).
    cycle 2026-05-12 (ADR-2026-05-12) — 전 partition / 전 manager / 전 chassis 수집 활성.
    data.multi_node 컨테이너에 partitions / managers / chassis 리스트 노출 (Additive).
    lab 부재 — 사이트 실측 시 model_patterns / firmware_patterns / OEM schema 정정 의무.
