---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: Dell Inc. / Dell EMC
# Firmware: iDRAC 8 — 2.x / 3.x
# Origin: Dell support.dell.com / Redfish API guide (iDRAC 8)
# Last sync: 2026-04-28 (full-sweep)
# Notes: PowerEdge R630/R730 등 13G 시스템. 일부 endpoint 비표준 가능.
# Tested against: 실장비 검증 결과는 schema/baseline_v1/<vendor>_baseline.json + tests/evidence/ 참조
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_dell_idrac8
channel: redfish
priority: 50
version: "1.0.0"

match:
  vendor: ["Dell", "Dell Inc.", "DELL"]
  firmware_patterns: ["iDRAC.*8", "^2\\.", "^3\\."]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/dell/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/dell/normalize_oem.yml"

credentials:
  profile: "dell"
  fallback_profiles: []

auth:
  preferred: [basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware]

diagnosis:
  protocol_name: redfish
  not_supported_message: "Dell iDRAC 8 장비 — Redfish 제한적 지원 (power 섹션 미지원 가능)."
