---
# ── Origin metadata (rule 96 R1 + R1-A) ───────────────────────────────────────
# Vendor: HPE / Hewlett Packard Enterprise
# Firmware: iLO 7 — 1.x (Gen12 ProLiant 신 generation)
# Origin: HPE iLO 7 Redfish API documentation (Gen12, 2025-02 출시)
# Last sync: 2026-05-01 (web sources only — lab 부재)
# Notes: ProLiant Gen12 (DL360 Gen12 / DL380 Gen12 / DL580 Gen12 / ML350 Gen12).
# Sources (rule 96 R1-A — lab 부재):
#   - https://servermanagementportal.ext.hpe.com/docs/redfishservices/ilos/ilo7
#   - https://servermanagementportal.ext.hpe.com/docs/redfishservices/ilos/ilo7/ilo7_adaptation
#   - https://www.hpe.com/us/en/newsroom/press-release/2025/02/hpe-introduces-next-generation-proliant-servers-engineered-for-advanced-security-ai-automation-and-greater-performance.html
#   - https://www.scribd.com/document/917390429/HPE-sd00006383en-us-HPE-ILO-7-v1-16-00-Release-Notes (1.16.00 release notes)
# Tested against: lab 부재 (web sources only). 사용자 사이트 도입 시 fixture 캡처.
# Compatibility 가정 (web sources, F47/F84 cycle 2026-05-01):
#   - manufacturer: "HPE" / "Hewlett Packard Enterprise" (iLO 6 와 동일)
#   - Manager URI: /redfish/v1/Managers/1 (iLO 6 와 동일)
#   - System URI: /redfish/v1/Systems/1 (iLO 6 와 동일)
#   - OEM namespace: Oem.Hpe (iLO 6 와 동일)
#   - 차이점:
#     * firmware version 형식 변경: "1.12.00" / "1.16.00" 형 (Major.Minor.Patch)
#     * SecurityState: "SecureStandard" (default — iLO 6 의 HighSecurity 와 동등)
#     * TLS 1.0/1.1 enum 제거 → server-exporter 는 TLS 1.2/1.3 (F84)
#     * Federation / SerialInterface / SCEP 제거 (server-exporter 미사용)
#     * NetworkPorts deprecated → EthernetInterface fallback (F48 적용 완료)
#     * Oem.Hpe.Firmware.Current.* deprecated → FirmwareInventory 우선
#       (gather_firmware 가 자동 cover)
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_hpe_ilo7
channel: redfish
priority: 120

match:
  vendor: ["HPE", "Hewlett Packard Enterprise"]
  # Gen12 펌웨어 — 3-part version 형식 ("1.12.00" / "1.16.00") + "iLO 7" 시그니처.
  # iLO 6 은 2-part ("1.73") — `\\d+\\.\\d+\\.\\d+` 로 충돌 회피.
  firmware_patterns: ["iLO.*7", "^\\d+\\.\\d+\\.\\d+"]
  model_patterns:
    - "ProLiant DL360 Gen12"
    - "ProLiant DL380 Gen12"
    - "ProLiant DL580 Gen12"
    - "ProLiant ML350 Gen12"
    - "ProLiant Compute DL360 Gen12"
    - "ProLiant Compute DL380 Gen12"

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/hpe/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/hpe/normalize_oem.yml"

credentials:
  profile: "hpe"
  fallback_profiles: []
  recovery_accounts:
    - { vault_label: hpe_fallback, role: recovery }
    - { vault_label: hpe_current,  role: recovery }
    - { vault_label: hpe_factory,  role: recovery }

auth:
  preferred: [session, basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware, power]

# iLO 7 특이사항 (Gen12 — web sources 기반, lab 부재):
# - NetworkPorts deprecated → EthernetInterface (gather_network 자동 cover)
# - Oem.Hpe.Firmware.Current.* deprecated → FirmwareInventory 우선
# - SecurityState: "SecureStandard" default
# - TLS 1.3 강제 가능 (F84 — minimum_version=TLSv1_2)
vendor_notes:
  storage_controller_method: controllers_sublink
  indicator_led_field: LocationIndicatorActive
  fan_reading_units: Percent
  nic_data_limited: false
  generation: gen12

diagnosis:
  protocol_name: redfish
  not_supported_message: "HPE iLO 7 장비 (Gen12) — Redfish 완전 지원 가정 (lab 부재 — web sources 기반)."
