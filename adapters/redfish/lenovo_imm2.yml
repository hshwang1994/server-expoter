---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: Lenovo / IBM
# Firmware: IMM2 — 1.x (legacy)
# Origin: Lenovo IMM2 Redfish API documentation (legacy)
# Last sync: 2026-04-28 (full-sweep)
# Notes: 구세대 System x 또는 IBM 시절 BMC. Redfish 부분 지원.
# Tested against:
#   - System x3650 M5 (IMM2 v6.x 펌웨어) — 가이드 기준선
#   - System x3550 M5 / x3850 X6 — 동일 IMM2 계열 (펌웨어 1.x ~ 2.x)
#   - 실장비 검증은 schema/baseline_v1/lenovo_imm2_baseline.json + tests/evidence/ 참조 (해당 시)
#   - DRIFT 발견 시: docs/ai/catalogs/EXTERNAL_CONTRACTS.md에 즉시 기록 (rule 96 R4)
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_lenovo_imm2
channel: redfish
priority: 50

match:
  vendor: ["Lenovo", "LENOVO"]
  firmware_patterns: ["IMM2"]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage  # M-D3 W4 (cycle 2026-05-06): A1 SimpleStorage fallback 코드 적용 — Additive only
    - network
    - firmware
    - power    # M-D3 W5 (cycle 2026-05-06): A2 PowerSubsystem→Power fallback 적용 — Additive only

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/lenovo/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/lenovo/normalize_oem.yml"

credentials:
  profile: "lenovo"
  fallback_profiles: []
  # P2 AccountService 진입점 — vault/redfish/lenovo.yml accounts 의 label 과 매핑
  recovery_accounts:
    - { vault_label: lenovo_userid_default, role: recovery }

auth:
  preferred: [basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware]

diagnosis:
  protocol_name: redfish
  not_supported_message: "Lenovo IMM2 장비 — Redfish 제한적 지원."
