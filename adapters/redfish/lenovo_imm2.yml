---
# ── Origin metadata (rule 96 R1 + R1-A) ───────────────────────────────────────
# Vendor: Lenovo / IBM
# Firmware: IMM2 — 1.x / 2.x (legacy)
# Generation: imm2
# Generation Year: "2014-2017 (IBM xSeries → Lenovo System x 인수 후 IMM2)"
# Redfish Introduction: "DSP0268 v1.0+"
# Origin: Lenovo IMM2 Redfish API documentation (legacy)
# Last sync: 2026-05-11 (M-H3 — capability + SimpleStorage fallback 매트릭스 보강)
# Notes: 구세대 System x (IBM 인수 전후). Redfish 부분 지원.
# Sources (rule 96 R1-A — lab 부재):
#   - https://pubs.lenovo.com/imm2/   (IMM2 user guide)
#   - https://lenovopress.lenovo.com/   (System x / IMM2 archive)
#   - https://www.ibm.com/docs/en/serverguide/   (IBM System x archive)
# Lab status: 부재 — XCC3 만 사이트 검증 (IMM2 lab 도입 시 fixture 캡처)
# Storage strategy: standard_with_simple_fallback
#   - IMM2 일부 펌웨어 SimpleStorage path 만 지원 (1.x ~ 2.x 펌웨어)
#   - M-D3 W4 (cycle 2026-05-06): A1 SimpleStorage fallback 코드 적용 — Additive only
# Power strategy: Power deprecated path only (PowerSubsystem 미도입 시기)
#   - M-D3 W5 (cycle 2026-05-06): A2 PowerSubsystem→Power fallback 적용 — Additive only
# OEM namespace: Oem.Lenovo (IBM IMM2 → Lenovo IMM2 인수 후 동일)
# History note: IBM IMM2 → Lenovo IMM2 (2014 System x 인수 후) — Manufacturer 'IBM' 포함
# Tested against:
#   - System x3650 M5 (IMM2 v6.x 펌웨어) — 가이드 기준선
#   - System x3550 M5 / x3850 X6 — 동일 IMM2 계열 (펌웨어 1.x ~ 2.x)
#   - 실장비 검증은 schema/baseline_v1/lenovo_imm2_baseline.json + tests/evidence/ 참조 (해당 시)
#   - DRIFT 발견 시: docs/ai/catalogs/EXTERNAL_CONTRACTS.md에 즉시 기록 (rule 96 R4)
# Next action: lab 도입 후 별도 cycle (IMM2 SimpleStorage path 응답 형식 확정)
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_lenovo_imm2
channel: redfish
priority: 50

match:
  vendor: ["Lenovo", "LENOVO"]
  firmware_patterns: ["IMM2"]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage  # M-D3 W4 (cycle 2026-05-06): A1 SimpleStorage fallback 코드 적용 — Additive only
    - network
    - firmware
    - power    # M-D3 W5 (cycle 2026-05-06): A2 PowerSubsystem→Power fallback 적용 — Additive only

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/lenovo/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/lenovo/normalize_oem.yml"

credentials:
  profile: "lenovo"
  fallback_profiles: []
  # P2 AccountService 진입점 — vault/redfish/lenovo.yml accounts 의 label 과 매핑
  recovery_accounts:
    - { vault_label: lenovo_userid_default, role: recovery }

auth:
  preferred: [basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware]

diagnosis:
  protocol_name: redfish
  not_supported_message: "Lenovo IMM2 장비 — Redfish 제한적 지원."
