---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: Dell Inc. / Dell EMC
# Firmware: iDRAC 9 — 4.x / 5.x / 6.x / 7.x
# Origin: Dell support.dell.com / Redfish API guide (iDRAC 9)
# Last sync: 2026-04-28 (Round 11 reference 수집)
# Notes: PowerEdge 14G/15G/16G. Storage Volumes 5.x+ 표준.
# Tested against (실측 2026-04-28, Round 11):
#   - PowerEdge R760 (16G Monolithic) × 5대 (10.100.15.27/28/31/33/34)
#   - iDRAC FirmwareVersion: 7.10.70.00
#   - BIOS: 2.3.5
#   - Redfish: 1.20.1
#   - CPU: Intel Xeon Silver 4510
#   - 데이터 경로: tests/reference/redfish/dell/10_100_15_*
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_dell_idrac9
channel: redfish
priority: 100

match:
  vendor: ["Dell", "Dell Inc.", "DELL"]
  firmware_patterns: ["iDRAC.*9", "^[4-7]\\."]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/dell/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/dell/normalize_oem.yml"

credentials:
  profile: "dell"
  fallback_profiles: []
  # P2 AccountService 진입점 — vault/redfish/dell.yml accounts 의 label 과 매핑
  recovery_accounts:
    - { vault_label: dell_root_dellidrac1, role: recovery }
    - { vault_label: dell_root_calvin,     role: recovery }

auth:
  preferred: [session, basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware, power]

diagnosis:
  protocol_name: redfish
  not_supported_message: "Dell iDRAC 9 장비 — Redfish 완전 지원."
