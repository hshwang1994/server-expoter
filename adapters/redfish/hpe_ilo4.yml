---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: HPE / Hewlett Packard Enterprise
# Firmware: iLO 4 — 2.x
# Origin: HPE iLO 4 Redfish API documentation
# Last sync: 2026-04-28 (full-sweep)
# Notes: ProLiant Gen9. Redfish 부분 지원.
# Tested against: 실장비 검증 결과는 schema/baseline_v1/<vendor>_baseline.json + tests/evidence/ 참조
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_hpe_ilo4
channel: redfish
priority: 50

match:
  vendor: ["HPE", "Hewlett Packard Enterprise", "HP Enterprise"]
  firmware_patterns: ["iLO.*4", "^1\\.[0-9]"]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage  # M-D3 W2 (cycle 2026-05-06): A1 SimpleStorage fallback 코드 적용 — Additive only
    - network
    - firmware
    - power    # M-D3 W3 (cycle 2026-05-06): A2 PowerSubsystem→Power fallback 적용 — Additive only

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/hpe/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/hpe/normalize_oem.yml"

credentials:
  profile: "hpe"
  fallback_profiles: []
  # P2 AccountService 진입점 — vault/redfish/hpe.yml accounts 의 label 과 매핑
  recovery_accounts:
    - { vault_label: hp_admin_hpinvent1, role: recovery }

auth:
  preferred: [basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware]

diagnosis:
  protocol_name: redfish
  not_supported_message: "HPE iLO 4 장비 — Redfish 제한적 지원 (storage/power 미지원 가능)."
