---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: Lenovo
# Firmware: XCC — 1.x / 2.x / 3.x
# Origin: Lenovo XCC Redfish API documentation
# Last sync: 2026-04-28 (Round 11 reference 수집)
# Notes: ThinkSystem 모던 세대 (SR/ST). Redfish 1.x 표준 호환.
# Tested against (실측 2026-04-28, Round 11):
#   - ThinkSystem SR650 V2 × 1대 (10.50.11.232)
#   - XCC FirmwareVersion: "AFBT58B 5.70 2025-08-11"
#   - BIOS: AFE136D
#   - Redfish: 1.15.0
#   - CPU: Intel Xeon Gold 6338
#   - 데이터 경로: tests/reference/redfish/lenovo/10_50_11_232/
#   - 주의: ServiceRoot.Vendor="Lenovo" 명시 / Oem 키 비어있음
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_lenovo_xcc
channel: redfish
priority: 100

match:
  vendor: ["Lenovo", "LENOVO"]
  firmware_patterns: ["XCC"]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/lenovo/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/lenovo/normalize_oem.yml"

credentials:
  profile: "lenovo"
  fallback_profiles: []
  # P2 AccountService 진입점 — vault/redfish/lenovo.yml accounts 의 label 과 매핑
  recovery_accounts:
    - { vault_label: lenovo_userid_default, role: recovery }

auth:
  preferred: [basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware, power]

diagnosis:
  protocol_name: redfish
  not_supported_message: "Lenovo XCC 장비 — Redfish 완전 지원."
