---
# ── Origin metadata (rule 96 R1 + R1-A) ───────────────────────────────────────
# Vendor: Supermicro / Super Micro Computer
# Firmware: ARS generation BMC (ARM platform — Ampere Altra / Microsoft Cobalt)
# Origin: Supermicro ARS BMC documentation
# Last sync: 2026-05-07 (web sources only — lab 부재)
# Notes: ARM Server platform (2023+). Ampere Altra / Ampere Altra Max / Microsoft Cobalt 100.
#   AST2600 BMC (Intel/AMD platform 과 동일 BMC chip) + 최신 Redfish 펌웨어.
#   Processor 영역 차이: Manufacturer="Ampere" 또는 "Microsoft", InstructionSet="ARM-A64".
#   기타 sections (Storage / Power / Network / BMC) 는 X13/X14 와 거의 동일.
# Sources (rule 96 R1-A — lab 부재):
#   - https://www.supermicro.com/manuals/superserver/ARS/
#   - https://www.supermicro.com/manuals/other/RedfishUserGuide.pdf
#   - https://www.supermicro.com/support/resources/bios_ipmi.php?type=BMC
# Tested against: lab 부재 (web sources only). 사용자 사이트 도입 시 fixture 캡처.
# Compatibility 가정 (web sources):
#   - manufacturer: Supermicro alias 전 generation 공통
#   - Manager URI / System URI: X12+ 와 동일
#   - PowerSubsystem 표준 지원 (X12+ 와 동일)
#   - Storage 표준 path 지원 (X11+ 와 동일)
#   - OEM 약함 — 표준 path 위주
# Lab status: 부재 — 사용자 명시 2026-05-07 Q2 (Supermicro 사이트 BMC 0대)
# Next action: lab 도입 후 별도 cycle — ARM Processor 영역 capability 보정 (rule 50 R2 단계 10)
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: redfish_supermicro_ars
channel: redfish
priority: 80

match:
  vendor: ["Supermicro", "Super Micro Computer, Inc.", "Super Micro Computer", "SUPERMICRO"]
  # ARS-* (ARM Server) / Altra / Cobalt 키워드 — Intel/AMD model_patterns 와 충돌 0
  model_patterns: ["ARS", "ars", "Altra", "altra", "Cobalt", "cobalt"]

capabilities:
  sections_supported:
    - system
    - hardware
    - bmc
    - cpu
    - memory
    - storage
    - network
    - firmware
    - power

collect:
  strategy: standard_plus_oem
  standard_tasks: "redfish-gather/tasks/collect_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/supermicro/collect_oem.yml"

normalize:
  standard_tasks: "redfish-gather/tasks/normalize_standard.yml"
  oem_tasks: "redfish-gather/tasks/vendors/supermicro/normalize_oem.yml"

credentials:
  profile: "supermicro"
  fallback_profiles: []
  recovery_accounts: []

auth:
  preferred: [basic]

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [firmware, power]

vendor_notes:
  generation: ars
  generation_year: "2023+"
  bmc_chip: ast2600
  root_of_trust: true
  cpu_architecture: arm64                # Processor.InstructionSet="ARM-A64"
  power_subsystem_introduction: true     # PowerSubsystem 표준 지원 (최신 펌웨어)
  storage_strategy_evolution: standard   # 표준 Storage path 지원
  redfish_introduction: "DSP0268 v1.10+"

diagnosis:
  protocol_name: redfish
  not_supported_message: "Supermicro ARS (ARM) 계열 — Redfish 완전 지원 가정 (lab 부재 — web sources 기반). Processor.InstructionSet=ARM-A64 응답 가정."
