---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: VMware ESXi (generic fallback)
# Firmware: tested_against [] — 모든 버전 fallback
# Origin: server-exporter 정책 — 매치되는 세대 adapter 없을 때 graceful degradation
# Last sync: 2026-04-27 (hshwang1994)
# Notes: priority=0 — 마지막 fallback. esxi_6x/7x/8x 매치 실패 시 선택.
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: esxi_generic
channel: esxi
priority: 0
version: "1.0.0"
generic: true

match: {}

capabilities:
  sections_supported:
    - system
    - hardware
    - cpu
    - memory
    - storage
    - network

collect:
  collect_tasks:
    - "esxi-gather/tasks/collect_facts.yml"
    - "esxi-gather/tasks/collect_config.yml"
    - "esxi-gather/tasks/collect_datastores.yml"
  normalize_tasks:
    - "esxi-gather/tasks/normalize_system.yml"
    - "esxi-gather/tasks/normalize_network.yml"
    - "esxi-gather/tasks/normalize_storage.yml"

credentials:
  profile: "esxi_default"
  fallback_profiles: []

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [storage]
