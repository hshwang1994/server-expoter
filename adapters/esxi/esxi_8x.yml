---
# ── Origin metadata (rule 96 R1) ──────────────────────────────────────────────
# Vendor: VMware ESXi 8.x
# Firmware: tested_against ["8.0", "8.0 U1", "8.0 U2"]
# Origin: 추정 — 검증 필요 (community.vmware 6.2.0 + vSphere 8.x release notes)
# Last sync: 2026-04-27 (hshwang1994)
# Notes: 최신. priority=100 — 8.x 우선 선택.
# ──────────────────────────────────────────────────────────────────────────────
adapter_id: esxi_8x
channel: esxi
priority: 100
version: "1.0.0"

match:
  version_patterns: ["^8\\."]

capabilities:
  sections_supported:
    - system
    - hardware
    - cpu
    - memory
    - storage
    - network

collect:
  collect_tasks:
    - "esxi-gather/tasks/collect_facts.yml"
    - "esxi-gather/tasks/collect_config.yml"
    - "esxi-gather/tasks/collect_datastores.yml"
  normalize_tasks:
    - "esxi-gather/tasks/normalize_system.yml"
    - "esxi-gather/tasks/normalize_network.yml"
    - "esxi-gather/tasks/normalize_storage.yml"

credentials:
  profile: "esxi_default"
  fallback_profiles: []

graceful_degradation:
  on_section_fail: continue
  on_auth_fail: abort
  critical_sections: [system, hardware]
  optional_sections: [storage]
