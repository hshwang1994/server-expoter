---
# os-gather/tasks/try_credentials.yml
#
# P1 (cycle 2026-04-28): vault accounts 후보 순차 시도 — Linux SSH / Windows WinRM 공통.
# 성공한 자격으로 ansible_user / ansible_password 갱신 후 본 gather 진행.
# 모두 실패 시 _os_auth_ok=false → site.yml 의 block 이 fail 또는 rescue 로 분기.
#
# 입력:
#   _os_accounts : list of {username, password, label, role}
#   _os_type     : 'linux' | 'windows'
#
# 출력:
#   _os_auth_ok           : bool
#   _os_used_account      : { username, label, role }  (password 미포함)
#   _os_attempts_meta     : { attempted_count, used_label, used_role, fallback_used }
#
# 설계:
#   - Linux: raw 모듈로 'echo ok' (간단한 read-only 명령) 시도 → SSH 인증 검증
#   - Windows: ansible.windows.win_ping 으로 WinRM 인증 검증
#   - 자격 갱신은 set_fact (현재 host 의 ansible_user/ansible_password 갱신)

- name: "os | try_credentials | init"
  ansible.builtin.set_fact:
    _os_auth_ok: false
    _os_used_account: {}
  no_log: true

- name: "os | try_credentials | warn no accounts"
  ansible.builtin.debug:
    msg: >-
      vault accounts 비어 있음 ({{ _os_type }}) — 자격증명 없이 진행 시도.
  when: (_os_accounts | default([])) | length == 0

- name: "os | try_credentials | iterate candidates"
  ansible.builtin.include_tasks: try_one_credential.yml
  loop: "{{ _os_accounts | default([]) }}"
  loop_control:
    loop_var: _try_cred
    label:    "{{ _try_cred.label | default('unlabeled') }}"
  when: (_os_accounts | default([])) | length > 0

- name: "os | try_credentials | record meta"
  ansible.builtin.set_fact:
    _os_attempts_meta:
      attempted_count: "{{ _os_accounts | default([]) | length }}"
      used_label:      "{{ (_os_used_account | default({})).label | default(none) }}"
      used_role:       "{{ (_os_used_account | default({})).role  | default(none) }}"
      fallback_used: >-
        {{ ((_os_used_account | default({})).role | default('primary')) != 'primary'
           and _os_auth_ok | bool }}
  no_log: true
