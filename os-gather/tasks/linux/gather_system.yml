---
# os-gather/tasks/linux/gather_system.yml
# OS 기본 정보 수집 → data.system fragment 생성
#
# Python 경로: setup module + command(systemd-detect-virt, DMI)
# Raw fallback: /etc/os-release + uname + getenforce + DMI sysfs (raw only)
#
# 출력:
#   _data_fragment               → {system: {...}}
#   _sections_supported_fragment → ['system']
#   _sections_collected_fragment → ['system'] or []
#   _sections_failed_fragment    → [] or ['system']
#   _errors_fragment             → []

- name: "linux | system | init fallback vars"
  ansible.builtin.set_fact:
    _l_fb: {}
  no_log: true

# =============================================================================
# Raw-Only System Gather (Python 미사용 경로)
# 전체 system 정보를 단일 raw 호출로 수집
# =============================================================================
- name: "linux | system | raw-only gather (no python)"
  when: _l_python_mode != 'python_ok'
  become: true
  ansible.builtin.raw: |
    export LANG=C
    . /etc/os-release 2>/dev/null || true
    echo "OS_ID=${ID:-}"
    echo "OS_ID_LIKE=${ID_LIKE:-}"
    echo "OS_VERSION=${VERSION_ID:-}"
    echo "OS_PRETTY=${PRETTY_NAME:-unknown}"
    echo "KERNEL=$(uname -r 2>/dev/null)"
    echo "ARCH=$(uname -m 2>/dev/null)"
    echo "FQDN=$(hostname -f 2>/dev/null || hostname 2>/dev/null)"
    echo "UPTIME=$(awk '{print int($1)}' /proc/uptime 2>/dev/null || echo 0)"
    if command -v getenforce >/dev/null 2>&1; then
      echo "SELINUX=$(getenforce 2>/dev/null | tr '[:upper:]' '[:lower:]')"
    elif [ -f /etc/selinux/config ]; then
      echo "SELINUX=$(grep -m1 '^SELINUX=' /etc/selinux/config 2>/dev/null | cut -d= -f2)"
    else
      echo "SELINUX="
    fi
    if command -v systemd-detect-virt >/dev/null 2>&1; then
      echo "SDV=$(systemd-detect-virt 2>/dev/null)"
    else
      echo "SDV="
    fi
    serial=""
    uuid=""
    if [ -r /sys/class/dmi/id/product_serial ]; then
      serial=$(cat /sys/class/dmi/id/product_serial 2>/dev/null)
    elif command -v sudo >/dev/null 2>&1; then
      serial=$(sudo -n cat /sys/class/dmi/id/product_serial 2>/dev/null || true)
    fi
    if [ -r /sys/class/dmi/id/product_uuid ]; then
      uuid=$(cat /sys/class/dmi/id/product_uuid 2>/dev/null)
    elif command -v sudo >/dev/null 2>&1; then
      uuid=$(sudo -n cat /sys/class/dmi/id/product_uuid 2>/dev/null || true)
    fi
    echo "SERIAL=${serial:-}"
    echo "UUID=${uuid:-}"
    # 2026-04-30 fix B80 raw: vendor/model/bios sysfs (Python setup 미동작 환경 보완).
    # raw fallback path는 ansible_system_vendor 미정의이므로 _l_fb.VENDOR로 채움.
    [ -r /sys/class/dmi/id/sys_vendor ]   && echo "VENDOR=$(cat /sys/class/dmi/id/sys_vendor 2>/dev/null)"   || echo "VENDOR="
    [ -r /sys/class/dmi/id/product_name ] && echo "MODEL=$(cat /sys/class/dmi/id/product_name 2>/dev/null)" || echo "MODEL="
    [ -r /sys/class/dmi/id/bios_version ] && echo "BIOS_VERSION=$(cat /sys/class/dmi/id/bios_version 2>/dev/null)" || echo "BIOS_VERSION="
    [ -r /sys/class/dmi/id/bios_date ]    && echo "BIOS_DATE=$(cat /sys/class/dmi/id/bios_date 2>/dev/null)"    || echo "BIOS_DATE="
  register: _l_raw_sys_result
  changed_when: false
  failed_when: false
  no_log: true

# =============================================================================
# system.runtime (F5 cycle 2026-05-11): timezone / ntp / firewall / listen / swap
# 양쪽 경로 (Python + raw fallback) 모두 raw 모듈로 수집 — timedatectl/systemctl
# 같은 명령은 raw 가 가장 robust (setup facts 미의존).
# =============================================================================
- name: "linux | system | gather runtime (timezone/ntp/firewall/listen/swap)"
  become: true
  ansible.builtin.raw: |
    export LANG=C
    TZ=$(timedatectl show -p Timezone --value 2>/dev/null || cat /etc/timezone 2>/dev/null || (readlink /etc/localtime 2>/dev/null | sed 's|.*/zoneinfo/||') || echo "")
    echo "TZ=${TZ}"
    NTPSYNC=$(timedatectl show -p NTPSynchronized --value 2>/dev/null || echo "")
    echo "NTPSYNC=${NTPSYNC}"
    NTPACTIVE="no"
    for svc in chronyd chrony ntpd systemd-timesyncd ntp; do
      if systemctl is-active $svc 2>/dev/null | grep -q "^active$"; then
        NTPACTIVE="yes"; break
      fi
    done
    echo "NTPACTIVE=${NTPACTIVE}"
    FW_TOOL=""
    FW_STATE=""
    if command -v firewall-cmd >/dev/null 2>&1 && systemctl is-active firewalld 2>/dev/null | grep -q "^active$"; then
      FW_TOOL="firewalld"; FW_STATE="active"
    elif command -v ufw >/dev/null 2>&1; then
      UFW_OUT=$(sudo -n ufw status 2>/dev/null | head -1 || true)
      if echo "$UFW_OUT" | grep -qi "Status: active"; then FW_TOOL="ufw"; FW_STATE="active"
      elif echo "$UFW_OUT" | grep -qi "Status: inactive"; then FW_TOOL="ufw"; FW_STATE="inactive"
      fi
    elif command -v nft >/dev/null 2>&1; then
      RULESET=$(sudo -n nft list ruleset 2>/dev/null || true)
      if [ -n "$RULESET" ]; then FW_TOOL="nftables"; FW_STATE="active"
      else FW_TOOL="nftables"; FW_STATE="inactive"
      fi
    elif command -v iptables >/dev/null 2>&1; then
      FW_TOOL="iptables"
      IPT_OUT=$(sudo -n iptables -L -n 2>/dev/null | head -5 || true)
      if [ -n "$IPT_OUT" ]; then FW_STATE="active"; else FW_STATE="inactive"; fi
    fi
    echo "FW_TOOL=${FW_TOOL}"
    echo "FW_STATE=${FW_STATE}"
    echo "PORTS_BEGIN"
    if command -v ss >/dev/null 2>&1; then
      ss -tlnH 2>/dev/null | awk '{print $4}' | awk -F: '{print $NF}' | grep -E '^[0-9]+$' | sort -un
    elif command -v netstat >/dev/null 2>&1; then
      netstat -tln 2>/dev/null | awk 'NR>2 {print $4}' | awk -F: '{print $NF}' | grep -E '^[0-9]+$' | sort -un
    fi
    echo "PORTS_END"
    SWAP_LINE=$(free -m 2>/dev/null | awk 'tolower($1) ~ /^swap/' || true)
    if [ -z "$SWAP_LINE" ]; then SWAP_LINE="Swap: 0 0 0"; fi
    echo "SWAP_TOTAL=$(echo $SWAP_LINE | awk '{print $2}')"
    echo "SWAP_USED=$(echo $SWAP_LINE | awk '{print $3}')"
    echo "SWAP_FREE=$(echo $SWAP_LINE | awk '{print $4}')"
  register: _l_runtime_raw
  changed_when: false
  failed_when: false
  no_log: true

- name: "linux | system | parse runtime"
  ansible.builtin.set_fact:
    _l_runtime: >-
      {%- set lines = _l_runtime_raw.stdout_lines | default([]) -%}
      {%- set ns = namespace(in_ports=false, ports=[], kv={}) -%}
      {%- for line in lines -%}
        {%- set s = line | trim -%}
        {%- if s == 'PORTS_BEGIN' -%}{%- set ns.in_ports = true -%}
        {%- elif s == 'PORTS_END' -%}{%- set ns.in_ports = false -%}
        {%- elif ns.in_ports -%}
          {%- if s and s.isdigit() -%}{%- set _ = ns.ports.append(s | int) -%}{%- endif -%}
        {%- elif '=' in s -%}
          {%- set k, _, v = s.partition('=') -%}
          {%- set _ = ns.kv.update({k: v}) -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set _ = ns.kv.update({'PORTS': ns.ports | sort | unique | list}) -%}
      {{ ns.kv }}
  no_log: true

- name: "linux | system | parse raw results"
  when: _l_python_mode != 'python_ok'
  ansible.builtin.set_fact:
    _l_raw_sys: >-
      {{ dict(_l_raw_sys_result.stdout_lines | default([])
              | select('search', '=')
              | map('split', '=', 1)
              | list) }}
  no_log: true

- name: "linux | system | set raw-derived variables"
  when: _l_python_mode != 'python_ok'
  ansible.builtin.set_fact:
    _l_fb:
      DIST: >-
        {%- set id = (_l_raw_sys.OS_ID | default('')) | trim -%}
        {%- if id == 'rhel' -%}RedHat
        {%- elif id == 'rocky' -%}Rocky
        {%- elif id == 'ubuntu' -%}Ubuntu
        {%- elif id == 'centos' -%}CentOS
        {%- elif id == 'debian' -%}Debian
        {%- elif id == 'fedora' -%}Fedora
        {%- elif id == 'almalinux' -%}AlmaLinux
        {%- else -%}{{ (_l_raw_sys.OS_PRETTY | default(id)) | trim }}
        {%- endif -%}
      OS_FAMILY: >-
        {%- set like = (_l_raw_sys.OS_ID_LIKE | default('')) | trim | lower -%}
        {%- set id = (_l_raw_sys.OS_ID | default('')) | trim | lower -%}
        {%- if 'rhel' in like or id in ['rhel','centos','rocky','almalinux','fedora','oracle'] -%}RedHat
        {%- elif 'debian' in like or id in ['debian','ubuntu','mint'] -%}Debian
        {%- elif 'suse' in like or id in ['sles','opensuse','opensuse-leap','opensuse-tumbleweed'] -%}Suse
        {%- else -%}{{ like.split()[0] | default(id) | title if like else id | title }}
        {%- endif -%}
      OS_VERSION: "{{ (_l_raw_sys.OS_VERSION | default('')) | trim }}"
      KERNEL: "{{ (_l_raw_sys.KERNEL | default('')) | trim }}"
      ARCH: "{{ (_l_raw_sys.ARCH | default('')) | trim }}"
      UPTIME: "{{ (_l_raw_sys.UPTIME | default('0')) | trim }}"
      FQDN: "{{ (_l_raw_sys.FQDN | default(inventory_hostname)) | trim }}"
      SELINUX: >-
        {%- set sel = (_l_raw_sys.SELINUX | default('')) | trim | lower -%}
        {%- if sel in ['enforcing', 'permissive'] -%}enabled
        {%- elif sel == 'disabled' -%}disabled
        {%- elif sel and sel != 'n/a' -%}{{ sel }}
        {%- else -%}{{ none }}
        {%- endif -%}
    _l_hosting_type: >-
      {%- set sdv = (_l_raw_sys.SDV | default('')) | trim | lower -%}
      {%- set vm_signals = ['vmware','kvm','qemu','xen','hyperv','microsoft','oracle','virtualbox','docker','lxc','podman','bhyve','uml','parallels','openvz'] -%}
      {%- if sdv in vm_signals -%}virtual
      {%- elif sdv == 'none' -%}baremetal
      {%- else -%}unknown
      {%- endif -%}
    _l_serial_from_setup: >-
      {%- set s = (_l_raw_sys.SERIAL | default('')) | trim -%}
      {%- set sentinel = ['', 'NA', 'None', 'Not Specified', 'To Be Filled By O.E.M.'] -%}
      {{ s if s not in sentinel else none }}
    _l_uuid_from_setup: >-
      {%- set u = (_l_raw_sys.UUID | default('')) | trim -%}
      {%- set sentinel = ['', 'NA', 'None', 'Not Specified'] -%}
      {{ u if u not in sentinel else none }}
    # 2026-04-30 fix B80 raw: sys_vendor/product_name/bios sentinel filtering.
    _l_raw_vendor: >-
      {%- set v = (_l_raw_sys.VENDOR | default('')) | trim -%}
      {%- set sentinel = ['', 'NA', 'None', 'Not Specified', 'To Be Filled By O.E.M.', 'System manufacturer', 'Default string'] -%}
      {{ v if v not in sentinel else none }}
    _l_raw_model: >-
      {%- set m = (_l_raw_sys.MODEL | default('')) | trim -%}
      {%- set sentinel = ['', 'NA', 'None', 'Not Specified', 'To Be Filled By O.E.M.', 'System Product Name', 'Default string'] -%}
      {{ m if m not in sentinel else none }}
    _l_raw_bios_version: "{{ ((_l_raw_sys.BIOS_VERSION | default('')) | trim) or none }}"
    _l_raw_bios_date:    "{{ ((_l_raw_sys.BIOS_DATE | default('')) | trim) or none }}"
    _l_id_diagnostics: []
  no_log: true

# =============================================================================
# Python Path (기존 로직)
# =============================================================================
- name: "linux | system | setup"
  when: _l_python_mode == 'python_ok'
  ansible.builtin.setup:
    gather_subset: ['hardware', 'network', 'virtual', 'distribution']
  vars:
    ansible_python_interpreter: "{{ _l_python | default('python3') }}"
  register: _l_setup_result
  failed_when: false
  no_log: true

- name: "linux | system | raw fallback"
  when: >
    _l_python_mode == 'python_ok' and
    (_l_setup_result is failed or
     (_l_setup_result.ansible_facts is not defined))
  ansible.builtin.raw: |
    export LANG=C
    echo "DIST=$(. /etc/os-release 2>/dev/null && echo "$PRETTY_NAME" || cat /etc/redhat-release 2>/dev/null || echo unknown)"
    echo "KERNEL=$(uname -r)"
    echo "ARCH=$(uname -m)"
    echo "UPTIME=$(awk '{print int($1)}' /proc/uptime 2>/dev/null || echo 0)"
  register: _l_raw_result
  changed_when: false
  failed_when: false
  no_log: true

- name: "linux | system | parse raw fallback"
  when: >
    _l_python_mode == 'python_ok' and
    (_l_setup_result is failed or
     (_l_setup_result.ansible_facts is not defined))
  ansible.builtin.set_fact:
    _l_fb: "{{ dict(_l_raw_result.stdout_lines | default([])
                    | select('search','=')
                    | map('split','=',1)
                    | list) }}"
  no_log: true

- name: "linux | system | systemd-detect-virt"
  when: _l_python_mode == 'python_ok'
  ansible.builtin.command: systemd-detect-virt
  register: _l_sdv_result
  changed_when: false
  failed_when: false
  no_log: true

- name: "linux | system | determine hosting_type"
  when: _l_python_mode == 'python_ok'
  ansible.builtin.set_fact:
    _l_hosting_type: >-
      {%- set sdv = (_l_sdv_result.stdout | default('')) | trim | lower -%}
      {%- set vtype = (ansible_virtualization_type | default('')) | lower -%}
      {%- set vrole = (ansible_virtualization_role | default('')) | lower -%}
      {%- set vendor = (ansible_system_vendor | default('')) -%}
      {%- set vm_signals = ['vmware', 'kvm', 'qemu', 'xen', 'hyperv', 'microsoft', 'oracle', 'parallels', 'bhyve', 'lxc', 'docker', 'podman', 'openvz', 'virtualbox', 'bochs', 'uml'] -%}
      {# nosec rule12-r1: hosting_type 판정용 OEM vendor list (set membership 패턴, 분기 아님) #}
      {%- set oem_vendors = ['Dell Inc.', 'HPE', 'Hewlett Packard Enterprise', 'Hewlett-Packard', 'Lenovo', 'Cisco Systems Inc', 'Supermicro', 'Fujitsu', 'Inspur'] -%}
      {%- if sdv in vm_signals -%}virtual
      {%- elif vtype in vm_signals and vrole == 'guest' -%}virtual
      {%- elif sdv == 'none' and vrole == 'host' and vendor in oem_vendors -%}baremetal
      {%- else -%}unknown
      {%- endif -%}
  no_log: true

# DMI 접근성 precheck
- name: "linux | system | DMI serial precheck"
  when: _l_python_mode == 'python_ok'
  ansible.builtin.command: test -r /sys/class/dmi/id/product_serial
  register: _l_dmi_serial_access
  changed_when: false
  failed_when: false
  no_log: true

- name: "linux | system | DMI uuid precheck"
  when: _l_python_mode == 'python_ok'
  ansible.builtin.command: test -r /sys/class/dmi/id/product_uuid
  register: _l_dmi_uuid_access
  changed_when: false
  failed_when: false
  no_log: true

- name: "linux | system | check setup fact identifiers"
  when: _l_python_mode == 'python_ok'
  ansible.builtin.set_fact:
    _l_serial_from_setup: >-
      {{ none if (ansible_product_serial | default('')) in ['', 'NA', 'None', 'Not Specified', 'To Be Filled By O.E.M.']
         else (ansible_product_serial | default(none)) }}
    _l_uuid_from_setup: >-
      {{ none if (ansible_product_uuid | default('')) in ['', 'NA', 'None', 'Not Specified']
         else (ansible_product_uuid | default(none)) }}
  no_log: true

# DMI direct-read fallback (become 필요)
- name: "linux | system | DMI direct-read fallback"
  when: >
    _l_python_mode == 'python_ok' and
    ((_l_serial_from_setup | default(none)) is none or
     (_l_uuid_from_setup | default(none)) is none)
  block:
    - name: "linux | system | DMI direct-read serial"
      when: (_l_serial_from_setup | default(none)) is none  # rule 95 R1 R5 ok: serial raw fallback 진입
      ansible.builtin.command: cat /sys/class/dmi/id/product_serial
      become: true
      register: _l_dmi_serial_direct
      changed_when: false
      failed_when: false
      no_log: true

    - name: "linux | system | DMI direct-read uuid"
      when: (_l_uuid_from_setup | default(none)) is none  # rule 95 R1 R5 ok: uuid raw fallback 진입
      ansible.builtin.command: cat /sys/class/dmi/id/product_uuid
      become: true
      register: _l_dmi_uuid_direct
      changed_when: false
      failed_when: false
      no_log: true
  rescue:
    - name: "linux | system | DMI fallback failed (become unavailable)"
      ansible.builtin.set_fact:
        _l_dmi_fallback_failed: true
      no_log: true

# 최종 식별자 결정 — setup fact → DMI direct-read → raw-derived → null
- name: "linux | system | resolve identifiers"
  ansible.builtin.set_fact:
    _l_serial_val: >-
      {%- set sentinel = ['', 'NA', 'None', 'Not Specified', 'To Be Filled By O.E.M.'] -%}
      {%- if (_l_serial_from_setup | default(none)) is not none -%}
        {{ _l_serial_from_setup }}
      {%- elif (_l_dmi_serial_direct is defined) and (_l_dmi_serial_direct.rc | default(1)) == 0
              and (_l_dmi_serial_direct.stdout | default('') | trim) not in sentinel
              and (_l_dmi_serial_direct.stdout | default('') | trim | length) > 0 -%}
        {{ _l_dmi_serial_direct.stdout | trim }}
      {%- else -%}
        {{ none }}
      {%- endif -%}
    _l_uuid_val: >-
      {%- set sentinel = ['', 'NA', 'None', 'Not Specified'] -%}
      {%- if (_l_uuid_from_setup | default(none)) is not none -%}
        {{ _l_uuid_from_setup }}
      {%- elif (_l_dmi_uuid_direct is defined) and (_l_dmi_uuid_direct.rc | default(1)) == 0
              and (_l_dmi_uuid_direct.stdout | default('') | trim) not in sentinel
              and (_l_dmi_uuid_direct.stdout | default('') | trim | length) > 0 -%}
        {{ _l_dmi_uuid_direct.stdout | trim }}
      {%- else -%}
        {{ none }}
      {%- endif -%}
  no_log: true


# identifier diagnostics (Python 경로에서만 상세 진단)
# 별도 task 파일로 분리 (2026-04-28) — 가독성 + rule 10 R3 정합.
- name: "linux | system | identifier diagnostics 빌드"
  ansible.builtin.include_tasks:
    file: "{{ playbook_dir }}/tasks/linux/build_identifier_diagnostics.yml"

# =============================================================================
# Shared: fragment 조립 + merge
# =============================================================================
- name: "linux | system | build fragment"
  ansible.builtin.set_fact:
    _data_fragment:
      system:
        os_family:      "{{ ansible_os_family      | default(_l_fb.OS_FAMILY | default(none)) }}"
        distribution:   "{{ ansible_distribution   | default(_l_fb.DIST | default(none)) }}"
        version:        "{{ ansible_distribution_version | default(_l_fb.OS_VERSION | default(none)) }}"
        kernel:         "{{ ansible_kernel         | default(_l_fb.KERNEL | default(none)) }}"
        architecture:   "{{ ansible_architecture   | default(_l_fb.ARCH | default(none)) }}"
        hosting_type:   "{{ _l_hosting_type | default('unknown') | trim }}"
        uptime_seconds: "{{ (ansible_uptime_seconds | default(_l_fb.UPTIME | default(0))) | int }}"
        selinux:        "{{ ansible_selinux.status | default(_l_fb.SELINUX | default(none)) }}"
        fqdn:           "{{ ansible_fqdn | default(_l_fb.FQDN | default(inventory_hostname)) }}"
        serial_number:  "{{ _l_serial_val | default(none) }}"
        system_uuid:    "{{ _l_uuid_val | default(none) }}"
        # 2026-04-29 fix B80: ansible_system_vendor를 system fragment에도 emit해서
        # site.yml의 envelope.vendor가 build_output 시점에 _merged_data.system.vendor로 접근.
        # 2026-04-30 fix B80 raw fallback: Python 미동작 환경(Python 3.6/RHEL 8.10)에서
        # ansible_system_vendor undefined → _l_raw_vendor (sys_vendor sysfs)로 fallback.
        vendor:         "{{ ansible_system_vendor | default(_l_raw_vendor | default(none)) }}"
        # F5 cycle 2026-05-11: system.runtime — 9 필드 (timezone/ntp/firewall/listen/swap)
        # Linux raw 명령 (timedatectl/systemctl/ss/free) 결과 → _l_runtime 에 parse.
        runtime:
          timezone: >-
            {%- set tz = (_l_runtime.TZ | default('')) | trim -%}
            {{ tz if tz else none }}
          ntp_active: >-
            {%- set v = (_l_runtime.NTPACTIVE | default('')) | trim -%}
            {%- if v == 'yes' -%}{{ true }}
            {%- elif v == 'no' -%}{{ false }}
            {%- else -%}{{ none }}
            {%- endif -%}
          ntp_synchronized: >-
            {%- set v = (_l_runtime.NTPSYNC | default('')) | trim -%}
            {%- if v == 'yes' -%}{{ true }}
            {%- elif v == 'no' -%}{{ false }}
            {%- else -%}{{ none }}
            {%- endif -%}
          firewall_tool: >-
            {%- set v = (_l_runtime.FW_TOOL | default('')) | trim -%}
            {{ v if v else none }}
          firewall_state: >-
            {%- set v = (_l_runtime.FW_STATE | default('')) | trim -%}
            {{ v if v else none }}
          listening_ports: "{{ _l_runtime.PORTS | default([]) }}"
          swap_total_mb: >-
            {%- set v = (_l_runtime.SWAP_TOTAL | default('')) | trim -%}
            {{ (v | int) if (v and v != '0') else (0 if v == '0' else none) }}
          swap_used_mb: >-
            {%- set v = (_l_runtime.SWAP_USED | default('')) | trim -%}
            {{ (v | int) if v else none }}
          swap_free_mb: >-
            {%- set v = (_l_runtime.SWAP_FREE | default('')) | trim -%}
            {{ (v | int) if v else none }}
    _sections_supported_fragment: ['system']
    _sections_collected_fragment: >-
      {{ ['system'] if (ansible_distribution is defined
                        or (_l_fb is defined and _l_fb.DIST is defined))
         else [] }}
    _sections_failed_fragment: >-
      {{ [] if (ansible_distribution is defined
                or (_l_fb is defined and _l_fb.DIST is defined))
         else ['system'] }}
    # 2026-04-30: B80 진단 instrumentation 제거 — root cause는 build_output.yml의
    # `_out_vendor: null` overwrite (commit 0d3058c4)였고 이미 해결됨.
    # vendor 정상 추출(asv=Dell Inc.) 호스트에서도 항상 에러로 emit되어 호출자 혼란.
    # vendor가 진짜 미정의(UNDEF)인 케이스만 진단으로 emit.
    # ROOT CAUSE FIX: 이전 코드는 `>-` block scalar 끝에 잉여 `}}` 두 글자가
    # 있어, Jinja expression 결과 list 가 string 으로 coerce 된 뒤 `\n}}` 가 concat
    # 되어 `_errors_fragment` 가 list 가 아닌 string ('[...]\n}}') 로 들어감.
    # merge_fragment.yml 의 `for e in <string>` 가 character 단위로 iterate 하면서
    # ['[', ']', '\n', '}', '}'] 5개 character 가 errors[].message 로 분해 채워졌음.
    # 단일 line Jinja expression 으로 전환 + list 타입 보존.
    _errors_fragment: "{{ (_l_id_diagnostics | default([])) + ([{'section': 'system', 'message': 'vendor extraction failed — ansible_system_vendor undefined and _l_raw_vendor unset', 'detail': 'inv_host=' ~ inventory_hostname}] if (ansible_system_vendor is not defined and (_l_raw_vendor | default(none)) is none) else []) }}"
    _l_fb: "{{ _l_fb | default({}) }}"
  no_log: true

- name: "linux | system | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
