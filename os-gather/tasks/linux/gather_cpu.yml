---
# os-gather/tasks/linux/gather_cpu.yml
# CPU 정보 수집 → data.cpu fragment 생성
#
# Python 경로: shell + setup facts (ansible_processor_count 등)
# Raw fallback: /proc/cpuinfo 파싱 (raw only)

# =============================================================================
# Python Path
# =============================================================================
- block:
    - name: "linux | cpu | cores per socket + model + manufacturer + max speed"
      ansible.builtin.shell: |
        # production-audit (2026-04-29): LANG=C 강제 — non-C 로케일에서 lscpu 한국어/일본어 출력 시 regex 불일치 차단
        export LANG=C LC_ALL=C
        echo "CPU_MODEL=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | sed 's/^ *//')"
        echo "CPU_VENDOR=$(grep -m1 'vendor_id' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | sed 's/^ *//')"
        echo "CPU_CPS=$(grep -m1 'cpu cores' /proc/cpuinfo 2>/dev/null | awk '{print $4}')"
        # max_speed_mhz: lscpu 의 'CPU max MHz' (실제 boost 가능 클럭)
        if command -v lscpu >/dev/null 2>&1; then
          echo "CPU_MAX_MHZ=$(lscpu 2>/dev/null | awk -F: '/CPU max MHz/{gsub(/^ +| +$|,.*/,"",$2); print $2; exit}')"
        else
          echo "CPU_MAX_MHZ="
        fi
        # /sys/devices/system/cpu/cpu0/cpufreq 보조
        if [ -r /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq ]; then
          echo "CPU_MAX_KHZ=$(cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq)"
        else
          echo "CPU_MAX_KHZ="
        fi
        # L2/L3 cache
        if command -v lscpu >/dev/null 2>&1; then
          echo "L2_CACHE=$(lscpu 2>/dev/null | awk -F: '/L2 cache/{gsub(/^ +| +$/,"",$2); print $2; exit}')"
          echo "L3_CACHE=$(lscpu 2>/dev/null | awk -F: '/L3 cache/{gsub(/^ +| +$/,"",$2); print $2; exit}')"
        fi
      register: _l_cpu_meta_raw
      changed_when: false
      failed_when: false
      no_log: true

    - name: "linux | cpu | parse"
      ansible.builtin.set_fact:
        _l_cpu_parsed: >-
          {{ dict(_l_cpu_meta_raw.stdout_lines | default([])
                  | select('search', '=') | map('split', '=', 1) | list) }}
      no_log: true

    # cycle-016 Phase O 후속: Win 과 일관 — l2/l3_cache_kb (정수 KB) 통일
    - name: "linux | cpu | compute summary groups"
      ansible.builtin.set_fact:
        _l_cpu_summary: >-
          {%- set sockets = (ansible_processor_count | default(0) | int) -%}
          {%- set cps = ((_l_cpu_parsed.CPU_CPS | default('0')) | trim | int) -%}
          {%- set total_cores = cps * sockets if cps > 0 else 0 -%}
          {%- set model = (_l_cpu_parsed.CPU_MODEL | default('')) | trim -%}
          {%- set vendor = (_l_cpu_parsed.CPU_VENDOR | default('')) | trim -%}
          {%- set max_mhz = (_l_cpu_parsed.CPU_MAX_MHZ | default('')) | trim -%}
          {%- set max_mhz_int = max_mhz | float | int if max_mhz else none -%}
          {%- if not max_mhz_int -%}
            {%- set khz = (_l_cpu_parsed.CPU_MAX_KHZ | default('')) | trim -%}
            {%- set max_mhz_int = (khz | int / 1000) | int if khz else none -%}
          {%- endif -%}
          {%- set mfr = none -%}
          {%- if 'GenuineIntel' in vendor or 'Intel' in model -%}{%- set mfr = 'Intel' -%}
          {%- elif 'AuthenticAMD' in vendor or 'AMD' in model -%}{%- set mfr = 'AMD' -%}
          {%- elif vendor -%}{%- set mfr = vendor -%}
          {%- endif -%}
          {# l2/l3 cache 를 KB 정수로 정규화 — '48 MiB' or '1024 KiB' 같은 lscpu 표현 파싱 #}
          {%- set l2_raw = (_l_cpu_parsed.L2_CACHE | default('')) | trim -%}
          {%- set l3_raw = (_l_cpu_parsed.L3_CACHE | default('')) | trim -%}
          {%- set l2_num = (l2_raw | regex_search('^[0-9]+(?:\\.[0-9]+)?')) -%}
          {%- set l3_num = (l3_raw | regex_search('^[0-9]+(?:\\.[0-9]+)?')) -%}
          {%- set l2_unit = (l2_raw | regex_search('(MiB|MB|KiB|KB)') | default('') | upper) -%}
          {%- set l3_unit = (l3_raw | regex_search('(MiB|MB|KiB|KB)') | default('') | upper) -%}
          {%- set l2_kb = none -%}
          {%- set l3_kb = none -%}
          {%- if l2_num -%}
            {%- if 'M' in l2_unit -%}{%- set l2_kb = (l2_num | float * 1024) | int -%}
            {%- else -%}{%- set l2_kb = l2_num | float | int -%}
            {%- endif -%}
          {%- endif -%}
          {%- if l3_num -%}
            {%- if 'M' in l3_unit -%}{%- set l3_kb = (l3_num | float * 1024) | int -%}
            {%- else -%}{%- set l3_kb = l3_num | float | int -%}
            {%- endif -%}
          {%- endif -%}
          {%- if model and sockets > 0 -%}
            {{ {'groups': [{
              'model': model,
              'manufacturer': mfr,
              'max_speed_mhz': max_mhz_int,
              'l2_cache_kb': l2_kb,
              'l3_cache_kb': l3_kb,
              'sockets': sockets,
              'cores_per_socket': cps,
              'total_cores': total_cores
            }]} }}
          {%- else -%}
            {{ {'groups': []} }}
          {%- endif -%}
      no_log: true

    - name: "linux | cpu | build fragment"
      ansible.builtin.set_fact:
        _data_fragment:
          cpu:
            sockets:         "{{ ansible_processor_count   | default(none) }}"
            cores_physical:  >-
              {%- set cps = ((_l_cpu_parsed.CPU_CPS | default('0')) | trim | int) -%}
              {%- set sockets = ansible_processor_count | default(1) | int -%}
              {{ (cps * sockets) if cps > 0 else none }}
            logical_threads: "{{ ansible_processor_vcpus   | default(none) }}"
            model:           "{{ (_l_cpu_parsed.CPU_MODEL | default('')) | trim or none }}"
            manufacturer: >-
              {%- set v = (_l_cpu_parsed.CPU_VENDOR | default('')) | trim -%}
              {%- if 'GenuineIntel' in v -%}Intel
              {%- elif 'AuthenticAMD' in v -%}AMD
              {%- elif v -%}{{ v }}
              {%- else -%}{{ none }}
              {%- endif -%}
            max_speed_mhz: >-
              {%- set m = (_l_cpu_parsed.CPU_MAX_MHZ | default('')) | trim -%}
              {{ m | float | int if m else none }}
            architecture:    "{{ ansible_architecture      | default(none) }}"
            summary:         "{{ _l_cpu_summary | default({'groups': []}) }}"
        _sections_supported_fragment: ['cpu']
        _sections_collected_fragment: ['cpu']
        _sections_failed_fragment:    []
        _errors_fragment:             []
      no_log: true
  when: _l_python_mode == 'python_ok'

# =============================================================================
# Raw Fallback Path — /proc/cpuinfo + uname
# =============================================================================
- block:
    - name: "linux | cpu | raw gather"
      ansible.builtin.raw: |
        export LANG=C LC_ALL=C
        echo "CPU_MODEL=$(grep -m1 'model name' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | sed 's/^ *//')"
        echo "CPU_VENDOR=$(grep -m1 'vendor_id' /proc/cpuinfo 2>/dev/null | cut -d: -f2 | sed 's/^ *//')"
        echo "CPU_CPS=$(grep -m1 'cpu cores' /proc/cpuinfo 2>/dev/null | awk '{print $4}')"
        echo "CPU_SOCKETS=$(grep 'physical id' /proc/cpuinfo 2>/dev/null | sort -u | wc -l)"
        echo "CPU_LOGICAL=$(grep -c '^processor' /proc/cpuinfo 2>/dev/null || nproc 2>/dev/null || echo 0)"
        echo "CPU_ARCH=$(uname -m 2>/dev/null)"
        if command -v lscpu >/dev/null 2>&1; then
          echo "CPU_MAX_MHZ=$(lscpu 2>/dev/null | awk -F: '/CPU max MHz/{gsub(/^ +| +$|,.*/,"",$2); print $2; exit}')"
          echo "L2_CACHE=$(lscpu 2>/dev/null | awk -F: '/L2 cache/{gsub(/^ +| +$/,"",$2); print $2; exit}')"
          echo "L3_CACHE=$(lscpu 2>/dev/null | awk -F: '/L3 cache/{gsub(/^ +| +$/,"",$2); print $2; exit}')"
        fi
        if [ -r /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq ]; then
          echo "CPU_MAX_KHZ=$(cat /sys/devices/system/cpu/cpu0/cpufreq/cpuinfo_max_freq)"
        fi
      register: _l_cpu_raw_result
      changed_when: false
      failed_when: false
      no_log: true

    - name: "linux | cpu | parse raw"
      ansible.builtin.set_fact:
        _l_cpu_parsed: >-
          {{ dict(_l_cpu_raw_result.stdout_lines | default([])
                  | select('search', '=')
                  | map('split', '=', 1)
                  | list) }}
      no_log: true

    # production-audit (2026-04-29 후속): raw fallback 도 Python 경로와 key 일관성 유지 — manufacturer/max_speed_mhz/summary 추가
    - name: "linux | cpu | compute summary groups (raw)"
      ansible.builtin.set_fact:
        _l_cpu_summary_r: >-
          {%- set sockets = ((_l_cpu_parsed.CPU_SOCKETS | default('0')) | trim | int) -%}
          {%- set sockets = sockets if sockets > 0 else 1 -%}
          {%- set cps = ((_l_cpu_parsed.CPU_CPS | default('0')) | trim | int) -%}
          {%- set total_cores = cps * sockets if cps > 0 else 0 -%}
          {%- set model = (_l_cpu_parsed.CPU_MODEL | default('')) | trim -%}
          {%- set vendor = (_l_cpu_parsed.CPU_VENDOR | default('')) | trim -%}
          {%- set max_mhz = (_l_cpu_parsed.CPU_MAX_MHZ | default('')) | trim -%}
          {%- set max_mhz_int = max_mhz | float | int if max_mhz else none -%}
          {%- if not max_mhz_int -%}
            {%- set khz = (_l_cpu_parsed.CPU_MAX_KHZ | default('')) | trim -%}
            {%- set max_mhz_int = (khz | int / 1000) | int if khz else none -%}
          {%- endif -%}
          {%- set mfr = none -%}
          {%- if 'GenuineIntel' in vendor or 'Intel' in model -%}{%- set mfr = 'Intel' -%}
          {%- elif 'AuthenticAMD' in vendor or 'AMD' in model -%}{%- set mfr = 'AMD' -%}
          {%- elif vendor -%}{%- set mfr = vendor -%}
          {%- endif -%}
          {%- set l2_raw = (_l_cpu_parsed.L2_CACHE | default('')) | trim -%}
          {%- set l3_raw = (_l_cpu_parsed.L3_CACHE | default('')) | trim -%}
          {%- set l2_num = (l2_raw | regex_search('^[0-9]+(?:\\.[0-9]+)?')) -%}
          {%- set l3_num = (l3_raw | regex_search('^[0-9]+(?:\\.[0-9]+)?')) -%}
          {%- set l2_unit = (l2_raw | regex_search('(MiB|MB|KiB|KB)') | default('') | upper) -%}
          {%- set l3_unit = (l3_raw | regex_search('(MiB|MB|KiB|KB)') | default('') | upper) -%}
          {%- set l2_kb = none -%}
          {%- set l3_kb = none -%}
          {%- if l2_num -%}
            {%- if 'M' in l2_unit -%}{%- set l2_kb = (l2_num | float * 1024) | int -%}
            {%- else -%}{%- set l2_kb = l2_num | float | int -%}
            {%- endif -%}
          {%- endif -%}
          {%- if l3_num -%}
            {%- if 'M' in l3_unit -%}{%- set l3_kb = (l3_num | float * 1024) | int -%}
            {%- else -%}{%- set l3_kb = l3_num | float | int -%}
            {%- endif -%}
          {%- endif -%}
          {%- if model and sockets > 0 -%}
            {{ {'groups': [{
              'model': model,
              'manufacturer': mfr,
              'max_speed_mhz': max_mhz_int,
              'l2_cache_kb': l2_kb,
              'l3_cache_kb': l3_kb,
              'sockets': sockets,
              'cores_per_socket': cps,
              'total_cores': total_cores
            }]} }}
          {%- else -%}
            {{ {'groups': []} }}
          {%- endif -%}
      no_log: true

    - name: "linux | cpu | build fragment (raw)"
      ansible.builtin.set_fact:
        _data_fragment:
          cpu:
            sockets: >-
              {%- set s = (_l_cpu_parsed.CPU_SOCKETS | default('0')) | trim | int -%}
              {{ s if s > 0 else 1 }}
            cores_physical: >-
              {%- set cps = (_l_cpu_parsed.CPU_CPS | default('0')) | trim | int -%}
              {%- set sockets = (_l_cpu_parsed.CPU_SOCKETS | default('0')) | trim | int -%}
              {%- set sockets = sockets if sockets > 0 else 1 -%}
              {{ (cps * sockets) if cps > 0 else (_l_cpu_parsed.CPU_LOGICAL | default('0')) | trim | int }}
            logical_threads: "{{ (_l_cpu_parsed.CPU_LOGICAL | default('0')) | trim | int }}"
            model: >-
              {%- set m = (_l_cpu_parsed.CPU_MODEL | default('')) | trim -%}
              {{ m if m else none }}
            manufacturer: >-
              {%- set v = (_l_cpu_parsed.CPU_VENDOR | default('')) | trim -%}
              {%- if 'GenuineIntel' in v -%}Intel
              {%- elif 'AuthenticAMD' in v -%}AMD
              {%- elif v -%}{{ v }}
              {%- else -%}{{ none }}
              {%- endif -%}
            max_speed_mhz: >-
              {%- set m = (_l_cpu_parsed.CPU_MAX_MHZ | default('')) | trim -%}
              {%- set mhz = (m | float | int) if m else none -%}
              {%- if not mhz -%}
                {%- set khz = (_l_cpu_parsed.CPU_MAX_KHZ | default('')) | trim -%}
                {%- set mhz = (khz | int / 1000) | int if khz else none -%}
              {%- endif -%}
              {{ mhz }}
            architecture: >-
              {%- set a = (_l_cpu_parsed.CPU_ARCH | default('')) | trim -%}
              {{ a if a else none }}
            summary: "{{ _l_cpu_summary_r | default({'groups': []}) }}"
        _sections_supported_fragment: ['cpu']
        _sections_collected_fragment: ['cpu']
        _sections_failed_fragment:    []
        _errors_fragment:             []
      no_log: true
  when: _l_python_mode != 'python_ok'

# =============================================================================
# Shared: merge
# =============================================================================
- name: "linux | cpu | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
