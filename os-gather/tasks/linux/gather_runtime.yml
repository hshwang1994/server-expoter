---
# os-gather/tasks/linux/gather_runtime.yml
#
# P5 (cycle 2026-04-28): Linux 운영 런타임 정보 — NTP / firewall / listening ports / swap.
# data.system.runtime sub-key 에 채움. best-effort: 수집 불가 시 null/[].
#
# Fragment 철학 (rule 22): 자기 system 섹션의 runtime sub-key 만 채운다.

- block:
    - name: "linux | runtime | swap (free -m)"
      ansible.builtin.raw: |
        free -m 2>/dev/null | awk 'NR==3 {print "SWAP_TOTAL="$2"\nSWAP_USED="$3"\nSWAP_FREE="$4}'
      register: _l_rt_swap
      changed_when: false
      failed_when: false
      no_log: true

    - name: "linux | runtime | NTP service status"
      ansible.builtin.raw: |
        if command -v timedatectl >/dev/null 2>&1; then
          tz=$(timedatectl show -p Timezone --value 2>/dev/null)
          ntp_active=$(timedatectl show -p NTP --value 2>/dev/null)
          ntp_synced=$(timedatectl show -p NTPSynchronized --value 2>/dev/null)
          echo "TZ=$tz"
          echo "NTP_ACTIVE=$ntp_active"
          echo "NTP_SYNCED=$ntp_synced"
        fi
      register: _l_rt_ntp
      changed_when: false
      failed_when: false
      no_log: true

    - name: "linux | runtime | firewall status"
      ansible.builtin.raw: |
        if command -v firewall-cmd >/dev/null 2>&1; then
          state=$(firewall-cmd --state 2>/dev/null)
          echo "FW_TOOL=firewalld"
          echo "FW_STATE=$state"
        elif command -v ufw >/dev/null 2>&1; then
          state=$(ufw status 2>/dev/null | head -1 | awk '{print $2}')
          echo "FW_TOOL=ufw"
          echo "FW_STATE=$state"
        elif command -v iptables >/dev/null 2>&1; then
          rules=$(iptables -L INPUT -n 2>/dev/null | grep -c '^ACCEPT\|^DROP\|^REJECT')
          echo "FW_TOOL=iptables"
          echo "FW_STATE=$([ ${rules:-0} -gt 0 ] && echo active || echo inactive)"
        fi
      register: _l_rt_fw
      changed_when: false
      failed_when: false
      no_log: true

    - name: "linux | runtime | listening ports (ss)"
      ansible.builtin.raw: |
        if command -v ss >/dev/null 2>&1; then
          ss -tlnH 2>/dev/null | awk '{print $4}' | awk -F: '{print $NF}' | sort -un | head -50 | tr '\n' ',' | sed 's/,$//'
        elif command -v netstat >/dev/null 2>&1; then
          netstat -tln 2>/dev/null | awk 'NR>2 {print $4}' | awk -F: '{print $NF}' | sort -un | head -50 | tr '\n' ',' | sed 's/,$//'
        fi
      register: _l_rt_ports
      changed_when: false
      failed_when: false
      no_log: true

    - name: "linux | runtime | parse"
      ansible.builtin.set_fact:
        _l_rt_swap_kv: >-
          {{ dict(_l_rt_swap.stdout_lines | default([])
                  | select('search', '=')
                  | map('split', '=', 1)
                  | list) }}
        _l_rt_ntp_kv: >-
          {{ dict(_l_rt_ntp.stdout_lines | default([])
                  | select('search', '=')
                  | map('split', '=', 1)
                  | list) }}
        _l_rt_fw_kv: >-
          {{ dict(_l_rt_fw.stdout_lines | default([])
                  | select('search', '=')
                  | map('split', '=', 1)
                  | list) }}
      no_log: true

    - name: "linux | runtime | build fragment (extend system)"
      ansible.builtin.set_fact:
        _data_fragment:
          system:
            runtime:
              timezone:        "{{ _l_rt_ntp_kv.TZ          | default(none) }}"
              ntp_active:      "{{ (_l_rt_ntp_kv.NTP_ACTIVE | default('')) | lower in ['yes','active','true'] }}"
              ntp_synchronized: "{{ (_l_rt_ntp_kv.NTP_SYNCED | default('')) | lower in ['yes','active','true'] }}"
              firewall_tool:   "{{ _l_rt_fw_kv.FW_TOOL  | default(none) }}"
              firewall_state:  "{{ _l_rt_fw_kv.FW_STATE | default(none) }}"
              listening_ports: >-
                {{ (_l_rt_ports.stdout | default('') | trim).split(',') | reject('equalto','') | list
                   if (_l_rt_ports.stdout | default('') | trim) != '' else [] }}
              swap_total_mb:   "{{ (_l_rt_swap_kv.SWAP_TOTAL | default('0')) | trim | int }}"
              swap_used_mb:    "{{ (_l_rt_swap_kv.SWAP_USED  | default('0')) | trim | int }}"
              swap_free_mb:    "{{ (_l_rt_swap_kv.SWAP_FREE  | default('0')) | trim | int }}"
        _sections_supported_fragment: ['system']
        _sections_collected_fragment: ['system']
        _sections_failed_fragment:    []
        _errors_fragment:             []
      no_log: true
  rescue:
    - name: "linux | runtime | rescue (best-effort skip)"
      ansible.builtin.set_fact:
        _data_fragment:
          system:
            runtime:
              timezone:        null
              ntp_active:      null
              ntp_synchronized: null
              firewall_tool:   null
              firewall_state:  null
              listening_ports: []
              swap_total_mb:   null
              swap_used_mb:    null
              swap_free_mb:    null
        _sections_supported_fragment: ['system']
        _sections_collected_fragment: []
        _sections_failed_fragment:    ['system_runtime']
        _errors_fragment:
          - section: system_runtime
            message: "runtime 정보 수집 실패 (best-effort skip)"
            detail:  "{{ ansible_failed_result.msg | default('') }}"
      no_log: true

- name: "linux | runtime | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
