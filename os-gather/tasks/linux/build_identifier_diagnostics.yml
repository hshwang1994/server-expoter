---
# os-gather/tasks/linux/build_identifier_diagnostics.yml
# Linux gather_system.yml에서 분리 (NEXT_ACTIONS — 2026-04-28).
#
# 입력 (gather_system.yml에서 set_fact 완료된 변수):
#   _l_serial_val, _l_uuid_val   — 최종 식별자 (Python 경로)
#   _l_serial_from_setup         — setup fact 결과
#   _l_uuid_from_setup           — setup fact 결과
#   _l_dmi_serial_direct         — DMI direct-read register (없을 수 있음)
#   _l_dmi_uuid_direct           — DMI direct-read register (없을 수 있음)
#   _l_dmi_fallback_failed       — block rescue trigger (없을 수 있음)
#
# 출력:
#   _l_id_diagnostics  → list of diag dict (errors_fragment 후보)
#
# Python 경로에서만 동작. raw-only 경로는 gather_system.yml에서 빈 list 초기화.

- name: "linux | system | build identifier diagnostics"
  when: _l_python_mode == 'python_ok'
  ansible.builtin.set_fact:
    _l_id_diagnostics: >-
      {%- set diags = [] -%}
      {%- set serial_na = (_l_serial_val | default(none)) is none -%}  {# rule 95 R1 #5 ok: serial 최종 미수집 분기 #}
      {%- set uuid_na   = (_l_uuid_val   | default(none)) is none -%}  {# rule 95 R1 #5 ok: uuid 최종 미수집 분기 #}
      {%- set dmi_block_failed = (_l_dmi_fallback_failed | default(false)) | bool -%}
      {%- set serial_dmi_tried  = _l_dmi_serial_direct is defined -%}
      {%- set serial_dmi_failed = serial_dmi_tried and (_l_dmi_serial_direct.rc | default(1)) != 0 -%}
      {%- set uuid_dmi_tried    = _l_dmi_uuid_direct is defined -%}
      {%- set uuid_dmi_failed   = uuid_dmi_tried and (_l_dmi_uuid_direct.rc | default(1)) != 0 -%}
      {%- if serial_na and (dmi_block_failed or serial_dmi_failed) -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 수집 제한 (insufficient_privilege): serial_number — setup fact=NA, DMI direct-read 실패. become 권한을 확인하세요.","detail":"affected_fields: serial_number, source: none"}) -%}
      {%- elif serial_na and not serial_dmi_tried -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 수집 제한 (insufficient_privilege): serial_number — setup fact 미정의, DMI fallback 미시도.","detail":"affected_fields: serial_number, source: none"}) -%}
      {%- elif serial_na -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 값 미제공 (identifier_not_available): serial_number — setup fact 및 DMI direct-read 모두 유효한 값을 반환하지 않았습니다.","detail":"affected_fields: serial_number, source: none"}) -%}
      {%- endif -%}
      {%- if uuid_na and (dmi_block_failed or uuid_dmi_failed) -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 수집 제한 (insufficient_privilege): system_uuid — setup fact=NA, DMI direct-read 실패. become 권한을 확인하세요.","detail":"affected_fields: system_uuid, source: none"}) -%}
      {%- elif uuid_na and not uuid_dmi_tried -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 수집 제한 (insufficient_privilege): system_uuid — setup fact 미정의, DMI fallback 미시도.","detail":"affected_fields: system_uuid, source: none"}) -%}
      {%- elif uuid_na -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 값 미제공 (identifier_not_available): system_uuid — setup fact 및 DMI direct-read 모두 유효한 값을 반환하지 않았습니다.","detail":"affected_fields: system_uuid, source: none"}) -%}
      {%- endif -%}
      {{ diags }}
  no_log: true
