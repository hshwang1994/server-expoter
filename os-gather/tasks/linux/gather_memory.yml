---
# os-gather/tasks/linux/gather_memory.yml
# 물리 메모리 수집 (dmidecode 우선, /proc/meminfo fallback)
# → data.memory fragment 생성
#
# Python 경로: shell(dmidecode) + setup facts(memtotal/memfree)
# Raw fallback: /proc/meminfo + dmidecode (raw only)

# =============================================================================
# Python Path
# =============================================================================
- block:
    - name: "linux | memory | physical (dmidecode total)"
      ansible.builtin.shell: |
        if command -v dmidecode >/dev/null 2>&1; then
          dmidecode -t memory 2>/dev/null \
          | grep -E "^[[:space:]]*Size:" \
          | grep -v "No Module Installed" \
          | awk '{
              if ($3=="GB")       sum+=$2*1024;
              else if ($3=="MB")  sum+=$2;
              else if ($3=="KB")  sum+=$2/1024;
              else if ($3=="B")   sum+=$2/1048576;
            } END{print int(sum)}'
        else
          echo ""
        fi
      become: true
      register: _l_mem_phys_raw
      changed_when: false
      failed_when: false
      no_log: true

    # cycle-016 Phase L: slot 단위 dmidecode → manufacturer/part_number 도 emit
    - name: "linux | memory | physical (dmidecode slots)"
      ansible.builtin.shell: |
        if command -v dmidecode >/dev/null 2>&1; then
          dmidecode -t memory 2>/dev/null | awk '
            BEGIN{ in_dev=0; size=""; type=""; speed=""; mfr=""; pn=""; }
            /^Memory Device/ { in_dev=1; size=""; type=""; speed=""; mfr=""; pn=""; next }
            in_dev && /^[[:space:]]*Size:/ {
              if ($2 == "No" || $2 == "Volatile") next;
              if ($3=="GB") size_mb = $2 * 1024;
              else if ($3=="MB") size_mb = $2;
              else if ($3=="KB") size_mb = int($2 / 1024);
              else size_mb = 0;
              size = size_mb;
            }
            in_dev && /^[[:space:]]*Type:/ && !/Type Detail/ { type=$2; }
            in_dev && /^[[:space:]]*Speed:/ && !/Configured/ { speed=$2; }
            in_dev && /^[[:space:]]*Manufacturer:/ {
              s=$0; sub(/^[[:space:]]*Manufacturer:[[:space:]]*/,"",s);
              gsub(/[|]/,"_",s); mfr=s;
            }
            in_dev && /^[[:space:]]*Part Number:/ {
              s=$0; sub(/^[[:space:]]*Part Number:[[:space:]]*/,"",s);
              gsub(/[|]/,"_",s); pn=s;
            }
            in_dev && /^$/ {
              if (size != "" && size > 0) printf "SLOT|%s|%s|%s|%s|%s\n", size, type, speed, mfr, pn;
              in_dev=0; size=""; type=""; speed=""; mfr=""; pn="";
            }
          '
        fi
      become: true
      register: _l_mem_slots_raw
      changed_when: false
      failed_when: false
      no_log: true

    - name: "linux | memory | parse slots + grouping"
      ansible.builtin.set_fact:
        _l_mem_slots: >-
          {%- set out = [] -%}
          {%- for line in (_l_mem_slots_raw.stdout_lines | default([])) -%}
            {%- if line.startswith('SLOT|') -%}
              {%- set parts = line.split('|') -%}
              {%- if parts | length >= 4 -%}
                {%- set cap = parts[1] | int -%}
                {%- set t = parts[2] if (parts[2] | length) > 0 and parts[2] != 'Unknown' else none -%}
                {%- set sp = parts[3] | regex_replace('[^0-9]', '') -%}
                {%- set mfr = parts[4] if (parts | length >= 5 and parts[4] | length > 0 and parts[4] != 'Unknown' and parts[4] != 'Not Specified') else none -%}
                {%- set pn = parts[5] if (parts | length >= 6 and parts[5] | length > 0 and parts[5] != 'Unknown' and parts[5] != 'Not Specified') else none -%}
                {%- set _ = out.append({
                  'capacity_mb': cap,
                  'type': t,
                  'speed_mhz': (sp | int) if sp else none,
                  'manufacturer': mfr,
                  'part_number': pn | trim if pn else none
                }) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ out }}
      no_log: true

    # cycle-016 Phase L: groups 에 manufacturer + part_number 추가 (사용자 "부실" 피드백)
    - name: "linux | memory | compute summary groups"
      ansible.builtin.set_fact:
        _l_mem_summary: >-
          {%- set ns = namespace(groups=[], seen={}, total=0) -%}
          {%- for s in (_l_mem_slots | default([])) -%}
            {%- if s.capacity_mb > 0 -%}
              {%- set cap_gb = (s.capacity_mb / 1024) | round(0, 'floor') | int -%}
              {%- set t = s.type | default(none) -%}
              {%- set sp = s.speed_mhz | default(none) -%}
              {%- set mfr = s.manufacturer | default(none) -%}
              {%- set pn = s.part_number | default(none) -%}
              {%- set key = (cap_gb|string)~'|'~(t|string)~'|'~(sp|string)~'|'~(mfr|string)~'|'~(pn|string) -%}
              {%- if key in ns.seen -%}
                {%- set idx = ns.seen[key] -%}
                {%- set q = ns.groups[idx].quantity + 1 -%}
                {%- set _ = ns.groups[idx].update({'quantity': q, 'group_total_gb': q * cap_gb}) -%}
              {%- else -%}
                {%- set _ = ns.seen.update({key: ns.groups | length}) -%}
                {%- set _ = ns.groups.append({'unit_capacity_gb': cap_gb, 'type': t, 'speed_mhz': sp, 'manufacturer': mfr, 'part_number': pn, 'quantity': 1, 'group_total_gb': cap_gb}) -%}
              {%- endif -%}
              {%- set ns.total = ns.total + cap_gb -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set fallback_mb = (_l_mem_phys_raw.stdout | trim | int) if (_l_mem_phys_raw.stdout | trim | length > 0) else (ansible_memtotal_mb | default(0) | int) -%}
          {%- set fallback_total = (fallback_mb / 1024) | round(0, 'floor') | int -%}
          {{ {'groups': ns.groups, 'grand_total_gb': ns.total if ns.total > 0 else fallback_total} }}
      no_log: true

    - name: "linux | memory | build fragment"
      ansible.builtin.set_fact:
        _l_mem_phys_ok: >-
          {{ _l_mem_phys_raw.stdout | trim | length > 0
             and _l_mem_phys_raw.stdout | trim | int > 0 }}
        _data_fragment:
          memory:
            total_mb: >-
              {{ _l_mem_phys_raw.stdout | trim | int
                 if (_l_mem_phys_raw.stdout | trim | length > 0
                     and _l_mem_phys_raw.stdout | trim | int > 0)
                 else (ansible_memtotal_mb | default(0)) }}
            total_basis: >-
              {{ 'physical_installed'
                 if (_l_mem_phys_raw.stdout | trim | length > 0
                     and _l_mem_phys_raw.stdout | trim | int > 0)
                 else 'os_visible' }}
            installed_mb: >-
              {{ _l_mem_phys_raw.stdout | trim | int
                 if (_l_mem_phys_raw.stdout | trim | length > 0
                     and _l_mem_phys_raw.stdout | trim | int > 0)
                 else none }}
            visible_mb:  "{{ ansible_memtotal_mb | default(none) }}"
            free_mb:     "{{ ansible_memfree_mb  | default(none) }}"
            slots:       "{{ _l_mem_slots | default([]) }}"
            # cycle-016 (2026-04-29): dmidecode slot 단위 group summary
            summary: "{{ _l_mem_summary | default({'groups': [], 'grand_total_gb': 0}) }}"
        _sections_supported_fragment: ['memory']
        _sections_collected_fragment: ['memory']
        _sections_failed_fragment:    []
        _errors_fragment:             []
      no_log: true
  when: _l_python_mode == 'python_ok'

# =============================================================================
# Raw Fallback Path — /proc/meminfo + dmidecode (raw only)
# =============================================================================
- block:
    # cycle-016 후속 (HIGH-1 fix): raw fallback path 도 become: true (sudo dmidecode)
    - name: "linux | memory | raw gather"
      become: true
      ansible.builtin.raw: |
        echo "MEM_TOTAL_KB=$(grep MemTotal /proc/meminfo 2>/dev/null | awk '{print $2}')"
        echo "MEM_AVAIL_KB=$(grep MemAvailable /proc/meminfo 2>/dev/null | awk '{print $2}')"
        phys=0
        if command -v dmidecode >/dev/null 2>&1; then
          phys=$(dmidecode -t memory 2>/dev/null \
            | grep -E "^[[:space:]]*Size:" \
            | grep -v "No Module Installed" \
            | awk '{if($3=="GB")s+=$2*1024;else if($3=="MB")s+=$2;else if($3=="KB")s+=$2/1024} END{print int(s)}' 2>/dev/null)
        fi
        if [ "${phys:-0}" = "0" ] && command -v sudo >/dev/null 2>&1; then
          phys=$(sudo -n dmidecode -t memory 2>/dev/null \
            | grep -E "^[[:space:]]*Size:" \
            | grep -v "No Module Installed" \
            | awk '{if($3=="GB")s+=$2*1024;else if($3=="MB")s+=$2;else if($3=="KB")s+=$2/1024} END{print int(s)}' 2>/dev/null)
        fi
        echo "MEM_PHYS_MB=${phys:-0}"
        # cycle-016 (2026-04-29): slot 단위 emit (raw fallback)
        if command -v dmidecode >/dev/null 2>&1; then
          dmidecode -t memory 2>/dev/null | awk '
            BEGIN{ in_dev=0; size=""; type=""; speed=""; }
            /^Memory Device/ { in_dev=1; size=""; type=""; speed=""; next }
            in_dev && /^[[:space:]]*Size:/ {
              if ($2 == "No" || $2 == "Volatile") next;
              if ($3=="GB") size_mb = $2 * 1024;
              else if ($3=="MB") size_mb = $2;
              else if ($3=="KB") size_mb = int($2 / 1024);
              else size_mb = 0;
              size = size_mb;
            }
            in_dev && /^[[:space:]]*Type:/ && !/Type Detail/ { type=$2; }
            in_dev && /^[[:space:]]*Speed:/ && !/Configured/ { speed=$2; }
            in_dev && /^$/ { if (size != "" && size > 0) printf "SLOT|%s|%s|%s\n", size, type, speed; in_dev=0; size=""; type=""; speed=""; }
          '
        fi
      register: _l_mem_raw_result
      changed_when: false
      failed_when: false
      no_log: true

    - name: "linux | memory | parse raw"
      ansible.builtin.set_fact:
        _l_mem_rp: >-
          {{ dict(_l_mem_raw_result.stdout_lines | default([])
                  | select('search', '=')
                  | map('split', '=', 1)
                  | list) }}
        _l_mem_slots_r: >-
          {%- set out = [] -%}
          {%- for line in (_l_mem_raw_result.stdout_lines | default([])) -%}
            {%- if line.startswith('SLOT|') -%}
              {%- set parts = line.split('|') -%}
              {%- if parts | length >= 4 -%}
                {%- set cap = parts[1] | int -%}
                {%- set t = parts[2] if (parts[2] | length) > 0 and parts[2] != 'Unknown' else none -%}
                {%- set sp = parts[3] | regex_replace('[^0-9]', '') -%}
                {%- set _ = out.append({
                  'capacity_mb': cap,
                  'type': t,
                  'speed_mhz': (sp | int) if sp else none
                }) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
          {{ out }}
      no_log: true

    - name: "linux | memory | compute summary groups (raw)"
      ansible.builtin.set_fact:
        _l_mem_summary_r: >-
          {%- set ns = namespace(groups=[], seen={}, total=0) -%}
          {%- for s in (_l_mem_slots_r | default([])) -%}
            {%- if s.capacity_mb > 0 -%}
              {%- set cap_gb = (s.capacity_mb / 1024) | round(0, 'floor') | int -%}
              {%- set t = s.type | default(none) -%}
              {%- set key = (cap_gb | string) ~ '|' ~ (t | string) -%}
              {%- if key in ns.seen -%}
                {%- set idx = ns.seen[key] -%}
                {%- set q = ns.groups[idx].quantity + 1 -%}
                {%- set _ = ns.groups[idx].update({'quantity': q, 'group_total_gb': q * cap_gb}) -%}
              {%- else -%}
                {%- set _ = ns.seen.update({key: ns.groups | length}) -%}
                {%- set _ = ns.groups.append({'unit_capacity_gb': cap_gb, 'type': t, 'quantity': 1, 'group_total_gb': cap_gb}) -%}
              {%- endif -%}
              {%- set ns.total = ns.total + cap_gb -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set phys = (_l_mem_rp.MEM_PHYS_MB | default('0')) | trim | int -%}
          {%- set vis_kb = (_l_mem_rp.MEM_TOTAL_KB | default('0')) | trim | int -%}
          {%- set fallback_v = phys if phys > 0 else (vis_kb / 1024) | round(0, 'floor') | int -%}
          {%- set fallback_total = (fallback_v / 1024) | round(0, 'floor') | int -%}
          {{ {'groups': ns.groups, 'grand_total_gb': ns.total if ns.total > 0 else fallback_total} }}
      no_log: true

    - name: "linux | memory | build fragment (raw)"
      ansible.builtin.set_fact:
        _data_fragment:
          memory:
            total_mb: >-
              {%- set phys = (_l_mem_rp.MEM_PHYS_MB | default('0')) | trim | int -%}
              {%- set vis_kb = (_l_mem_rp.MEM_TOTAL_KB | default('0')) | trim | int -%}
              {{ phys if phys > 0 else (vis_kb / 1024) | round(0,'floor') | int }}
            total_basis: >-
              {%- set phys = (_l_mem_rp.MEM_PHYS_MB | default('0')) | trim | int -%}
              {{ 'physical_installed' if phys > 0 else 'os_visible' }}
            installed_mb: >-
              {%- set phys = (_l_mem_rp.MEM_PHYS_MB | default('0')) | trim | int -%}
              {{ phys if phys > 0 else none }}
            visible_mb: >-
              {{ ((_l_mem_rp.MEM_TOTAL_KB | default('0')) | trim | int / 1024) | round(0,'floor') | int }}
            free_mb: >-
              {{ ((_l_mem_rp.MEM_AVAIL_KB | default('0')) | trim | int / 1024) | round(0,'floor') | int }}
            slots: "{{ _l_mem_slots_r | default([]) }}"
            # cycle-016 (2026-04-29): dmidecode slot 단위 group summary (raw)
            summary: "{{ _l_mem_summary_r | default({'groups': [], 'grand_total_gb': 0}) }}"
        _sections_supported_fragment: ['memory']
        _sections_collected_fragment: ['memory']
        _sections_failed_fragment:    []
        _errors_fragment:             []
      no_log: true
  when: _l_python_mode != 'python_ok'

# =============================================================================
# Shared: merge
# =============================================================================
- name: "linux | memory | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
