---
# os-gather/tasks/try_one_credential.yml
#
# P1 (cycle 2026-04-28): 후보 자격증명 1개로 인증 시도. _os_auth_ok=true 면 skip.
#
# 동작:
#   1. set_fact 으로 ansible_user/password 갱신 (host_vars 영구 갱신)
#   2. meta: reset_connection 으로 cached SSH/WinRM 세션 해제
#   3. probe (Linux=raw echo / Windows=win_ping) 로 인증 검증
#   4. 성공 시 _os_auth_ok=true 설정 → 이후 후보 skip
#      실패 시 다음 후보가 새 set_fact 로 host_vars 덮어씀
#
# 입력:
#   _try_cred : { username, password, label, role }
#   _os_type  : 'linux' | 'windows'

- when: not (_os_auth_ok | default(false) | bool)
  block:

    # ── 1. host_vars 영구 갱신 ───────────────────────────────────────────
    - name: "os | try_one_credential | apply candidate to hostvars"
      ansible.builtin.set_fact:
        ansible_user:        "{{ _try_cred.username | default('') }}"
        ansible_password:    "{{ _try_cred.password | default('') }}"
        ansible_become_pass: "{{ _try_cred.password | default('') }}"
      no_log: true

    # ── 2. cached connection 해제 — 새 자격으로 재인증 강제 ─────────────
    - name: "os | try_one_credential | reset connection"
      ansible.builtin.meta: reset_connection

    # ── 3. probe ─────────────────────────────────────────────────────────
    - name: "os | try_one_credential | linux ssh probe"
      when: _os_type == 'linux'
      ansible.builtin.raw: "echo __auth_ok__"
      register: _os_probe_linux
      failed_when: false
      changed_when: false
      no_log: true

    - name: "os | try_one_credential | windows winrm probe"
      when: _os_type == 'windows'
      ansible.windows.win_ping:
      register: _os_probe_windows
      failed_when: false
      no_log: true

    # ── 4. 평가 + 승격 ───────────────────────────────────────────────────
    - name: "os | try_one_credential | evaluate"
      ansible.builtin.set_fact:
        _os_probe_ok: >-
          {{ (_os_type == 'linux'
              and (_os_probe_linux is defined)
              and ((_os_probe_linux.rc | default(1)) == 0)
              and ('__auth_ok__' in (_os_probe_linux.stdout | default('')))
             )
             or
             (_os_type == 'windows'
              and (_os_probe_windows is defined)
              and (_os_probe_windows is not failed)
             ) }}
      no_log: true

    - name: "os | try_one_credential | promote on success"
      when: _os_probe_ok | bool
      ansible.builtin.set_fact:
        _os_auth_ok: true
        _os_used_account:
          username: "{{ _try_cred.username }}"
          label:    "{{ _try_cred.label    | default('unlabeled') }}"
          role:     "{{ _try_cred.role     | default('primary') }}"
      no_log: true

    - name: "os | try_one_credential | log failure (advisory)"
      when: not (_os_probe_ok | bool)
      ansible.builtin.debug:
        msg: >-
          {{ _os_type }} auth attempt failed —
          label={{ _try_cred.label | default('unlabeled') }},
          role={{ _try_cred.role   | default('primary') }}
