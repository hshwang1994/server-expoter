---
# os-gather/tasks/windows/gather_hardware.yml → data.hardware fragment
# cycle-016 Phase O: Windows hardware section 활성화 (이전 not_supported)

- name: "windows | hardware | Win32_ComputerSystem + Win32_BIOS"
  ansible.windows.win_shell: |
    # windows-audit (2026-04-29): VMware/Hyper-V VM은 Win32_ComputerSystem.UUID=$null.
    # → Win32_ComputerSystemProduct.UUID fallback (ansible_product_uuid 와 동일 source).
    # AssetTag "No Asset Tag"/"Default string" 같은 OEM placeholder 는 null 정규화.
    # ChassisTypes 정수 코드 → enum 매핑. ReleaseDate (ManagementDateTime) → ISO 일자.
    $cs   = Get-CimInstance Win32_ComputerSystem
    $csp  = Get-CimInstance Win32_ComputerSystemProduct -ErrorAction SilentlyContinue
    $bios = Get-CimInstance Win32_BIOS
    $sysenc = Get-CimInstance Win32_SystemEnclosure -ErrorAction SilentlyContinue

    # UUID fallback chain
    $uuid = if ($cs.UUID) { $cs.UUID }
            elseif ($csp -and $csp.UUID) { $csp.UUID }
            else { $null }
    if ($uuid -in @('', '00000000-0000-0000-0000-000000000000', 'FFFFFFFF-FFFF-FFFF-FFFF-FFFFFFFFFFFF')) { $uuid = $null }

    # Asset tag sentinel filter
    $assetRaw = if ($sysenc) { [string]$sysenc.SMBIOSAssetTag } else { '' }
    $asset = if (-not $assetRaw -or $assetRaw -in @('No Asset Tag','Default string','Asset Tag','Not Specified','To Be Filled By O.E.M.','None','NA','N/A')) { $null } else { $assetRaw }

    # ChassisTypes enum 매핑 (SMBIOS 7.4.1)
    $chassisMap = @{
      1='Other'; 2='Unknown'; 3='Desktop'; 4='Low Profile Desktop'; 5='Pizza Box';
      6='Mini Tower'; 7='Tower'; 8='Portable'; 9='Laptop'; 10='Notebook';
      11='Hand Held'; 12='Docking Station'; 13='All in One'; 14='Sub Notebook';
      15='Space-saving'; 16='Lunch Box'; 17='Main Server Chassis'; 18='Expansion Chassis';
      19='SubChassis'; 20='Bus Expansion Chassis'; 21='Peripheral Chassis';
      22='RAID Chassis'; 23='Rack Mount Chassis'; 24='Sealed-case PC';
      25='Multi-system Chassis'; 26='Compact PCI'; 27='Advanced TCA'; 28='Blade';
      29='Blade Enclosure'; 30='Tablet'; 31='Convertible'; 32='Detachable';
      33='IoT Gateway'; 34='Embedded PC'; 35='Mini PC'; 36='Stick PC'
    }
    $chassis = $null
    if ($sysenc -and $sysenc.ChassisTypes) {
      $first = @($sysenc.ChassisTypes)[0]
      if ($first -and $chassisMap.ContainsKey([int]$first)) { $chassis = $chassisMap[[int]$first] }
    }

    # BIOS release date — Win32_BIOS.ReleaseDate (CIM datetime) → ISO 8601 (YYYY-MM-DD)
    $biosDate = $null
    if ($bios.ReleaseDate) {
      try { $biosDate = ([datetime]$bios.ReleaseDate).ToString('yyyy-MM-dd') }
      catch { $biosDate = [string]$bios.ReleaseDate }
    }

    # BIOS serial sentinel
    $biosSerRaw = [string]$bios.SerialNumber
    $biosSer = if (-not $biosSerRaw -or $biosSerRaw -in @('NA','N/A','None','Not Specified','To Be Filled By O.E.M.','System Serial Number','0','00000000')) { $null } else { $biosSerRaw }

    [PSCustomObject]@{
      vendor        = $cs.Manufacturer
      model         = $cs.Model
      system_family = $cs.SystemFamily
      uuid          = $uuid
      total_memory  = $cs.TotalPhysicalMemory
      bios_vendor   = $bios.Manufacturer
      bios_version  = $bios.SMBIOSBIOSVersion
      bios_release  = $biosDate
      bios_serial   = $biosSer
      asset_tag     = $asset
      chassis_type  = $chassis
      power_state   = [string]$cs.PowerState
    } | ConvertTo-Json -Compress
  register: _w_hw_raw
  changed_when: false
  failed_when: false
  no_log: true

- name: "windows | hardware | parse + build fragment"
  ansible.builtin.set_fact:
    _w_hw_data: >-
      {%- if _w_hw_raw.stdout is defined and _w_hw_raw.stdout | trim | length > 0 -%}
      {{ _w_hw_raw.stdout | from_json }}
      {%- else -%}
      {}
      {%- endif -%}
  no_log: true

- name: "windows | hardware | build fragment"
  ansible.builtin.set_fact:
    _data_fragment:
      hardware:
        vendor:       "{{ _w_hw_data.vendor       | default(none) }}"
        model:        "{{ _w_hw_data.model        | default(none) }}"
        # serial/uuid fallback chain: BIOS/CIM → gather_system 의 ansible facts 정규값
        serial:       "{{ _w_hw_data.bios_serial | default(none) or _w_serial_val | default(none) }}"
        uuid:         "{{ _w_hw_data.uuid        | default(none) or _w_uuid_val   | default(none) }}"
        sku:          null
        asset_tag:    "{{ _w_hw_data.asset_tag    | default(none) }}"
        system_family: "{{ _w_hw_data.system_family | default(none) }}"
        chassis_type: "{{ _w_hw_data.chassis_type | default(none) }}"
        bios_version: "{{ _w_hw_data.bios_version | default(none) }}"
        bios_vendor:  "{{ _w_hw_data.bios_vendor  | default(none) }}"
        bios_date:    "{{ _w_hw_data.bios_release | default(none) }}"
        total_memory_bytes: "{{ _w_hw_data.total_memory | default(none) }}"
        oem:          {}
    _sections_supported_fragment: ['hardware']
    _sections_collected_fragment: ['hardware']
    _sections_failed_fragment:    []
    _errors_fragment:             []
  no_log: true

- name: "windows | hardware | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
