---
# os-gather/tasks/windows/gather_memory.yml → data.memory fragment

- name: "windows | memory | Win32_PhysicalMemory total"
  ansible.windows.win_shell: |
    $mem = Get-CimInstance Win32_PhysicalMemory
    [math]::Round(($mem | Measure-Object -Property Capacity -Sum).Sum / 1MB, 0)
  register: _w_mem_raw
  changed_when: false
  failed_when: false
  no_log: true

# cycle-016 (2026-04-29): slot 단위 emit
- name: "windows | memory | Win32_PhysicalMemory slots"
  ansible.windows.win_shell: |
    Get-CimInstance Win32_PhysicalMemory | ForEach-Object {
      [PSCustomObject]@{
        capacity_mb = [int]([math]::Round($_.Capacity / 1MB, 0))
        type        = switch ($_.SMBIOSMemoryType) {
                        24 {"DDR3"} 26 {"DDR4"} 34 {"DDR5"} 0 {$null}
                        default { [string]$_.SMBIOSMemoryType }
                      }
        speed_mhz   = $_.Speed
        slot        = $_.DeviceLocator
      } | ConvertTo-Json -Compress
    }
  register: _w_mem_slots_raw
  changed_when: false
  failed_when: false
  no_log: true

- name: "windows | memory | parse slots + grouping"
  ansible.builtin.set_fact:
    _w_mem_slots: >-
      {%- set out = [] -%}
      {%- for line in (_w_mem_slots_raw.stdout_lines | default([])) -%}
        {%- if line | trim -%}
          {%- set s = line | from_json -%}
          {%- set _ = out.append({
            'capacity_mb': s.capacity_mb | default(0) | int,
            'type': s.type | default(none),
            'speed_mhz': s.speed_mhz | default(none),
            'slot': s.slot | default(none)
          }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
    _w_mem_summary: >-
      {%- set groups = [] -%}
      {%- set seen = {} -%}
      {%- set total = 0 -%}
      {%- for line in (_w_mem_slots_raw.stdout_lines | default([])) -%}
        {%- if line | trim -%}
          {%- set s = line | from_json -%}
          {%- set cap_mb = s.capacity_mb | default(0) | int -%}
          {%- if cap_mb > 0 -%}
            {%- set cap_gb = (cap_mb / 1024) | round(0, 'floor') | int -%}
            {%- set t = s.type | default(none) -%}
            {%- set key = (cap_gb | string) ~ '|' ~ (t | string) -%}
            {%- if key in seen -%}
              {%- set idx = seen[key] -%}
              {%- set q = groups[idx].quantity + 1 -%}
              {%- set _ = groups[idx].update({'quantity': q, 'group_total_gb': q * cap_gb}) -%}
            {%- else -%}
              {%- set _ = seen.update({key: groups | length}) -%}
              {%- set _ = groups.append({'unit_capacity_gb': cap_gb, 'type': t, 'quantity': 1, 'group_total_gb': cap_gb}) -%}
            {%- endif -%}
            {%- set total = total + cap_gb -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set fallback_mb = (_w_mem_raw.stdout | trim | int) if (_w_mem_raw.stdout | trim | length > 0) else (ansible_memtotal_mb | default(0) | int) -%}
      {%- set fallback_total = (fallback_mb / 1024) | round(0, 'floor') | int -%}
      {{ {'groups': groups, 'grand_total_gb': total if total > 0 else fallback_total} }}
  no_log: true

- name: "windows | memory | build fragment"
  ansible.builtin.set_fact:
    _w_mem_ok: >-
      {{ _w_mem_raw.stdout | trim | length > 0
         and _w_mem_raw.stdout | trim | int > 0 }}
    _data_fragment:
      memory:
        total_mb: >-
          {{ _w_mem_raw.stdout | trim | int
             if (_w_mem_raw.stdout | trim | length > 0
                 and _w_mem_raw.stdout | trim | int > 0)
             else (ansible_memtotal_mb | default(0)) }}
        total_basis: >-
          {{ 'physical_installed'
             if (_w_mem_raw.stdout | trim | length > 0
                 and _w_mem_raw.stdout | trim | int > 0)
             else 'os_visible' }}
        installed_mb: >-
          {{ _w_mem_raw.stdout | trim | int
             if (_w_mem_raw.stdout | trim | length > 0
                 and _w_mem_raw.stdout | trim | int > 0)
             else none }}
        visible_mb: "{{ ansible_memtotal_mb | default(none) }}"
        free_mb:    "{{ ansible_memfree_mb  | default(none) }}"
        slots:      "{{ _w_mem_slots | default([]) }}"
        # cycle-016 (2026-04-29): Win32_PhysicalMemory 기반 group summary
        summary:    "{{ _w_mem_summary | default({'groups': [], 'grand_total_gb': 0}) }}"
    _sections_supported_fragment: ['memory']
    _sections_collected_fragment: ['memory']
    _sections_failed_fragment:    []
    _errors_fragment:             []
  no_log: true

- name: "windows | memory | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
