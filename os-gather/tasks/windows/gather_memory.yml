---
# os-gather/tasks/windows/gather_memory.yml → data.memory fragment

- name: "windows | memory | Win32_PhysicalMemory total"
  ansible.windows.win_shell: |
    $mem = Get-CimInstance Win32_PhysicalMemory
    [math]::Round(($mem | Measure-Object -Property Capacity -Sum).Sum / 1MB, 0)
  register: _w_mem_raw
  changed_when: false
  failed_when: false
  no_log: true

# cycle-016 Phase L/N: slot 단위 emit + manufacturer/part_number/serial 추가
# windows-audit (2026-04-29): SMBIOSMemoryType 매핑 확장 (DDR/DDR2/DDR3/DDR4/DDR5/LPDDR*),
#   Speed→ConfiguredClockSpeed fallback (VMware Speed=null, ConfiguredClockSpeed=4800),
#   SerialNumber 센티널(00000000/00000001/all-zeros) → null 정규화.
- name: "windows | memory | Win32_PhysicalMemory slots"
  ansible.windows.win_shell: |
    Get-CimInstance Win32_PhysicalMemory | ForEach-Object {
      $smt = [int]$_.SMBIOSMemoryType
      $type = switch ($smt) {
        18 {"DDR"} 19 {"DDR2"} 20 {"DDR2 FB-DIMM"} 22 {"DDR3"} 24 {"DDR3"}
        26 {"DDR4"} 27 {"LPDDR"} 28 {"LPDDR2"} 29 {"LPDDR3"} 30 {"LPDDR4"}
        34 {"DDR5"} 35 {"LPDDR5"}
        default { $null }
      }
      $speedRaw = if ($_.Speed -and [int]$_.Speed -gt 0) { [int]$_.Speed }
                  elseif ($_.ConfiguredClockSpeed -and [int]$_.ConfiguredClockSpeed -gt 0) { [int]$_.ConfiguredClockSpeed }
                  else { $null }
      $serRaw = [string]$_.SerialNumber
      $mfrRaw = [string]$_.Manufacturer
      $is_virtual_mem = $mfrRaw -match '(?i)vmware|hyper-?v|microsoft|qemu|kvm|virtual|xen'
      $serNorm = if (-not $serRaw -or $serRaw -match '^0+$' -or
                     ($is_virtual_mem -and $serRaw -match '^0{6,}\d?$') -or
                     $serRaw -in @('NA','N/A','None','Not Specified','To Be Filled By O.E.M.','SerNum0','SerNum1','SerNum2','SerNum3')) { $null } else { $serRaw }
      [PSCustomObject]@{
        capacity_mb  = [int]([math]::Round($_.Capacity / 1MB, 0))
        type         = $type
        speed_mhz    = $speedRaw
        slot         = $_.DeviceLocator
        manufacturer = $_.Manufacturer
        part_number  = $_.PartNumber
        serial       = $serNorm
      } | ConvertTo-Json -Compress
    }
  register: _w_mem_slots_raw
  changed_when: false
  failed_when: false
  no_log: true

- name: "windows | memory | parse slots + grouping"
  ansible.builtin.set_fact:
    _w_mem_slots: >-
      {%- set out = [] -%}
      {%- for line in (_w_mem_slots_raw.stdout_lines | default([])) -%}
        {%- if line | trim -%}
          {%- set s = line | from_json -%}
          {%- set _ = out.append({
            'capacity_mb': s.capacity_mb | default(0) | int,
            'type': s.type | default(none),
            'speed_mhz': s.speed_mhz | default(none),
            'slot': s.slot | default(none),
            'manufacturer': (s.manufacturer | default(none) | trim) if s.manufacturer else none,
            'part_number': (s.part_number | default(none) | trim) if s.part_number else none,
            'serial': (s.serial | default(none) | trim) if s.serial else none
          }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
    _w_mem_summary: >-
      {%- set ns = namespace(groups=[], seen={}, total=0) -%}
      {%- for line in (_w_mem_slots_raw.stdout_lines | default([])) -%}
        {%- if line | trim -%}
          {%- set s = line | from_json -%}
          {%- set cap_mb = s.capacity_mb | default(0) | int -%}
          {%- if cap_mb > 0 -%}
            {%- set cap_gb = (cap_mb / 1024) | round(0, 'floor') | int -%}
            {%- set t = s.type | default(none) -%}
            {%- set sp = s.speed_mhz | default(none) -%}
            {%- set mfr = (s.manufacturer | default('') | trim) | default(none) -%}
            {%- set pn = (s.part_number | default('') | trim) | default(none) -%}
            {%- set key = (cap_gb|string)~'|'~(t|string)~'|'~(sp|string)~'|'~(mfr|string)~'|'~(pn|string) -%}
            {%- if key in ns.seen -%}
              {%- set idx = ns.seen[key] -%}
              {%- set q = ns.groups[idx].quantity + 1 -%}
              {%- set _ = ns.groups[idx].update({'quantity': q, 'group_total_gb': q * cap_gb}) -%}
            {%- else -%}
              {%- set _ = ns.seen.update({key: ns.groups | length}) -%}
              {%- set _ = ns.groups.append({'unit_capacity_gb': cap_gb, 'type': t, 'speed_mhz': sp, 'manufacturer': mfr if mfr else none, 'part_number': pn if pn else none, 'quantity': 1, 'group_total_gb': cap_gb}) -%}
            {%- endif -%}
            {%- set ns.total = ns.total + cap_gb -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set fallback_mb = (_w_mem_raw.stdout | trim | int) if (_w_mem_raw.stdout | trim | length > 0) else (ansible_memtotal_mb | default(0) | int) -%}
      {%- set fallback_total = (fallback_mb / 1024) | round(0, 'floor') | int -%}
      {{ {'groups': ns.groups, 'grand_total_gb': ns.total if ns.total > 0 else fallback_total} }}
  no_log: true

- name: "windows | memory | build fragment"
  ansible.builtin.set_fact:
    _w_mem_ok: >-
      {{ _w_mem_raw.stdout | trim | length > 0
         and _w_mem_raw.stdout | trim | int > 0 }}
    _data_fragment:
      memory:
        total_mb: >-
          {{ _w_mem_raw.stdout | trim | int
             if (_w_mem_raw.stdout | trim | length > 0
                 and _w_mem_raw.stdout | trim | int > 0)
             else (ansible_memtotal_mb | default(0)) }}
        total_basis: >-
          {{ 'physical_installed'
             if (_w_mem_raw.stdout | trim | length > 0
                 and _w_mem_raw.stdout | trim | int > 0)
             else 'os_visible' }}
        installed_mb: >-
          {{ _w_mem_raw.stdout | trim | int
             if (_w_mem_raw.stdout | trim | length > 0
                 and _w_mem_raw.stdout | trim | int > 0)
             else none }}
        visible_mb: "{{ ansible_memtotal_mb | default(none) }}"
        free_mb:    "{{ ansible_memfree_mb  | default(none) }}"
        slots:      "{{ _w_mem_slots | default([]) }}"
        # cycle-016 (2026-04-29): Win32_PhysicalMemory 기반 group summary
        summary:    "{{ _w_mem_summary | default({'groups': [], 'grand_total_gb': 0}) }}"
    _sections_supported_fragment: ['memory']
    _sections_collected_fragment: ['memory']
    _sections_failed_fragment:    []
    _errors_fragment:             []
  no_log: true

- name: "windows | memory | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
