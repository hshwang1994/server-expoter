---
# os-gather/tasks/windows/gather_storage.yml → data.storage fragment

- name: "windows | storage | volumes"
  ansible.windows.win_shell: |
    Get-Volume |
    Where-Object { $_.DriveLetter -and $_.FileSystemType -ne 'Unknown' } |
    ForEach-Object {
      [PSCustomObject]@{
        drive = [string]$_.DriveLetter
        fs    = $_.FileSystemType
        total = $_.Size
        free  = $_.SizeRemaining
      } | ConvertTo-Json -Compress
    }
  register: _w_vol_raw
  changed_when: false
  failed_when: false
  no_log: true

- name: "windows | storage | physical disks"
  ansible.windows.win_shell: |
    # production-audit (2026-04-29): Get-PhysicalDisk(modern) + Win32_DiskDrive(fallback)로
    # MediaType을 HDD/SSD enum으로 정규화. 기존 raw WMI string ("Fixed hard disk media") 누출 차단.
    # windows-audit (2026-04-29): PS5.1=int / PS7+=enum string 양쪽 BusType 처리.
    #   Win32_DiskDrive raw "Fixed hard disk media"는 SSD/HDD 정보 부재 → null (잘못된 추정 차단).
    #   HealthStatus 매핑 (Healthy/Warning/Unhealthy) → health 필드.
    $physical_map = @{}
    if (Get-Command Get-PhysicalDisk -ErrorAction SilentlyContinue) {
      try {
        Get-PhysicalDisk | ForEach-Object {
          # MSFT_PhysicalDisk.MediaType: PS5.1=int (3=HDD, 4=SSD, 5=SCM, 0=Unspecified)
          # PS7+=string ("HDD", "SSD", "SCM", "Unspecified")
          $mtRaw = $_.MediaType
          $mt = if ($mtRaw -is [int]) {
                  switch ([int]$mtRaw) { 3{'HDD'} 4{'SSD'} 5{'SCM'} default{$null} }
                } else {
                  switch ([string]$mtRaw) { 'HDD'{'HDD'} 'SSD'{'SSD'} 'SCM'{'SCM'} default{$null} }
                }
          # BusType: PS5.1=int (6=SATA, 7=USB, 8=RAID, 10=SAS, 17=NVMe, 11=SCSI)
          # PS7+=enum string ("SATA", "SAS", "NVMe", ...)
          $btRaw = $_.BusType
          $bus = if ($btRaw -is [int]) {
                   switch ([int]$btRaw) {
                     1{'SCSI'} 6{'SATA'} 7{'USB'} 8{'RAID'} 10{'SAS'}
                     11{'SCSI'} 17{'NVMe'} 18{'SD'} 19{'MMC'} default{$null}
                   }
                 } else {
                   $bts = [string]$btRaw
                   switch -Wildcard ($bts) {
                     'SATA'  { 'SATA' }
                     'SAS'   { 'SAS' }
                     'NVMe'  { 'NVMe' }
                     'USB'   { 'USB' }
                     'RAID'  { 'RAID' }
                     'SCSI'  { 'SCSI' }
                     'iSCSI' { 'iSCSI' }
                     'FC'    { 'FibreChannel' }
                     default { $null }
                   }
                 }
          # HealthStatus: "Healthy", "Warning", "Unhealthy", "Unknown"
          $hs = [string]$_.HealthStatus
          $health = switch ($hs) {
            'Healthy'   { 'healthy' }
            'Warning'   { 'warning' }
            'Unhealthy' { 'unhealthy' }
            default     { $null }
          }
          $physical_map[[string]$_.DeviceId] = @{ media_type = $mt; bus = $bus; health = $health }
        }
      } catch { }
    }
    Get-CimInstance Win32_DiskDrive | ForEach-Object {
      $idx = [string]$_.Index
      $mt = $null
      $bus = $null
      $health = $null
      if ($physical_map.ContainsKey($idx)) {
        $mt = $physical_map[$idx].media_type
        $bus = $physical_map[$idx].bus
        $health = $physical_map[$idx].health
      }
      # Win32_DiskDrive.MediaType fallback — 진짜 SSD 정보만 매핑.
      # "Fixed hard disk media"는 SSD/HDD 구분 안 함 → null (잘못된 HDD 추정 금지).
      if (-not $mt) {
        $rawMt = [string]$_.MediaType
        if ($rawMt -match '(?i)solid state|ssd') { $mt = 'SSD' }
        else { $mt = $null }
      }
      # InterfaceType fallback (Win32_DiskDrive)
      if (-not $bus) {
        $iface = [string]$_.InterfaceType
        $bus = switch -Wildcard ($iface) {
          'SCSI' { 'SCSI' }
          'IDE'  { 'IDE' }
          'USB'  { 'USB' }
          'HDC'  { 'HDC' }
          '1394' { '1394' }
          default { $null }
        }
      }
      [PSCustomObject]@{
        device = $_.DeviceID
        model  = $_.Model
        total  = $_.Size
        media  = $mt
        protocol = $bus
        health   = $health
      } | ConvertTo-Json -Compress
    }
  register: _w_disk_raw
  changed_when: false
  failed_when: false
  no_log: true

# P4 (cycle 2026-04-29): FC HBA / iSCSI / SAS Initiator
- name: "windows | storage | initiator ports (HBA)"
  ansible.windows.win_shell: |
    if (Get-Command Get-InitiatorPort -ErrorAction SilentlyContinue) {
      Get-InitiatorPort | ForEach-Object {
        [PSCustomObject]@{
          node_addr   = $_.NodeAddress
          port_addr   = $_.PortAddress
          conn_type   = [string]$_.ConnectionType
          oper_status = [string]$_.OperationalStatus
        } | ConvertTo-Json -Compress
      }
    }
  register: _w_hba_raw
  changed_when: false
  failed_when: false
  no_log: true

- name: "windows | storage | normalize HBAs"
  ansible.builtin.set_fact:
    _w_hbas: >-
      {%- set out = [] -%}
      {%- for line in (_w_hba_raw.stdout_lines | default([])) -%}
        {%- if line | trim -%}
          {%- set h = line | from_json -%}
          {%- set ct = (h.conn_type | default('')) | lower -%}
          {%- set is_fc = 'fibrechannel' in ct or 'fc' == ct -%}
          {%- set _ = out.append({
            'node_addr':   h.node_addr   | default(none),
            'port_addr':   h.port_addr   | default(none),
            'wwpn':        h.port_addr   | default(none) if is_fc else none,
            'connection':  h.conn_type   | default(none),
            'link_status': h.oper_status | default(none),
            'port_type':   'FibreChannel' if is_fc else h.conn_type | default(none),
          }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
  no_log: true

- name: "windows | storage | normalize filesystems"
  ansible.builtin.set_fact:
    _w_norm_filesystems: >-
      {%- set out = [] -%}
      {%- for line in (_w_vol_raw.stdout_lines | default([])) -%}
        {%- if line | trim -%}
          {%- set v = line | from_json -%}
          {%- set total_mb = (v.total | int / 1048576) | round(1) -%}
          {%- set free_mb  = (v.free  | int / 1048576) | round(1) -%}
          {%- if total_mb > 0 -%}
            {%- set _ = out.append({
              'device':        v.drive ~ ':',
              'mount_point':   v.drive ~ ':\\',
              'filesystem':    v.fs,
              'total_mb':      total_mb,
              'used_mb':       total_mb - free_mb,
              'available_mb':  free_mb,
              'usage_percent': ((total_mb - free_mb) / total_mb * 100) | round(1) if total_mb > 0 else 0,
              'status':        'mounted'
            }) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
    _w_physical_disks: >-
      {%- set out = [] -%}
      {%- for line in (_w_disk_raw.stdout_lines | default([])) -%}
        {%- if line | trim -%}
          {%- set d = line | from_json -%}
          {%- set total_mb = (d.total | int / 1048576) | round(0,'floor') | int -%}
          {%- if total_mb > 0 -%}
            {%- set _ = out.append({
              'id':         d.device,
              'device':     d.device,
              'model':      d.model | default(none),
              'total_mb':   total_mb,
              'media_type': d.media | default(none),
              'protocol':   d.protocol | default(none),
              'health':     d.health | default(none)
            }) -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
  no_log: true

# cycle-016 (2026-04-29): storage.summary grouping
- name: "windows | storage | compute summary groups"
  ansible.builtin.set_fact:
    _w_stor_summary: >-
      {%- set ns = namespace(groups=[], seen={}, total=0) -%}
      {%- for d in (_w_physical_disks | default([])) -%}
        {%- set cap_gb = ((d.total_mb | default(0)) | int / 1024) | round(0, 'floor') | int -%}
        {%- if cap_gb > 0 -%}
          {%- set mt = d.media_type | default(none) -%}
          {%- set pr = d.protocol | default(none) -%}
          {%- set md = d.model | default(none) -%}
          {%- set key = (cap_gb|string)~'|'~(mt|string)~'|'~(pr|string)~'|'~(md|string) -%}
          {%- if key in ns.seen -%}
            {%- set idx = ns.seen[key] -%}
            {%- set q = ns.groups[idx].quantity + 1 -%}
            {%- set _ = ns.groups[idx].update({'quantity': q, 'group_total_gb': q * cap_gb}) -%}
          {%- else -%}
            {%- set _ = ns.seen.update({key: ns.groups | length}) -%}
            {%- set _ = ns.groups.append({'unit_capacity_gb': cap_gb, 'model': md, 'media_type': mt, 'protocol': pr, 'quantity': 1, 'group_total_gb': cap_gb}) -%}
          {%- endif -%}
          {%- set ns.total = ns.total + cap_gb -%}
        {%- endif -%}
      {%- endfor -%}
      {{ {'groups': ns.groups, 'grand_total_gb': ns.total} }}
  no_log: true

- name: "windows | storage | build fragment"
  ansible.builtin.set_fact:
    _data_fragment:
      storage:
        filesystems:     "{{ _w_norm_filesystems }}"
        physical_disks:  "{{ _w_physical_disks }}"
        datastores:      []
        controllers:     []
        logical_volumes: []
        # cycle-016 (2026-04-29): Win32_DiskDrive 기반 group summary
        summary:         "{{ _w_stor_summary | default({'groups': [], 'grand_total_gb': 0}) }}"
        # P4 (cycle 2026-04-29): Get-InitiatorPort 결과
        hbas:            "{{ _w_hbas | default([]) }}"
        infiniband:      []  # Windows 표준 API 로 IB 일관 수집 어려움
    _sections_supported_fragment: ['storage']
    _sections_collected_fragment: ['storage']
    _sections_failed_fragment:    []
    _errors_fragment:             []
  no_log: true

- name: "windows | storage | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
