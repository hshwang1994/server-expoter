---
# os-gather/tasks/windows/gather_runtime.yml
#
# P5 sub-phase b (cycle 2026-04-29): Windows 운영 런타임 정보.
# w32tm / Get-NetFirewallProfile / Get-NetTCPConnection / Win32_PageFile.
# best-effort: 일부 cmdlet 미설치 / 권한 부족 시 빈 값.
#
# 출력 sub-key: data.system.runtime

- block:
    - name: "windows | runtime | timezone + NTP"
      ansible.windows.win_shell: |
        # windows-audit (2026-04-29):
        #   1) timezone: Windows TZ ID → IANA 매핑 (Linux 표기와 일관). 매핑 없으면 raw 유지.
        #   2) NTP last_sync: w32tm /query /status 출력은 OS locale 의존 (en/ko/ja/...).
        #      → registry HKLM:\SYSTEM\CurrentControlSet\Services\W32Time\Config (locale-free) 우선.
        #      → fallback: w32tm /query /source 의 비어있지 않음 + Local CMOS Clock 아님 으로 sync 여부 추정.
        $tzId = (Get-TimeZone).Id
        $tzMap = @{
          'Korea Standard Time' = 'Asia/Seoul'
          'Tokyo Standard Time' = 'Asia/Tokyo'
          'China Standard Time' = 'Asia/Shanghai'
          'Singapore Standard Time' = 'Asia/Singapore'
          'India Standard Time' = 'Asia/Kolkata'
          'Pacific Standard Time' = 'America/Los_Angeles'
          'Mountain Standard Time' = 'America/Denver'
          'Central Standard Time' = 'America/Chicago'
          'Eastern Standard Time' = 'America/New_York'
          'Hawaiian Standard Time' = 'Pacific/Honolulu'
          'Alaskan Standard Time' = 'America/Anchorage'
          'GMT Standard Time' = 'Europe/London'
          'W. Europe Standard Time' = 'Europe/Berlin'
          'Romance Standard Time' = 'Europe/Paris'
          'Central European Standard Time' = 'Europe/Warsaw'
          'Russian Standard Time' = 'Europe/Moscow'
          'AUS Eastern Standard Time' = 'Australia/Sydney'
          'New Zealand Standard Time' = 'Pacific/Auckland'
          'UTC' = 'UTC'
        }
        $tzIana = if ($tzMap.ContainsKey($tzId)) { $tzMap[$tzId] } else { $tzId }

        $svc = Get-Service -Name W32Time -ErrorAction SilentlyContinue
        $svc_state = if ($svc) { $svc.Status.ToString() } else { '' }

        # Locale-free sync detection
        $source = ''
        try {
          $src = w32tm /query /source 2>$null
          if ($src) { $source = ($src | Select-Object -First 1).ToString().Trim() }
        } catch {}
        $is_synced = ($source -and $source -ne 'Local CMOS Clock' -and $source -notmatch 'Free-running')

        # last sync timestamp from w32tm (locale-aware best-effort, multiple language patterns)
        $sync = ''
        try {
          $w32tm = w32tm /query /status 2>$null
          if ($w32tm) {
            $patterns = @(
              'Last Successful Sync Time',
              'Letzter erfolgreicher Synchronisierungszeitpunkt'
            )
            foreach ($p in $patterns) {
              $line = ($w32tm | Select-String -SimpleMatch $p | Select-Object -First 1)
              if ($line) {
                $sync = ($line.ToString() -split ':\s*', 2)[1]
                break
              }
            }
          }
        } catch {}

        # ISO normalize: locale-aware string -> UTC ISO 8601
        $sync_iso = $null
        if ($sync) {
          try { $sync_iso = ([datetime]::Parse($sync.Trim())).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ') } catch {}
        }

        @{
          timezone      = $tzIana
          timezone_raw  = $tzId
          w32time_state = $svc_state
          source        = $source
          synced        = $is_synced
          last_sync     = $sync_iso
        } | ConvertTo-Json -Compress
      register:    _w_rt_ntp
      changed_when: false
      failed_when: false
      no_log: true

    - name: "windows | runtime | firewall profiles"
      ansible.windows.win_shell: |
        if (Get-Command Get-NetFirewallProfile -ErrorAction SilentlyContinue) {
          Get-NetFirewallProfile | ForEach-Object {
            [PSCustomObject]@{
              profile = $_.Name
              enabled = [bool]$_.Enabled
              default_inbound  = [string]$_.DefaultInboundAction
              default_outbound = [string]$_.DefaultOutboundAction
            } | ConvertTo-Json -Compress
          }
        }
      register:    _w_rt_fw
      changed_when: false
      failed_when: false
      no_log: true

    - name: "windows | runtime | listening TCP ports"
      ansible.windows.win_shell: |
        if (Get-Command Get-NetTCPConnection -ErrorAction SilentlyContinue) {
          Get-NetTCPConnection -State Listen |
            Select-Object -ExpandProperty LocalPort -Unique |
            Sort-Object |
            Select-Object -First 50 |
            ForEach-Object { $_ }
        }
      register:    _w_rt_ports
      changed_when: false
      failed_when: false
      no_log: true

    - name: "windows | runtime | pagefile (swap)"
      ansible.windows.win_shell: |
        Get-CimInstance Win32_PageFileUsage -ErrorAction SilentlyContinue | ForEach-Object {
          [PSCustomObject]@{
            name        = $_.Name
            size_mb     = [int]$_.AllocatedBaseSize
            used_mb     = [int]$_.CurrentUsage
            peak_mb     = [int]$_.PeakUsage
          } | ConvertTo-Json -Compress
        }
      register:    _w_rt_pagefile
      changed_when: false
      failed_when: false
      no_log: true

    - name: "windows | runtime | parse + build fragment"
      ansible.builtin.set_fact:
        _w_rt_ntp_obj: >-
          {{ (_w_rt_ntp.stdout | default('') | trim | from_json)
             if (_w_rt_ntp.stdout | default('') | trim | length > 0)
             else {} }}
        _w_rt_fw_list: >-
          {%- set out = [] -%}
          {%- for line in (_w_rt_fw.stdout_lines | default([])) -%}
            {%- if line | trim -%}
              {%- set _ = out.append(line | from_json) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ out }}
        _w_rt_ports_list: >-
          {%- set out = [] -%}
          {%- for line in (_w_rt_ports.stdout_lines | default([])) -%}
            {%- if line | trim -%}
              {%- set _ = out.append(line | trim | int) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ out }}
        _w_rt_pagefile_list: >-
          {%- set out = [] -%}
          {%- for line in (_w_rt_pagefile.stdout_lines | default([])) -%}
            {%- if line | trim -%}
              {%- set _ = out.append(line | from_json) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ out }}
      no_log: true

    # cycle-016 Phase P 후속: Linux 와 키 일관성 통일
    - name: "windows | runtime | merge fragment"
      ansible.builtin.set_fact:
        _data_fragment:
          system:
            runtime:
              timezone:         "{{ _w_rt_ntp_obj.timezone | default(none) }}"
              ntp_active:       "{{ (_w_rt_ntp_obj.w32time_state | default('')) | lower in ['running','active'] }}"
              # windows-audit: locale-independent (w32tm /query /source) — Korean/Japanese 서버에서도 정확
              ntp_synchronized: "{{ _w_rt_ntp_obj.synced | default(false) | bool }}"
              firewall_tool:    "windows_firewall"
              firewall_state: >-
                {%- set any_enabled = false -%}
                {%- for fw in _w_rt_fw_list -%}
                  {%- if fw.enabled | default(false) -%}{%- set any_enabled = true -%}{%- endif -%}
                {%- endfor -%}
                {{ 'enabled' if any_enabled else 'disabled' }}
              listening_ports: >-
                {%- set out = [] -%}
                {%- for p in (_w_rt_ports_list | default([])) -%}
                  {%- set _ = out.append(p | string) -%}
                {%- endfor -%}
                {{ out }}
              # production-audit (2026-04-29): Jinja2 loop scoping 버그 수정 — namespace pattern (cycle-016 memory/storage와 일치)
              # 기존: `{% set total = total + ... %}` 는 loop 종료 시 마지막 iteration 값만 보존 → 합계가 아닌 마지막 pagefile 크기만 emit
              swap_total_mb: >-
                {%- set ns = namespace(t=0) -%}
                {%- for pf in (_w_rt_pagefile_list | default([])) -%}
                  {%- set ns.t = ns.t + (pf.size_mb | default(0) | int) -%}
                {%- endfor -%}
                {{ ns.t }}
              swap_used_mb: >-
                {%- set ns = namespace(u=0) -%}
                {%- for pf in (_w_rt_pagefile_list | default([])) -%}
                  {%- set ns.u = ns.u + (pf.used_mb | default(0) | int) -%}
                {%- endfor -%}
                {{ ns.u }}
              swap_free_mb: >-
                {%- set ns = namespace(t=0, u=0) -%}
                {%- for pf in (_w_rt_pagefile_list | default([])) -%}
                  {%- set ns.t = ns.t + (pf.size_mb | default(0) | int) -%}
                  {%- set ns.u = ns.u + (pf.used_mb | default(0) | int) -%}
                {%- endfor -%}
                {{ ns.t - ns.u }}
              # Windows-specific 부가 정보 (Linux 키 외 추가 — 일관성 유지하면서 풍부함 보존)
              firewall_profiles: "{{ _w_rt_fw_list }}"
              pagefiles:        "{{ _w_rt_pagefile_list }}"
              ntp_last_sync:    "{{ _w_rt_ntp_obj.last_sync | default(none) }}"
        _sections_supported_fragment: ['system']
        _sections_collected_fragment: ['system']
        _sections_failed_fragment:    []
        _errors_fragment:             []
      no_log: true
  rescue:
    - name: "windows | runtime | rescue (best-effort skip)"
      ansible.builtin.set_fact:
        _data_fragment:
          system:
            runtime:
              timezone:         null
              ntp_active:       null
              ntp_synchronized: null
              firewall_tool:    "windows_firewall"
              firewall_state:   null
              listening_ports:  []
              swap_total_mb:    null
              swap_used_mb:     null
              swap_free_mb:     null
              firewall_profiles: []
              pagefiles:        []
              ntp_last_sync:    null
        _sections_supported_fragment: ['system']
        _sections_collected_fragment: []
        _sections_failed_fragment:    ['system_runtime']
        _errors_fragment:
          - section: windows_runtime
            message: "Windows runtime 정보 수집 실패 (best-effort skip)"
            detail:  "{{ ansible_failed_result.msg | default('') }}"
      no_log: true

- name: "windows | runtime | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
