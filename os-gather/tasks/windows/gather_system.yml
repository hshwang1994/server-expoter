---
# os-gather/tasks/windows/gather_system.yml → data.system fragment

- name: "windows | system | os version"
  ansible.windows.win_shell: |
    $os  = Get-CimInstance Win32_OperatingSystem
    $rel = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion' `
              -ErrorAction SilentlyContinue).DisplayVersion
    if (-not $rel) {
      $rel = (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion' `
                -ErrorAction SilentlyContinue).ReleaseId
    }
    [PSCustomObject]@{
      caption = $os.Caption
      version = $os.Version
      build   = $os.BuildNumber
      rel_id  = $rel
    } | ConvertTo-Json -Compress
  register: _w_os_raw
  changed_when: false
  failed_when: false
  no_log: true

- name: "windows | system | parse"
  ansible.builtin.set_fact:
    _w_os_data: >-
      {%- if _w_os_raw.stdout is defined and _w_os_raw.stdout | trim | length > 0 -%}
      {{ _w_os_raw.stdout | from_json }}
      {%- else -%}
      {}
      {%- endif -%}
  no_log: true

- name: "windows | system | hosting detection"
  ansible.windows.win_shell: |
    $cs = Get-CimInstance Win32_ComputerSystem
    [PSCustomObject]@{
      Model            = $cs.Model
      Manufacturer     = $cs.Manufacturer
      HypervisorPresent = [string]$cs.HypervisorPresent
    } | ConvertTo-Json -Compress
  register: _w_hosting_raw
  changed_when: false
  failed_when: false
  no_log: true

- name: "windows | system | parse hosting"
  ansible.builtin.set_fact:
    _w_hosting: >-
      {%- if _w_hosting_raw.stdout is defined and _w_hosting_raw.stdout | trim | length > 0 -%}
      {{ _w_hosting_raw.stdout | from_json }}
      {%- else -%}
      {}
      {%- endif -%}
  no_log: true

# hosting_type 판정:
#   - Model/Manufacturer가 알려진 VM 패턴 → virtual
#   - VM 패턴 아님 + HypervisorPresent=False + 물리 OEM → baremetal
#   - 그 외 → unknown
# 물리 OEM evidence(Manufacturer)는 판정의 보강 근거로만 사용
- name: "windows | system | determine hosting_type"
  ansible.builtin.set_fact:
    _w_hosting_type: >-
      {%- set model = (_w_hosting.Model | default('')) | string -%}
      {%- set mfr   = (_w_hosting.Manufacturer | default('')) | string -%}
      {%- set hyp   = (_w_hosting.HypervisorPresent | default('')) | string -%}
      {%- set vm_models = ['Virtual Machine', 'VMware Virtual Platform', 'VirtualBox', 'KVM', 'QEMU Virtual Machine', 'Standard PC'] -%}
      {%- set vm_mfrs   = ['VMware, Inc.', 'QEMU', 'Xen', 'Amazon EC2', 'Google', 'DigitalOcean'] -%}
      {# nosec rule12-r1: hosting_type 판정용 OEM mfr list (set membership 패턴, 분기 아님) #}
      {%- set oem_mfrs  = ['Dell Inc.', 'HPE', 'Hewlett Packard Enterprise', 'Lenovo', 'Cisco Systems Inc', 'Supermicro', 'Fujitsu', 'Inspur'] -%}
      {%- set is_vm_model = model in vm_models -%}
      {%- set is_vm_mfr   = mfr in vm_mfrs -%}
      {%- set is_ms_vm    = (mfr == 'Microsoft Corporation' and model == 'Virtual Machine') -%}
      {%- if is_vm_model or is_vm_mfr or is_ms_vm -%}virtual
      {%- elif hyp == 'False' and mfr in oem_mfrs -%}baremetal
      {%- else -%}unknown
      {%- endif -%}
  no_log: true

# 식별자 값 결정 — NA/빈값/센티널은 null 정규화
- name: "windows | system | resolve identifiers"
  ansible.builtin.set_fact:
    _w_serial_val: >-
      {{ none if (ansible_product_serial | default('')) in ['', 'NA', 'None', 'Not Specified', 'To Be Filled By O.E.M.']
         else (ansible_product_serial | default(none)) }}
    _w_uuid_val: >-
      {{ none if (ansible_product_uuid | default('')) in ['', 'NA', 'None', 'Not Specified']
         else (ansible_product_uuid | default(none)) }}
  no_log: true

# F5 cycle 2026-05-11: system.runtime — 9 필드 (timezone/ntp/firewall/listen/pagefile)
# Linux 와 envelope shape 통일 — Windows pagefile 을 swap_*_mb 로 등가 표현.
- name: "windows | system | gather runtime (timezone/ntp/firewall/listen/pagefile)"
  ansible.windows.win_shell: |
    $tz = $null
    try { $tz = (Get-TimeZone -ErrorAction SilentlyContinue).Id } catch {}
    $w32 = Get-Service W32Time -ErrorAction SilentlyContinue
    $ntpActive = if ($w32 -and $w32.Status -eq 'Running') { 'yes' } else { 'no' }
    $ntpSync = $null
    try {
      $status = w32tm /query /status 2>$null
      if ($status -match 'Source:\s+\S') { $ntpSync = 'yes' } else { $ntpSync = 'no' }
    } catch { $ntpSync = $null }
    $fwAny = $false
    try {
      $profiles = Get-NetFirewallProfile -ErrorAction SilentlyContinue
      if ($profiles) {
        $fwAny = (($profiles | Where-Object { $_.Enabled -eq $true } | Measure-Object).Count) -gt 0
      }
    } catch {}
    $fwState = if ($fwAny) { 'active' } else { 'inactive' }
    $ports = @()
    try {
      $conns = Get-NetTCPConnection -State Listen -ErrorAction SilentlyContinue
      if ($conns) {
        $ports = @($conns | Select-Object -ExpandProperty LocalPort | Sort-Object -Unique)
      }
    } catch {}
    $pfTotal = $null; $pfUsed = $null; $pfFree = $null
    try {
      $pf = Get-CimInstance Win32_PageFileUsage -ErrorAction SilentlyContinue
      if ($pf) {
        $sumTotal = ($pf | Measure-Object -Property AllocatedBaseSize -Sum).Sum
        $sumUsed  = ($pf | Measure-Object -Property CurrentUsage     -Sum).Sum
        $pfTotal = [int]$sumTotal
        $pfUsed  = [int]$sumUsed
        $pfFree  = [int]($sumTotal - $sumUsed)
      }
    } catch {}
    [PSCustomObject]@{
      timezone         = $tz
      ntp_active       = $ntpActive
      ntp_synchronized = $ntpSync
      firewall_tool    = 'windows_firewall'
      firewall_state   = $fwState
      listening_ports  = $ports
      swap_total_mb    = $pfTotal
      swap_used_mb     = $pfUsed
      swap_free_mb     = $pfFree
    } | ConvertTo-Json -Compress -Depth 4
  register: _w_runtime_raw
  changed_when: false
  failed_when: false
  no_log: true

- name: "windows | system | parse runtime"
  ansible.builtin.set_fact:
    _w_runtime: >-
      {%- if _w_runtime_raw.stdout is defined and (_w_runtime_raw.stdout | trim | length > 0) -%}
      {{ _w_runtime_raw.stdout | from_json }}
      {%- else -%}
      {}
      {%- endif -%}
  no_log: true

# 식별자 diagnostic — non-fatal, status/sections에 영향 없음
- name: "windows | system | build identifier diagnostics"
  ansible.builtin.set_fact:
    _w_id_diagnostics: >-
      {%- set diags = [] -%}
      {%- set serial_na = (_w_serial_val | default(none)) is none -%}
      {%- set uuid_na   = (_w_uuid_val   | default(none)) is none -%}
      {%- set serial_defined = ansible_product_serial is defined -%}
      {%- set uuid_defined   = ansible_product_uuid is defined -%}
      {%- if serial_na and not serial_defined -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 수집 제한 (insufficient_privilege): serial_number — 권한 또는 수집 경로 제한으로 fact를 취득하지 못했습니다.","detail":"affected_fields: serial_number"}) -%}
      {%- elif serial_na and serial_defined -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 값 미제공 (identifier_not_available): serial_number — source에서 유효한 값을 반환하지 않았습니다.","detail":"affected_fields: serial_number"}) -%}
      {%- endif -%}
      {%- if uuid_na and not uuid_defined -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 수집 제한 (insufficient_privilege): system_uuid — 권한 또는 수집 경로 제한으로 fact를 취득하지 못했습니다.","detail":"affected_fields: system_uuid"}) -%}
      {%- elif uuid_na and uuid_defined -%}
        {%- set _ = diags.append({"section":"system","message":"식별자 값 미제공 (identifier_not_available): system_uuid — source에서 유효한 값을 반환하지 않았습니다.","detail":"affected_fields: system_uuid"}) -%}
      {%- endif -%}
      {{ diags }}
  no_log: true

- name: "windows | system | build fragment"
  ansible.builtin.set_fact:
    _data_fragment:
      system:
        os_family:      "Windows"
        distribution:   "{{ _w_os_data.caption  | default(none) }}"
        version:        "{{ _w_os_data.rel_id    | default(_w_os_data.version | default(none)) }}"
        kernel:         "{{ _w_os_data.build     | default(none) | string }}"
        architecture:   "{{ 'x86_64' if (ansible_architecture | default('')) in ['64-bit', '64비트', 'AMD64', 'x86_64'] else ('x86' if (ansible_architecture | default('')) in ['32-bit', '32비트', 'x86'] else (ansible_architecture | default(none))) }}"
        hosting_type:   "{{ _w_hosting_type | default('unknown') | trim }}"
        uptime_seconds: "{{ (ansible_uptime_seconds | default(0)) | int }}"
        selinux:        null
        fqdn:           "{{ ansible_fqdn | default(inventory_hostname) }}"
        serial_number:  "{{ _w_serial_val | default(none) }}"
        system_uuid:    "{{ _w_uuid_val | default(none) }}"
        # F5 cycle 2026-05-11: system.runtime — 9 필드 (Linux 와 envelope shape 통일)
        # Windows pagefile = Linux swap 등가 (swap_*_mb 로 등가 표현).
        runtime:
          timezone: >-
            {%- set v = (_w_runtime.timezone | default('')) | string | trim -%}
            {{ v if v else none }}
          ntp_active: >-
            {%- set v = (_w_runtime.ntp_active | default('')) | string | trim -%}
            {%- if v == 'yes' -%}{{ true }}
            {%- elif v == 'no' -%}{{ false }}
            {%- else -%}{{ none }}
            {%- endif -%}
          ntp_synchronized: >-
            {%- set v = (_w_runtime.ntp_synchronized | default('')) | string | trim -%}
            {%- if v == 'yes' -%}{{ true }}
            {%- elif v == 'no' -%}{{ false }}
            {%- else -%}{{ none }}
            {%- endif -%}
          firewall_tool: >-
            {%- set v = (_w_runtime.firewall_tool | default('')) | string | trim -%}
            {{ v if v else none }}
          firewall_state: >-
            {%- set v = (_w_runtime.firewall_state | default('')) | string | trim -%}
            {{ v if v else none }}
          listening_ports: "{{ _w_runtime.listening_ports | default([]) }}"
          swap_total_mb: >-
            {%- set v = _w_runtime.swap_total_mb | default(none) -%}
            {{ (v | int) if (v is not none) else none }}
          swap_used_mb: >-
            {%- set v = _w_runtime.swap_used_mb | default(none) -%}
            {{ (v | int) if (v is not none) else none }}
          swap_free_mb: >-
            {%- set v = _w_runtime.swap_free_mb | default(none) -%}
            {{ (v | int) if (v is not none) else none }}
    _sections_supported_fragment: ['system']
    _sections_collected_fragment: ['system']
    _sections_failed_fragment:    []
    # rule 22 R8 — list 타입 강제. `>-` multi-block + 다중 {{ }} 분기는 Ansible
    # folded scalar 에서 string-coerce 위험이 있어 단일 expression 으로 단순화.
    # source contract: _w_id_diagnostics 는 list of dicts. 비정상 경로 (string/
    # mapping/None) 은 빈 list 로 drop — receiving side (merge_fragment) 의 방어
    # 가드가 더 자세히 처리한다. 정보 손실보다 char iteration 회귀 차단이 우선.
    _errors_fragment: "{{ _w_id_diagnostics if (_w_id_diagnostics is defined and _w_id_diagnostics is iterable and _w_id_diagnostics is not string and _w_id_diagnostics is not mapping) else [] }}"
  no_log: true

- name: "windows | system | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
