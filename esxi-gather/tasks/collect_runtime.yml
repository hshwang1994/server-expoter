---
# esxi-gather/tasks/collect_runtime.yml
#
# 2026-04-29 fix B31/B32: ESXi runtime 정보 수집 (timezone / NTP / firewall / default gateway).
# 2026-04-30 fix B31/B32 v2: vmware_host_*_info 모듈은 standalone ESXi에서 esxi_hostname 인자 필수.
#   응답 구조 실측 후 parsing 수정:
#   - vmware_host_ntp_info → hosts_ntp_info[host][0].{time_zone_name, ntp_servers}
#   - vmware_host_firewall_info → hosts_firewall_info[host] = list (rule 54개)
#   - vmware_host_service_info → host_service_info[host] = list of services
#   - vmware_host_dns_info → hosts_dns_info[host].{host_name, ip_address, search_domain}
#   - default_gateway: vmware_host_facts schema=vsphere properties=config.network 로 별도 추출
#
# 입력:
#   _e_ip / _e_user / _e_pass / _e_hostname (= ansible_hostname)

- name: "esxi | runtime | NTP info"
  community.vmware.vmware_host_ntp_info:
    hostname:       "{{ _e_ip }}"
    username:       "{{ _e_user }}"
    password:       "{{ _e_pass }}"
    validate_certs: false
    esxi_hostname:  "{{ _e_hostname | default(_e_ip) }}"
  register:    _e_ntp_result
  delegate_to: localhost
  failed_when: false
  no_log: true

- name: "esxi | runtime | firewall info"
  community.vmware.vmware_host_firewall_info:
    hostname:       "{{ _e_ip }}"
    username:       "{{ _e_user }}"
    password:       "{{ _e_pass }}"
    validate_certs: false
    esxi_hostname:  "{{ _e_hostname | default(_e_ip) }}"
  register:    _e_firewall_result
  delegate_to: localhost
  failed_when: false
  no_log: true

- name: "esxi | runtime | service info"
  community.vmware.vmware_host_service_info:
    hostname:       "{{ _e_ip }}"
    username:       "{{ _e_user }}"
    password:       "{{ _e_pass }}"
    validate_certs: false
    esxi_hostname:  "{{ _e_hostname | default(_e_ip) }}"
  register:    _e_service_result
  delegate_to: localhost
  failed_when: false
  no_log: true

# B32 default gateway: vmware_host_facts schema=vsphere로 routeConfig 추출 시도.
# B40 회피 위해 'name' 속성 사용 안 함 (다른 path).
- name: "esxi | runtime | host facts (network routeConfig)"
  community.vmware.vmware_host_facts:
    hostname:       "{{ _e_ip }}"
    username:       "{{ _e_user }}"
    password:       "{{ _e_pass }}"
    validate_certs: false
    schema: vsphere
    properties:
      - config.network
  register:    _e_hfvs_result
  delegate_to: localhost
  failed_when: false
  no_log: true

- name: "esxi | runtime | parse all"
  ansible.builtin.set_fact:
    # MED-4 fix: hostname 명시 lookup 후 first() fallback. multi-host vCenter 환경
    # 에서 임의 host 참조 차단. single-host 환경에서는 first() 동작과 동일.
    # NTP block: time_zone_name + ntp_servers list
    _e_runtime_timezone: >-
      {%- set hosts = (_e_ntp_result.hosts_ntp_info | default({})) -%}
      {%- if hosts -%}
        {%- set first_h = hosts.get(_e_hostname | default(_e_ip)) | default(hosts.values() | list | first | default([])) -%}
        {%- if first_h -%}{{ first_h[0].time_zone_name | default(none) }}{%- else -%}{{ none }}{%- endif -%}
      {%- else -%}{{ none }}{%- endif -%}
    _e_runtime_ntp_active: >-
      {%- set hosts = (_e_ntp_result.hosts_ntp_info | default({})) -%}
      {%- if hosts -%}
        {%- set first_h = hosts.get(_e_hostname | default(_e_ip)) | default(hosts.values() | list | first | default([])) -%}
        {%- if first_h -%}{{ (first_h[0].ntp_servers | default([]) | length) > 0 }}{%- else -%}{{ none }}{%- endif -%}
      {%- else -%}{{ none }}{%- endif -%}

    # Firewall: rule 54개 = ESXi 방화벽 활성. ESXi는 시스템 레벨에서 firewall always-on.
    # 'enabled' rule이 1개 이상이면 firewall_state=enabled.
    #
    # 권한 부족/모듈 실패와 "정상 disabled" 구분: rules list 가 비어있으면
    # ESXi 표준상 비정상 (firewall always-on) → 미수집(null) 으로 보고. 이전 구현은
    # 빈 list 를 disabled 로 오판해 보안 라벨이 반대로 갔음.
    _e_runtime_firewall_state: >-
      {%- set fws = (_e_firewall_result.hosts_firewall_info | default({})) -%}
      {%- if (_e_firewall_result is failed | default(false)) or not fws -%}
        {{ none }}
      {%- else -%}
        {%- set rules = fws.get(_e_hostname | default(_e_ip)) | default(fws.values() | list | first | default([])) -%}
        {%- if (rules | length) == 0 -%}
          {{ none }}
        {%- else -%}
          {%- set enabled_count = (rules | selectattr('enabled','equalto',true) | list | length) -%}
          {{ 'enabled' if enabled_count > 0 else 'disabled' }}
        {%- endif -%}
      {%- endif -%}

    # NTPD service running 상태로 ntp_synchronized 판정 (ntp_servers 미설정 시 fallback false).
    _e_runtime_ntp_synced: >-
      {%- set svcs = (_e_service_result.host_service_info | default({})) -%}
      {%- if svcs -%}
        {%- set svc_list = svcs.get(_e_hostname | default(_e_ip)) | default(svcs.values() | list | first | default([])) -%}
        {%- set ntp_svc = (svc_list | selectattr('key','equalto','ntpd') | list | first | default({})) -%}
        {{ ntp_svc.running | default(false) }}
      {%- else -%}{{ none }}{%- endif -%}

    # B32 default gateway: vmware_host_facts vsphere config.network → routeConfig 또는
    # consoleVnic[0].spec.ipRouteConfig.defaultGateway 등 vSphere API spec 위치 탐색.
    _e_default_gateway: >-
      {%- set ans = (_e_hfvs_result.ansible_facts | default({})) -%}
      {%- if ans -%}
        {%- set net = (ans.config | default({})).network | default({}) -%}
        {%- set gw = net.routeConfig.defaultGateway | default(none) if net.routeConfig is defined else none -%}
        {%- if not gw -%}
          {%- set gw = net.ipRouteConfig.defaultGateway | default(none) if net.ipRouteConfig is defined else none -%}
        {%- endif -%}
        {%- if not gw and net.vnic is defined -%}
          {%- for vnic in (net.vnic | default([])) -%}
            {%- if not gw -%}
              {%- set rc = vnic.spec.ipRouteConfig | default(vnic.spec.routeConfig | default({})) -%}
              {%- if rc.defaultGateway -%}{%- set gw = rc.defaultGateway -%}{%- endif -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
        {{ gw }}
      {%- else -%}{{ none }}{%- endif -%}
  no_log: true

# B32 v3 fix: default_gateways를 list-of-dict 타입으로 emit (이전 v2는 string repr).
# Jinja2 dict 리터럴은 set_fact 안에서 안전하지 않아, 별도 task에서 list 구성.
- name: "esxi | runtime | build default_gateways list"
  ansible.builtin.set_fact:
    _e_default_gateways_list: >-
      {{
        [{'family': 'ipv4', 'address': (_e_default_gateway | string | trim)}]
        if (_e_default_gateway | default('') | string | trim) and
           (_e_default_gateway | string | trim) not in ['0.0.0.0', '::', 'None']
        else []
      }}
  no_log: true

- name: "esxi | runtime | merge into system fragment"
  ansible.builtin.set_fact:
    _data_fragment:
      system:
        runtime:
          timezone:         "{{ _e_runtime_timezone | default(none) }}"
          ntp_active:       "{{ _e_runtime_ntp_active | default(none) }}"
          ntp_synchronized: "{{ _e_runtime_ntp_synced | default(none) }}"
          firewall_tool:    "esxi_firewall"
          firewall_state:   "{{ _e_runtime_firewall_state | default(none) }}"
          listening_ports:  []
          swap_total_mb:    null
          swap_used_mb:     null
          swap_free_mb:     null
      network:
        default_gateways: "{{ _e_default_gateways_list | default([]) }}"
    _sections_supported_fragment: ['system', 'network']
    _sections_collected_fragment: ['system', 'network']
    _sections_failed_fragment: []
    _errors_fragment: []
  no_log: true

- name: "esxi | runtime | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
