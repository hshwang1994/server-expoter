---
# esxi-gather/tasks/normalize_network.yml
# _e_raw_facts + _e_raw_config → network fragment

- name: "esxi | normalize network | extract dns and gw"
  ansible.builtin.set_fact:
    _e_default_gw:  "{{ _e_raw_facts.ansible_default_ipv4.gateway | default(none) }}"
    # production-audit (2026-04-29): vmware_host_config_info는 hosts_config_info[hostname]={config dict} 구조.
    # 기존: top-level (hostname keys) iterate → 'dns' 키 절대 매칭 안 됨 → DNS 항상 빈 list.
    # 수정: 호스트별 inner dict로 drill-in 후 dns 관련 필드 추출.
    _e_dns_servers: >-
      {%- set dns_out = [] -%}
      {%- set host_cfgs = (_e_raw_config | default({})).values() | list -%}
      {%- for host_cfg in host_cfgs -%}
        {%- set net_info = host_cfg.get('network_system_info', host_cfg) if host_cfg is mapping else {} -%}
        {%- set dns_cfg = (net_info.get('dns_config') if net_info is mapping else {}) | default({}) -%}
        {%- for srv in (dns_cfg.address | default([])) -%}
          {%- if srv -%}{%- set _ = dns_out.append(srv | string) -%}{%- endif -%}
        {%- endfor -%}
        {# fallback: scan flat keys containing 'dns' on inner dict #}
        {%- if not dns_out and host_cfg is mapping -%}
          {%- for k, v in host_cfg.items() -%}
            {%- if 'dns' in (k|lower) and v -%}
              {%- if v is iterable and v is not string -%}
                {%- for entry in v -%}
                  {%- if entry -%}{%- set _ = dns_out.append(entry | string) -%}{%- endif -%}
                {%- endfor -%}
              {%- else -%}
                {%- set _ = dns_out.append(v | string) -%}
              {%- endif -%}
            {%- endif -%}
          {%- endfor -%}
        {%- endif -%}
      {%- endfor -%}
      {{ dns_out | unique | list }}
  no_log: true

- name: "esxi | normalize network | build interfaces"
  ansible.builtin.set_fact:
    _e_norm_interfaces: >-
      {%- set out = [] -%}
      {%- set primary = _e_raw_facts.ansible_default_ipv4.interface | default('') -%}
      {%- for iface in (_e_raw_facts.ansible_interfaces | default([])) -%}
        {%- set d    = _e_raw_facts.get('ansible_' ~ iface, {}) -%}
        {%- set ipv4 = d.get('ipv4', {}) -%}
        {%- if ipv4.get('address') and
               ipv4.address != '127.0.0.1' and
               not ipv4.address.startswith('169.254.') -%}
          {%- set nm = ipv4.netmask | default('') -%}
          {# production-audit (2026-04-29): bit-counting (Linux 와 일관) — /22, /26, /28 등 비표준 prefix 지원 #}
          {%- set pfx = none -%}
          {%- if nm -%}
            {%- set pns = namespace(bits=0) -%}
            {%- for octet in nm.split('.') -%}
              {%- set val = octet | int -%}
              {%- for bit in [128,64,32,16,8,4,2,1] -%}
                {%- if val >= bit -%}
                  {%- set pns.bits = pns.bits + 1 -%}
                  {%- set val = val - bit -%}
                {%- endif -%}
              {%- endfor -%}
            {%- endfor -%}
            {%- set pfx = pns.bits -%}
          {%- endif -%}
          {%- set is_p = (iface == primary) -%}
          {%- set _ = out.append({
            'id':          iface, 'name': iface, 'kind': 'vmkernel',
            'mac':         d.get('macaddress',none),
            'mtu':         d.get('mtu',none),
            'speed_mbps':  none,
            'link_status': 'up' if d.get('active',false) else 'unknown',
            'is_primary':  is_p,
            'addresses': [{'family':'ipv4','address':ipv4.address,
                           'prefix_length':pfx,
                           'subnet_mask': nm if nm else none,
                           'gateway': _e_default_gw if is_p else none}]
          }) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ out }}
  no_log: true

# cycle-016 (2026-04-29): ESXi network.summary
- name: "esxi | normalize network | compute summary groups"
  ansible.builtin.set_fact:
    _e_net_summary: >-
      {%- set ns = namespace(groups=[], seen={}) -%}
      {%- for n in (_e_norm_interfaces | default([])) -%}
        {%- set sp = n.speed_mbps | default(none) -%}
        {%- set link_up = (n.link_status | default('') | lower) in ['up','linkup'] -%}
        {%- set key = sp | string -%}
        {%- if key in ns.seen -%}
          {%- set idx = ns.seen[key] -%}
          {%- set _ = ns.groups[idx].update({'quantity': ns.groups[idx].quantity + 1, 'link_up_count': ns.groups[idx].link_up_count + (1 if link_up else 0)}) -%}
        {%- else -%}
          {%- set _ = ns.seen.update({key: ns.groups | length}) -%}
          {%- set _ = ns.groups.append({'speed_mbps': sp, 'link_type': none, 'quantity': 1, 'link_up_count': 1 if link_up else 0}) -%}
        {%- endif -%}
      {%- endfor -%}
      {{ {'groups': ns.groups} }}
  no_log: true

# cycle-016 Phase P: 3 채널 key 일관성 — adapters / ports / driver_map 빈 list 키 노출
- name: "esxi | normalize network | build fragment"
  ansible.builtin.set_fact:
    _data_fragment:
      network:
        dns_servers: "{{ _e_dns_servers }}"
        default_gateways: >-
          {%- set out = [] -%}
          {%- if _e_default_gw -%}
            {%- set _ = out.append({'family':'ipv4','address':_e_default_gw}) -%}
          {%- endif -%}
          {{ out }}
        interfaces: "{{ _e_norm_interfaces }}"
        adapters:    []
        ports:       []
        driver_map:  []
        summary: "{{ _e_net_summary | default({'groups': []}) }}"
    _sections_supported_fragment: ['network']
    _sections_collected_fragment: ['network']
    _sections_failed_fragment:    []
    _errors_fragment:             []
  no_log: true

- name: "esxi | normalize network | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
