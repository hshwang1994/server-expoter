---
# esxi-gather/tasks/try_credentials.yml
#
# P1 (cycle 2026-04-28): vault accounts 후보 순차 시도 — ESXi vSphere API 인증.
#
# 입력:
#   _e_accounts : list of {username, password, label, role}
#   _e_ip       : ESXi 호스트 IP
#
# 출력:
#   _e_auth_ok           : bool
#   _e_used_account      : { username, label, role }
#   _e_attempts_meta     : { attempted_count, used_label, used_role, fallback_used }
#
# 동작: vmware_host_facts read-only 호출로 인증 검증.

- name: "esxi | try_credentials | init"
  ansible.builtin.set_fact:
    _e_auth_ok: false
    _e_used_account: {}
  no_log: true

- name: "esxi | try_credentials | warn no accounts"
  ansible.builtin.debug:
    msg: "vault accounts 비어 있음 (esxi) — 자격증명 없이 진행 시도."
  when: (_e_accounts | default([])) | length == 0

- name: "esxi | try_credentials | iterate candidates"
  ansible.builtin.include_tasks: try_one_credential.yml
  loop: "{{ _e_accounts | default([]) }}"
  loop_control:
    loop_var: _try_cred
    label:    "{{ _try_cred.label | default('unlabeled') }}"
  when:
    - (_e_accounts | default([])) | length > 0
    - not (_e_auth_ok | default(false) | bool)

- name: "esxi | try_credentials | record meta"
  ansible.builtin.set_fact:
    _e_attempts_meta:
      attempted_count: "{{ _e_accounts | default([]) | length }}"
      used_label:      "{{ (_e_used_account | default({})).label | default(none) }}"
      used_role:       "{{ (_e_used_account | default({})).role  | default(none) }}"
      fallback_used: >-
        {{ ((_e_used_account | default({})).role | default('primary')) != 'primary'
           and _e_auth_ok | bool }}
  no_log: true
