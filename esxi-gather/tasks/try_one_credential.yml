---
# esxi-gather/tasks/try_one_credential.yml
#
# P1 (cycle 2026-04-28): 후보 자격 1개로 ESXi vSphere API 인증 시도.
# vmware_host_facts 는 read-only 이며 connection failure 시 인증 검증 적합.
# 성공 시 _e_user/_e_pass 갱신 + _e_auth_ok=true → 이후 후보 skip.
#
# 입력:
#   _try_cred : { username, password, label, role }
#   _e_ip     : ESXi 호스트 IP

- when: not (_e_auth_ok | default(false) | bool)
  block:

    - name: "esxi | try_one_credential | probe with vmware_host_facts"
      # 2026-04-29 fix B40: properties: ['name'] 제거 — Ansible 2.20에서 'Found variable using
      # reserved name name' 경고 발생. 'name'은 vSphere 속성 경로지만 Ansible 내부 var 체커가
      # 오인. summary 스키마는 properties 불필요 (default 핵심 필드만).
      community.vmware.vmware_host_facts:
        hostname:    "{{ _e_ip }}"
        username:    "{{ _try_cred.username | default('') }}"
        password:    "{{ _try_cred.password | default('') }}"
        validate_certs: false
        schema: summary
      register:    _e_probe
      failed_when: false
      no_log: true

    - name: "esxi | try_one_credential | evaluate"
      ansible.builtin.set_fact:
        _e_probe_ok: "{{ _e_probe is defined and (_e_probe is not failed) }}"
      no_log: true

    - name: "esxi | try_one_credential | promote on success"
      when: _e_probe_ok | bool
      ansible.builtin.set_fact:
        ansible_user:     "{{ _try_cred.username }}"
        ansible_password: "{{ _try_cred.password }}"
        _e_user:          "{{ _try_cred.username }}"
        _e_pass:          "{{ _try_cred.password }}"
        _e_auth_ok:       true
        _e_used_account:
          username: "{{ _try_cred.username }}"
          label:    "{{ _try_cred.label    | default('unlabeled') }}"
          role:     "{{ _try_cred.role     | default('primary') }}"
      no_log: true

    - name: "esxi | try_one_credential | log failure (advisory)"
      when: not (_e_probe_ok | bool)
      ansible.builtin.debug:
        msg: >-
          esxi auth attempt failed —
          label={{ _try_cred.label | default('unlabeled') }},
          role={{ _try_cred.role   | default('primary') }}
