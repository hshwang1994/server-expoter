---
# esxi-gather/tasks/normalize_system.yml
# _e_raw_facts → system/hardware/cpu/memory fragment

- name: "esxi | normalize system | build fragment"
  ansible.builtin.set_fact:
    _data_fragment:
      # cycle-016 Phase P: 3 채널 일관성 — system.runtime 노출 (Linux/Windows 와 동일 키)
      # BUG #1 fix: hostname / fqdn 을 ansible_hostname (ESXi configured name) 으로.
      # 이전: fqdn=_e_ip (= IP), hostname 키 자체 누락 → build_output.yml 이 IP 폴백.
      system:
        os_family:      "VMware ESXi"
        distribution:   "VMware ESXi"
        version:        "{{ _e_raw_facts.ansible_distribution_version | default(none) }}"
        kernel:         "{{ _e_raw_facts.ansible_distribution_build   | default(none) }}"
        # 잔류 fix (Round 12 후속): vmware_host_facts 가 ansible_machine 미반환 시 x86_64 기본
        architecture: >-
          {%- set m = _e_raw_facts.ansible_machine | default(none) -%}
          {{ m if m else 'x86_64' }}
        uptime_seconds: "{{ (_e_raw_facts.ansible_uptime               | default(0)) | int }}"
        selinux:        null
        hostname:       "{{ _e_hostname | default(_e_ip) }}"
        fqdn:           "{{ _e_hostname | default(_e_ip) }}"
        hosting_type:   "hypervisor"
        runtime:
          # ESXi 는 vmware_host_facts 에서 제한적 — 기술적 가능 영역만
          timezone:         null
          ntp_active:       null
          ntp_synchronized: null
          firewall_tool:    "esxi_firewall"
          firewall_state:   null
          listening_ports:  []
          swap_total_mb:    null
          swap_used_mb:     null
          swap_free_mb:     null
      hardware:
        vendor:       "{{ _e_raw_facts.ansible_system_vendor  | default(none) }}"
        model:        "{{ _e_raw_facts.ansible_product_name   | default(none) }}"
        serial:       "{{ _e_raw_facts.ansible_product_serial | default(none) }}"
        uuid:         "{{ _e_raw_facts.ansible_uuid           | default(none) }}"
        bios_version: "{{ _e_raw_facts.ansible_bios_version   | default(none) }}"
        bios_date:    "{{ _e_raw_facts.ansible_bios_date      | default(none) }}"
      cpu:
        sockets:         "{{ _e_raw_facts.ansible_processor_count | default(none) }}"
        cores_physical:  "{{ _e_raw_facts.ansible_processor_cores | default(none) }}"
        logical_threads: "{{ _e_raw_facts.ansible_processor_vcpus | default(none) }}"
        model:           "{{ _e_raw_facts.ansible_processor       | default(none) }}"
        # 잔류 fix (Round 12 후속): vmware_host_facts 가 ansible_processor_mhz 미반환 시
        # CPU model 의 "@ N.NGHz" 패턴에서 추출 (Intel/AMD 표준 표기).
        max_speed_mhz: >-
          {%- set raw_mhz = _e_raw_facts.ansible_processor_mhz | default(none) -%}
          {%- if raw_mhz -%}{{ raw_mhz }}
          {%- else -%}
            {%- set m = (_e_raw_facts.ansible_processor | default('')) | regex_search('@\s*([0-9.]+)\s*GHz', '\\1') -%}
            {%- if m -%}{{ ((m | first | float) * 1000) | int }}{%- else -%}{{ none }}{%- endif -%}
          {%- endif -%}
        # ansible_machine 미반환 시 x86_64 기본 (ESXi 7.x 는 모두 x86_64 — Apple/ARM 서버 미지원)
        architecture: >-
          {%- set m = _e_raw_facts.ansible_machine | default(none) -%}
          {{ m if m else 'x86_64' }}
        # cycle-016 Phase O: ESXi cpu.summary.groups 에 max_speed_mhz / manufacturer / architecture 추가
        summary:
          groups:
            - model:            "{{ _e_raw_facts.ansible_processor | default('unknown') }}"
              manufacturer: >-
                {%- set p = _e_raw_facts.ansible_processor | default('') | lower -%}
                {%- if 'intel' in p -%}Intel
                {%- elif 'amd' in p -%}AMD
                {%- elif p -%}{{ _e_raw_facts.ansible_processor.split()[0] | default('unknown') }}
                {%- else -%}{{ none }}
                {%- endif -%}
              max_speed_mhz: >-
                {%- set raw_mhz = _e_raw_facts.ansible_processor_mhz | default(none) -%}
                {%- if raw_mhz -%}{{ raw_mhz }}
                {%- else -%}
                  {%- set m = (_e_raw_facts.ansible_processor | default('')) | regex_search('@\s*([0-9.]+)\s*GHz', '\\1') -%}
                  {%- if m -%}{{ ((m | first | float) * 1000) | int }}{%- else -%}{{ none }}{%- endif -%}
                {%- endif -%}
              architecture: >-
                {%- set m = _e_raw_facts.ansible_machine | default(none) -%}
                {{ m if m else 'x86_64' }}
              sockets:          "{{ _e_raw_facts.ansible_processor_count | default(0) | int }}"
              cores_per_socket: >-
                {%- set s = (_e_raw_facts.ansible_processor_count | default(0) | int) -%}
                {%- set c = (_e_raw_facts.ansible_processor_cores | default(0) | int) -%}
                {{ (c // s) if s > 0 else 0 }}
              total_cores:      "{{ _e_raw_facts.ansible_processor_cores | default(0) | int }}"
      memory:
        total_mb:     "{{ _e_raw_facts.ansible_memtotal_mb | default(none) }}"
        total_basis:  "hypervisor_visible"
        installed_mb: null
        visible_mb:   "{{ _e_raw_facts.ansible_memtotal_mb | default(none) }}"
        free_mb:      "{{ _e_raw_facts.ansible_memfree_mb  | default(none) }}"
        slots:        []
        # cycle-016 (2026-04-29): ESXi 는 DIMM slot 정보 미수집 — grand_total 만
        summary:
          groups: []
          grand_total_gb: >-
            {{ ((_e_raw_facts.ansible_memtotal_mb | default(0) | int) / 1024) | round(0, 'floor') | int }}
    _sections_supported_fragment: ['system','hardware','cpu','memory']
    _sections_collected_fragment: >-
      {{ ['system','hardware','cpu','memory'] if _e_facts_ok | bool else [] }}
    _sections_failed_fragment: >-
      {{ [] if _e_facts_ok | bool else ['system','hardware','cpu','memory'] }}
    _errors_fragment: []
  no_log: true

- name: "esxi | normalize system | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
