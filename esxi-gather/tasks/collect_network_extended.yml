---
# esxi-gather/tasks/collect_network_extended.yml
#
# P4 (cycle 2026-04-29): ESXi 확장 네트워크 / 스토리지 어댑터 수집.
# vmware_host_vmnic_info / vmware_host_vmhba_info / vmware_vswitch_info /
# vmware_portgroup_info / vmware_vmkernel_info.
#
# best-effort: 일부 vCenter 권한/펌웨어에서 모듈 미지원 시 빈 결과.
#
# 출력 fragment sub-key:
#   data.network.adapters[]         — vmnic (NIC HW)
#   data.network.virtual_switches[] — vSwitch + portgroup
#   data.network.vmkernels[]        — vmkernel adapter
#   data.storage.hbas[]             — vmhba (FC / iSCSI / SAS)
#   data.storage.infiniband[]       — port_type 기준 분리 (해당 시)

- block:
    - name: "esxi | extended | vmnic info"
      community.vmware.vmware_host_vmnic_info:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: false
        esxi_hostname:  "{{ _e_ip }}"
      register:    _e_vmnic
      failed_when: false
      no_log: true

    - name: "esxi | extended | vmhba info"
      community.vmware.vmware_host_vmhba_info:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: false
        esxi_hostname:  "{{ _e_ip }}"
      register:    _e_vmhba
      failed_when: false
      no_log: true

    - name: "esxi | extended | vswitch info"
      community.vmware.vmware_vswitch_info:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: false
        esxi_hostname:  "{{ _e_ip }}"
      register:    _e_vswitch
      failed_when: false
      no_log: true

    - name: "esxi | extended | portgroup info"
      community.vmware.vmware_portgroup_info:
        hostname:       "{{ _e_ip }}"
        username:       "{{ ansible_user }}"
        password:       "{{ ansible_password }}"
        validate_certs: false
        esxi_hostname:  "{{ _e_ip }}"
      register:    _e_portgroup
      failed_when: false
      no_log: true

    # BUG #4 fix (cycle production-audit 후속): hosts_*_info dict 의 top-level key 는
    # ESXi configured hostname (예: "esxi01") — _e_ip 가 아니다.
    # 또한 진짜 dict list 는 'all' (string list) 이 아니라 'vmnic_details' / 'vmhba_details'.
    # vswitch 는 dict-of-dict (key=vswitch name, value=info).
    # 키 매핑: pci→location, adapter_type→type, node_world_wide_name→node_wwn.
    # portgroups 는 별도 portgroup_info 결과를 vswitch 별로 group 해서 채운다.
    # 진단 근거: tests/scripts/diag_esxi_raw.yml 결과 (community.vmware 6.2.0 + ESXi 7.0.3).
    - name: "esxi | extended | normalize"
      ansible.builtin.set_fact:
        _e_ext_adapters: >-
          {%- set out = [] -%}
          {%- set d = _e_vmnic.hosts_vmnics_info | default({}) -%}
          {%- set key = _e_hostname if (_e_hostname in d) else ((d.keys() | list | first) if d else none) -%}
          {%- set vmnics = (d.get(key, {}).get('vmnic_details', [])) if key else [] -%}
          {%- for n in vmnics -%}
            {# 잔류 fix (Round 12 후속): speed_mbps int 일관성. Connected 시 int (10000),
               Disconnected 시 raw "N/A" → null. 호출자 cross-channel 일관성 보장 #}
            {%- set raw_sp = n.actual_speed | default(none) -%}
            {%- set sp_int = none -%}
            {%- if raw_sp is number -%}
              {%- set sp_int = raw_sp | int -%}
            {%- elif raw_sp is string and raw_sp != 'N/A' and raw_sp -%}
              {%- set digits = raw_sp | regex_replace('[^0-9]', '') -%}
              {%- if digits -%}{%- set sp_int = digits | int -%}{%- endif -%}
            {%- endif -%}
            {%- set raw_dup = n.actual_duplex | default(none) -%}
            {%- set dup = none if (raw_dup in ['N/A', '', none]) else raw_dup -%}
            {%- set _ = out.append({
              'name':         n.device | default(none),
              'driver':       n.driver | default(none),
              'mac':          n.mac    | default(none),
              'link_status':  n.status | default(none),
              'speed_mbps':   sp_int,
              'duplex':       dup,
              'pci':          n.location | default(none),
              'adapter':      n.adapter  | default(none),
            }) -%}
          {%- endfor -%}
          {{ out }}
        _e_ext_hbas: >-
          {%- set out = [] -%}
          {%- set ib  = [] -%}
          {%- set d = _e_vmhba.hosts_vmhbas_info | default({}) -%}
          {%- set key = _e_hostname if (_e_hostname in d) else ((d.keys() | list | first) if d else none) -%}
          {%- set vmhbas = (d.get(key, {}).get('vmhba_details', [])) if key else [] -%}
          {%- for h in vmhbas -%}
            {%- set adapter_type = (h.type | default('')) | lower -%}
            {%- set is_ib = 'infiniband' in adapter_type -%}
            {%- set entry = {
              'name':         h.device     | default(none),
              'driver':       h.driver     | default(none),
              'model':        h.model      | default(none),
              'adapter_type': h.type       | default(none),
              'link_status':  h.status     | default(none),
              'wwpn':         h.port_wwn   | default(none),
              'wwnn':         h.node_wwn   | default(none),
              'pci':          h.location   | default(none),
              'bus':          h.bus        | default(none),
            } -%}
            {%- if is_ib -%}
              {%- set _ = ib.append(entry) -%}
            {%- else -%}
              {%- set _ = out.append(entry) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ {'hbas': out, 'infiniband': ib} }}
        _e_ext_portgroups: >-
          {%- set d = _e_portgroup.hosts_portgroup_info | default({}) -%}
          {%- set key = _e_hostname if (_e_hostname in d) else ((d.keys() | list | first) if d else none) -%}
          {{ (d.get(key, [])) if key else [] }}
      no_log: true

    # vswitch 는 dict-of-dict 구조라 별도 task — _e_ext_portgroups 에 의존 (vswitch 별 portgroups join)
    - name: "esxi | extended | build vswitch list"
      ansible.builtin.set_fact:
        _e_ext_vswitches: >-
          {%- set out = [] -%}
          {%- set d = _e_vswitch.hosts_vswitch_info | default({}) -%}
          {%- set key = _e_hostname if (_e_hostname in d) else ((d.keys() | list | first) if d else none) -%}
          {%- set vsws_dict = d.get(key, {}) if key else {} -%}
          {%- set pg_by_vsw = namespace(map={}) -%}
          {%- for pg in (_e_ext_portgroups | default([])) -%}
            {%- set vsw = pg.vswitch | default('') -%}
            {%- if vsw -%}
              {%- if vsw not in pg_by_vsw.map -%}
                {%- set _ = pg_by_vsw.map.update({vsw: []}) -%}
              {%- endif -%}
              {%- set _ = pg_by_vsw.map[vsw].append(pg.portgroup) -%}
            {%- endif -%}
          {%- endfor -%}
          {%- if vsws_dict is mapping -%}
            {%- for sw_name, sw_info in vsws_dict.items() -%}
              {%- set _ = out.append({
                'name':       sw_name,
                'num_ports':  sw_info.num_ports | default(none),
                'mtu':        sw_info.mtu       | default(none),
                'pnics':      sw_info.pnics     | default([]),
                'portgroups': pg_by_vsw.map.get(sw_name, []),
              }) -%}
            {%- endfor -%}
          {%- endif -%}
          {{ out }}
      no_log: true

    - name: "esxi | extended | merge fragment"
      ansible.builtin.set_fact:
        _data_fragment:
          network:
            adapters:         "{{ _e_ext_adapters | default([]) }}"
            virtual_switches: "{{ _e_ext_vswitches | default([]) }}"
            portgroups:       "{{ _e_ext_portgroups | default([]) }}"
          storage:
            hbas:             "{{ (_e_ext_hbas | default({'hbas':[]})).hbas }}"
            infiniband:       "{{ (_e_ext_hbas | default({'infiniband':[]})).infiniband }}"
        _sections_supported_fragment: ['network', 'storage']
        _sections_collected_fragment: >-
          {{ (['network'] if (_e_ext_adapters | length > 0 or _e_ext_vswitches | length > 0) else [])
             + (['storage'] if ((_e_ext_hbas | default({'hbas':[]})).hbas | length > 0) else []) }}
        _sections_failed_fragment:    []
        _errors_fragment:             []
      no_log: true
  rescue:
    - name: "esxi | extended | rescue (best-effort skip)"
      ansible.builtin.set_fact:
        _data_fragment:
          network:
            adapters:         []
            virtual_switches: []
            portgroups:       []
          storage:
            hbas:             []
            infiniband:       []
        _sections_supported_fragment: []
        _sections_collected_fragment: []
        _sections_failed_fragment:    []
        _errors_fragment:
          - section: esxi_network_extended
            message: "vmnic/vmhba/vSwitch/portgroup 수집 실패 (best-effort skip)"
            detail:  "{{ ansible_failed_result.msg | default('') }}"
      no_log: true

- name: "esxi | extended | merge fragment"
  ansible.builtin.include_tasks:
    file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/merge_fragment.yml"
