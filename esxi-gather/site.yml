---
# =============================================================================
# esxi-gather / site.yml  — orchestration 전용
#
# 흐름:
#   init_fragments
#   → run_precheck       (4단계 진단)
#   → select_adapter     (adapter_loader)
#   → collect_facts      (_e_raw_facts, _e_facts_ok)
#   → collect_config     (_e_raw_config, _e_config_ok)
#   → collect_datastores (_e_raw_ds, _e_ds_ok)
#   → normalize_system   (system/hardware/cpu/memory fragment → merge)
#   → normalize_network  (network fragment → merge)
#   → normalize_storage  (storage fragment → merge)
#   → build_sections / build_status / build_errors
#   → build_meta / build_correlation
#   → build_output → inject schema_version → OUTPUT
# =============================================================================

- name: "esxi-gather"
  hosts: all
  gather_facts: no
  connection: local

  vars_files:
    - "{{ lookup('env','REPO_ROOT') }}/vault/esxi.yml"

  vars:
    ansible_python_interpreter: "{{ ansible_playbook_python }}"
    _e_ip:   "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"
    _e_user: "{{ ansible_user }}"
    _e_pass: "{{ ansible_password }}"

  tasks:

    - name: "esxi | gather"
      block:

        - name: "esxi | init fragments"
          ansible.builtin.include_tasks:
            file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/init_fragments.yml"

        # ── pre-check ────────────────────────────────────────────────────
        - name: "esxi | run precheck"
          ansible.builtin.include_tasks:
            file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/precheck/run_precheck.yml"
          vars:
            _precheck_host: "{{ hostvars[inventory_hostname].ansible_host | default(inventory_hostname) }}"
            _precheck_channel: "esxi"
            _precheck_timeout: 30

        - name: "esxi | abort if precheck failed"
          ansible.builtin.fail:
            msg: >-
              ESXi 호스트 연결 진단 실패 ({{ _e_ip }}) —
              단계={{ (_diagnosis | default({})).failure_stage | default('unknown') }},
              사유={{ (_diagnosis | default({})).failure_reason | default('연결 불가') }}.
              ESXi 호스트 전원, 네트워크, vSphere API(443) 포트를 확인하세요.
          when: not (_precheck_ok | bool)

        # P1 (cycle 2026-04-28): vault accounts 후보 순차 시도.
        - name: "esxi | try credentials"
          ansible.builtin.include_tasks: tasks/try_credentials.yml
          vars:
            _e_accounts: "{{ accounts | default([]) }}"

        - name: "esxi | abort if all credentials failed"
          ansible.builtin.fail:
            msg: >-
              ESXi 인증 후보 {{ _e_accounts | default([]) | length }}개 모두 실패 —
              vault/esxi.yml accounts 와 ESXi 호스트 lockdown/local user 설정을 확인하세요.
          when:
            - (_e_accounts | default([])) | length > 0
            - not (_e_auth_ok | default(false) | bool)
          vars:
            _e_accounts: "{{ accounts | default([]) }}"

        # ── adapter 선택 ─────────────────────────────────────────────────
        - name: "esxi | select adapter"
          ansible.builtin.set_fact:
            _selected_adapter: >-
              {{ lookup('adapter_loader',
                         channel='esxi',
                         facts={},
                         repo_root=lookup('env','REPO_ROOT')) }}
          no_log: true

        - name: "esxi | collect facts"
          ansible.builtin.include_tasks: tasks/collect_facts.yml

        - name: "esxi | abort if facts failed"
          ansible.builtin.fail:
            msg: "vmware_host_facts 수집 실패 — ESXi 연결 또는 인증 문제. ESXi 호스트 접근성, vSphere API(443) 포트, 자격증명(vault)을 확인하세요."
          when: not (_e_facts_ok | bool)

        # BUG #1 fix (cycle production-audit 후속): vmware_host_vmnic_info / vmware_vswitch_info /
        # vmware_portgroup_info / vmware_host_vmhba_info 의 hosts_*_info dict 는 ESXi configured
        # hostname 을 키로 사용한다. _e_ip (IP) 로 lookup 하면 항상 빈 결과 → BUG #4 의 직접 원인.
        # 또한 system.hostname / system.fqdn 도 IP 가 아닌 ansible_hostname 을 사용해야 한다.
        - name: "esxi | resolve hostname from raw facts"
          ansible.builtin.set_fact:
            _e_hostname: "{{ _e_raw_facts.ansible_hostname | default(_e_ip) }}"
          no_log: true

        - name: "esxi | collect config"
          ansible.builtin.include_tasks: tasks/collect_config.yml

        - name: "esxi | collect datastores"
          ansible.builtin.include_tasks: tasks/collect_datastores.yml

        # 잔류 fix (Round 12 후속): vmware_host_facts/config_info 가 DNS 미반환 케이스 우회
        - name: "esxi | collect dns"
          ansible.builtin.include_tasks: tasks/collect_dns.yml

        - name: "esxi | normalize system/hardware/cpu/memory"
          ansible.builtin.include_tasks: tasks/normalize_system.yml

        - name: "esxi | normalize network"
          ansible.builtin.include_tasks: tasks/normalize_network.yml

        - name: "esxi | normalize storage"
          ansible.builtin.include_tasks: tasks/normalize_storage.yml

        # P4 (cycle 2026-04-29): vmnic/vmhba/vSwitch/portgroup 확장
        - name: "esxi | collect network extended (P4)"
          ansible.builtin.include_tasks: tasks/collect_network_extended.yml

        # 2026-04-29 fix B31/B32: ESXi runtime (NTP/timezone/firewall) + default_gateway
        - name: "esxi | collect runtime (B31/B32)"
          ansible.builtin.include_tasks: tasks/collect_runtime.yml

        - name: "esxi | build_sections"
          ansible.builtin.include_tasks:
            file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/build_sections.yml"

        - name: "esxi | build_status"
          ansible.builtin.include_tasks:
            file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/build_status.yml"

        - name: "esxi | build_errors"
          ansible.builtin.include_tasks:
            file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/build_errors.yml"

        # cycle production-audit (2026-04-29): vendor_aliases.yml로 정규화 (lowercase) + auth_success=true
        # 잔류 fix (Round 12 후속): include_vars 의 'name:' 옵션은 ansible-core 2.20+ 에서
        # reserved keyword 경고 (callback 차단 못하는 stderr noise). lookup('file') | from_yaml 로 우회.
        - name: "esxi | load vendor_aliases for normalization"
          ansible.builtin.set_fact:
            _e_vendor_aliases_map: "{{ lookup('file', lookup('env','REPO_ROOT') ~ '/common/vars/vendor_aliases.yml') | from_yaml }}"

        # BUG #2 fix (cycle production-audit 후속): Jinja2 loop scoping —
        # block 안의 {% set %} 는 outer 변수에 영향 없음. cycle-016 "9 파일 namespace pattern fix"
        # 잔류분. namespace 로 outer scope 갱신.
        - name: "esxi | normalize vendor via aliases"
          ansible.builtin.set_fact:
            _e_vendor_normalized: >-
              {%- set raw = (_e_raw_facts.ansible_system_vendor | default('')) | trim -%}
              {%- set raw_lower = raw | lower -%}
              {%- set ns = namespace(canonical=none) -%}
              {%- for canon, aliases in (_e_vendor_aliases_map.vendor_aliases | default({})).items() -%}
                {%- for a in aliases -%}
                  {%- if a | lower == raw_lower -%}
                    {%- set ns.canonical = canon -%}
                  {%- endif -%}
                {%- endfor -%}
              {%- endfor -%}
              {{ ns.canonical if ns.canonical else (raw if raw else none) }}

        - name: "esxi | set output meta"
          ansible.builtin.set_fact:
            _out_target_type:       "esxi"
            _out_collection_method: "vsphere_api"
            _out_ip:                "{{ _e_ip }}"
            _out_vendor:            "{{ _e_vendor_normalized | default(none) }}"

        - name: "esxi | enrich diagnosis with adapter"
          ansible.builtin.set_fact:
            # P1: meta.auth — 사용자 결정 #3 (fallback_used 노출)
            # production-audit: ESXi 성공 path에서 auth_success=true 명시 (cross-channel consistency)
            # 2026-04-29 fix B62: esxi_version 추가 — Redfish/OS 채널과 trace 일관성
            #  (Redfish: redfish_version / OS: detected_os+python_version / ESXi: esxi_version)
            _diagnosis: >-
              {{ _diagnosis | default({}) | combine({
                   'auth_success': true,
                   'details': ((_diagnosis | default({})).details if ((_diagnosis | default({})).details is mapping) else {}) | combine({
                     'adapter_candidate': (_selected_adapter | default({})).adapter_id | default(none),
                     'auth': _e_attempts_meta | default({}),
                     'esxi_version': _e_raw_facts.ansible_distribution_version | default(none),
                     'esxi_build':   _e_raw_facts.ansible_distribution_build   | default(none),
                     'product':      _e_raw_facts.ansible_distribution         | default('VMware ESXi')
                   })
                 }) }}

        # ── meta & correlation ───────────────────────────────────────────
        - name: "esxi | build_meta"
          ansible.builtin.include_tasks:
            file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/build_meta.yml"

        - name: "esxi | build_correlation"
          ansible.builtin.include_tasks:
            file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/build_correlation.yml"
        # ─────────────────────────────────────────────────────────────────

        - name: "esxi | build_output"
          ansible.builtin.include_tasks:
            file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/build_output.yml"

        - name: "esxi | inject schema_version"
          ansible.builtin.set_fact:
            _output: "{{ _output | combine({'schema_version': '1'}) }}"

      rescue:
        - name: "esxi | rescue | set failed vars"
          ansible.builtin.set_fact:
            _out_target_type:       "esxi"
            _out_collection_method: "vsphere_api"
            _out_ip:                "{{ _e_ip }}"
            _out_vendor:            null
            _fail_sec_supported:    "{{ ((_selected_adapter | default({})).capabilities | default({})).sections_supported
                                        | default(['system','hardware','cpu','memory','storage','network']) }}"
            _fail_error_section:    "esxi_gather"
            _fail_error_message:    "{{ ansible_failed_result.msg | default('ESXi 수집 예외') }}"

        - name: "esxi | rescue | build_failed_output"
          ansible.builtin.include_tasks:
            file: "{{ lookup('env','REPO_ROOT') }}/common/tasks/normalize/build_failed_output.yml"

        - name: "esxi | rescue | inject schema_version"
          ansible.builtin.set_fact:
            _output: "{{ _output | combine({'schema_version': '1'}) }}"

      always:
        # rule 13 R5 / rule 20 R1: 호출자는 13 필드 envelope을 보장받음. _output 미생성 시도 13 필드 모두 채운다.
        - name: OUTPUT
          ansible.builtin.debug:
            msg: "{{ (_output | default({
                       'schema_version': '1',
                       'target_type': 'esxi',
                       'collection_method': 'vsphere_api',
                       'ip': _e_ip | default(inventory_hostname),
                       'hostname': _e_ip | default(inventory_hostname),
                       'vendor': none,
                       'status': 'failed',
                       'sections': {},
                       'diagnosis': {'reachable': none, 'port_open': none, 'protocol_supported': none, 'auth_success': none, 'failure_stage': 'fallback', 'failure_reason': '_output 미생성 — block/rescue 모두 실패', 'details': {'gather_mode': 'fallback', 'reason': '_output 미생성 — block/rescue 모두 실패'}},
                       'meta': {},
                       'correlation': {},
                       'errors': [{'section':'gather','message':'_output 미생성 — block/rescue 모두 실패'}],
                       'data': {}
                     })) | to_json }}"
